<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curl Noise Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "../js/libs/three/three.module.js",
                "three/addons/": "../js/libs/three/addons/"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import { UnifiedRenderer } from '../js/UnifiedRenderer.js';
        import * as THREE from 'three';

        // Vertex Shader
        const vertexShader = `
            uniform float uTime;
            uniform float uSpeed;
            uniform float uCurl;
            
            attribute float aRandom;
            attribute vec3 aVelocity;
            
            varying float vLife;
            varying vec3 vColor;
            
            // Simplex Noise (Simplified)
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
            vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
            
            float snoise(vec3 v) { 
                const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
                const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i  = floor(v + dot(v, C.yyy) );
                vec3 x0 = v - i + dot(i, C.xxx) ;
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min( g.xyz, l.zxy );
                vec3 i2 = max( g.xyz, l.zxy );
                vec3 x1 = x0 - i1 + C.xxx;
                vec3 x2 = x0 - i2 + C.yyy; // 2.0*C.x = 1/3 = C.y
                vec3 x3 = x0 - D.yyy;      // -1.0+3.0*C.x = -0.5 = -D.y
                i = mod289(i); 
                vec4 p = permute( permute( permute( 
                         i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                       + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) 
                       + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                float n_ = 0.142857142857; // 1.0/7.0
                vec3  ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z * ns.z);  //  mod(p,7*7)
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_ );    // mod(j,N)
                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4( x.xy, y.xy );
                vec4 b1 = vec4( x.zw, y.zw );
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
                vec3 p0 = vec3(a0.xy,h.x);
                vec3 p1 = vec3(a0.zw,h.y);
                vec3 p2 = vec3(a1.xy,h.z);
                vec3 p3 = vec3(a1.zw,h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x;
                p1 *= norm.y;
                p2 *= norm.z;
                p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), 
                                            dot(p2,x2), dot(p3,x3) ) );
            }

            vec3 curlNoise(vec3 p) {
                const float e = 0.1;
                vec3 dx = vec3(e, 0.0, 0.0);
                vec3 dy = vec3(0.0, e, 0.0);
                vec3 dz = vec3(0.0, 0.0, e);
                
                vec3 p_x0 = snoise(p - dx) * vec3(1.0, 1.0, 1.0); // Dummy for simplicity
                // Actually, analytical curl is hard in one func. 
                // Let's just use 3 noise lookups with offset for pseudo-curl
                float n1 = snoise(p + vec3(0,0,0));
                float n2 = snoise(p + vec3(12.3, 45.6, 78.9));
                float n3 = snoise(p + vec3(32.1, 65.4, 98.7));
                
                return vec3(n2 - n3, n3 - n1, n1 - n2); // Cross product derivative approx
            }

            void main() {
                // Animate position based on time and random start
                float t = uTime * uSpeed + aRandom * 10.0;
                
                // Base orbit
                vec3 pos = position;
                
                // Add curl noise field
                vec3 noise = curlNoise(pos * 0.5 + t * 0.1) * uCurl;
                pos += noise;
                
                // Rotate
                float angle = t * 0.2;
                float c = cos(angle);
                float s = sin(angle);
                mat3 rot = mat3(c, 0, s, 0, 1, 0, -s, 0, c);
                pos = rot * pos;

                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                gl_Position = projectionMatrix * mvPosition;
                
                // Size attenuation
                gl_PointSize = (4.0 * uCurl + 2.0) * (10.0 / -mvPosition.z);
                
                vColor = vec3(0.5 + 0.5 * sin(t + pos.x), 0.5 + 0.5 * sin(t + pos.y + 2.0), 0.5 + 0.5 * sin(t + pos.z + 4.0));
            }
        `;

        const fragmentShader = `
            varying vec3 vColor;
            
            void main() {
                // Circle shape
                vec2 uv = gl_PointCoord - 0.5;
                float d = length(uv);
                if (d > 0.5) discard;
                
                // Soft edge
                float alpha = smoothstep(0.5, 0.3, d);
                
                gl_FragColor = vec4(vColor, alpha);
            }
        `;

        new UnifiedRenderer({
            type: 'three',
            params: {
                speed: 1.0,
                curlStrength: 2.0,
                count: 5000
            },
            init: (scope) => {
                const count = scope.params.count;
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);
                const randoms = new Float32Array(count);
                
                for(let i = 0; i < count; i++) {
                    // Sphere distribution
                    const r = 5.0 * Math.cbrt(Math.random());
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    
                    positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                    positions[i * 3 + 2] = r * Math.cos(phi);
                    
                    randoms[i] = Math.random();
                }
                
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
                
                const material = new THREE.ShaderMaterial({
                    uniforms: {
                        uTime: { value: 0 },
                        uSpeed: { value: scope.params.speed },
                        uCurl: { value: scope.params.curlStrength }
                    },
                    vertexShader: vertexShader,
                    fragmentShader: fragmentShader,
                    transparent: true,
                    depthWrite: false,
                    blending: THREE.AdditiveBlending
                });
                
                scope.particles = new THREE.Points(geometry, material);
                scope.scene.add(scope.particles);
                
                scope.setUI({
                    speed: { type: 'number', min: 0.1, max: 5.0, value: 1.0, label: 'Flow Speed' },
                    curlStrength: { type: 'number', min: 0.1, max: 5.0, value: 2.0, label: 'Turbulence' }
                });
            },
            onParamChange: (key, value, scope) => {
                if(scope.particles) {
                    if(key === 'speed') scope.particles.material.uniforms.uSpeed.value = value;
                    if(key === 'curlStrength') scope.particles.material.uniforms.uCurl.value = value;
                }
            }
        });
    </script>
</body>
</html>
