<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Reactive Sphere</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center;
            color: white; font-family: monospace; cursor: pointer; z-index: 10;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "../js/libs/three/three.module.js",
                "three/addons/": "../js/libs/three/addons/"
            }
        }
    </script>
</head>
<body>
    <div id="overlay"><h1>▶ CLICK TO START AUDIO</h1></div>
    <script type="module">
        import { UnifiedRenderer } from '../js/UnifiedRenderer.js';
        import * as THREE from 'three';

        // Vertex Shader: Displaces vertices based on noise + audio (passed as uniform)
        const vertexShader = `
            uniform float uTime;
            uniform float uAudioHigh; // High freq
            uniform float uAudioLow;  // Low freq
            
            varying vec2 vUv;
            varying float vDisplacement;
            varying vec3 vNormal;

            // Simplex Noise
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
            vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
            float snoise(vec3 v) { 
                const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
                const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i  = floor(v + dot(v, C.yyy) );
                vec3 x0 = v - i + dot(i, C.xxx) ;
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min( g.xyz, l.zxy );
                vec3 i2 = max( g.xyz, l.zxy );
                vec3 x1 = x0 - i1 + C.xxx;
                vec3 x2 = x0 - i2 + C.yyy;
                vec3 x3 = x0 - D.yyy;
                i = mod289(i); 
                vec4 p = permute( permute( permute( 
                         i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                       + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) 
                       + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                float n_ = 0.142857142857;
                vec3  ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_ );
                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4( x.xy, y.xy );
                vec4 b1 = vec4( x.zw, y.zw );
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
                vec3 p0 = vec3(a0.xy,h.x);
                vec3 p1 = vec3(a0.zw,h.y);
                vec3 p2 = vec3(a1.xy,h.z);
                vec3 p3 = vec3(a1.zw,h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x;
                p1 *= norm.y;
                p2 *= norm.z;
                p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
            }

            void main() {
                vUv = uv;
                vNormal = normal;
                
                // Dynamic noise speed based on audio
                float noiseTime = uTime * 0.5 + uAudioLow * 2.0; 
                float noiseVal = snoise(position * (2.0 + uAudioHigh) + noiseTime);
                
                // Bass affects overall size, Highs affect spike sharpness
                float displacement = noiseVal * (uAudioHigh * 2.5 + 0.3);
                displacement += (uAudioLow * 0.8); 
                
                vDisplacement = displacement;
                
                vec3 newPosition = position + normal * displacement;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
            }
        `;

        const fragmentShader = `
            uniform float uTime;
            uniform float uAudioHigh;
            uniform vec3 uColor;
            
            varying float vDisplacement;
            varying vec2 vUv;
            varying vec3 vNormal;

            void main() {
                // Color based on displacement
                vec3 color = uColor;
                
                // Add some variation
                color += vec3(vDisplacement * 2.0, 0.0, vDisplacement);
                
                // Rim light
                vec3 viewDir = vec3(0.0, 0.0, 1.0);
                float fresnel = pow(1.0 - dot(vNormal, viewDir), 3.0);
                color += vec3(1.0) * fresnel * (uAudioHigh + 0.2);

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        new UnifiedRenderer({
            type: 'three',
            params: {
                baseColor: new THREE.Color(0x0077ff),
                sensitivity: 1.0,
                wireframe: true,
                autoRotate: true
            },
            init: (scope) => {
                // UI
                scope.setUI({
                    baseColor: { type: 'color', value: '#0077ff', label: 'Color' },
                    sensitivity: { type: 'number', min: 0.1, max: 3.0, value: 1.0, label: 'Sensitivity' },
                    wireframe: { type: 'boolean', value: true, label: 'Wireframe' },
                    autoRotate: { type: 'boolean', value: true, label: 'Auto Rotate' },
                    audioFile: { type: 'file', label: 'Upload MP3', accept: 'audio/*' }
                });

                // Audio Setup
                const listener = new THREE.AudioListener();
                scope.camera.add(listener);
                const sound = new THREE.Audio(listener);
                const audioLoader = new THREE.AudioLoader();
                const analyser = new THREE.AudioAnalyser(sound, 32);
                scope.analyser = analyser;

                // Load a sample song (Using a reliable CORS-enabled source or local if available)
                // Using a short Creative Commons sample loop
                const songUrl = '../sample/久石譲 - 風の丘.mp3';
                
                const overlay = document.getElementById('overlay');
                
                // Helper to load audio
                const loadAudio = (url) => {
                    if (sound.isPlaying) sound.stop();
                    audioLoader.load(url, function(buffer) {
                        sound.setBuffer(buffer);
                        sound.setLoop(true);
                        sound.setVolume(0.5);
                        sound.play();
                    });
                };

                overlay.onclick = () => {
                    overlay.style.display = 'none';
                    if (sound.isPlaying) return;
                    loadAudio(songUrl);
                };

                // Sphere Mesh
                const geometry = new THREE.IcosahedronGeometry(1.5, 60); // High detail for displacement
                const material = new THREE.ShaderMaterial({
                    uniforms: {
                        uTime: { value: 0 },
                        uAudioHigh: { value: 0 },
                        uAudioLow: { value: 0 },
                        uColor: { value: scope.params.baseColor }
                    },
                    vertexShader: vertexShader,
                    fragmentShader: fragmentShader,
                    wireframe: scope.params.wireframe
                });
                
                scope.sphere = new THREE.Mesh(geometry, material);
                scope.scene.add(scope.sphere);
                
                // Add some background particles
                const particlesGeom = new THREE.BufferGeometry();
                const particleCount = 1000;
                const posArray = new Float32Array(particleCount * 3);
                for(let i=0; i<particleCount*3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 20;
                }
                particlesGeom.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                const particlesMat = new THREE.PointsMaterial({ size: 0.05, color: 0xffffff, transparent: true, opacity: 0.5 });
                scope.bgParticles = new THREE.Points(particlesGeom, particlesMat);
                scope.scene.add(scope.bgParticles);
                
                // Expose loadAudio for file upload
                scope.loadAudio = loadAudio;
            },
            update: (state, scope) => {
                const { time, deltaTime } = state;
                
                if (scope.analyser) {
                    const data = scope.analyser.getFrequencyData();
                    // Simple analysis: Low freq (bass) vs High freq
                    const lowerHalf = data.slice(0, data.length / 2 - 1);
                    const upperHalf = data.slice(data.length / 2);
                    
                    const lowerAvg = lowerHalf.reduce((a, b) => a + b, 0) / lowerHalf.length;
                    const upperAvg = upperHalf.reduce((a, b) => a + b, 0) / upperHalf.length;
                    
                    // Normalize 0-255 to 0-1
                    const low = (lowerAvg / 255) * scope.params.sensitivity;
                    const high = (upperAvg / 255) * scope.params.sensitivity;
                    
                    if (scope.sphere) {
                        scope.sphere.material.uniforms.uAudioLow.value = THREE.MathUtils.lerp(scope.sphere.material.uniforms.uAudioLow.value, low, 0.2);
                        scope.sphere.material.uniforms.uAudioHigh.value = THREE.MathUtils.lerp(scope.sphere.material.uniforms.uAudioHigh.value, high, 0.2);
                        scope.sphere.material.uniforms.uTime.value = time;
                        if(scope.params.autoRotate) {
                             scope.sphere.rotation.y += 0.005 + low * 0.01;
                        }
                    }
                }
            },
            onParamChange: (key, value, scope) => {
                if (key === 'baseColor' && scope.sphere) {
                    scope.sphere.material.uniforms.uColor.value.set(value);
                }
                if (key === 'sensitivity') {
                    scope.params.sensitivity = value;
                }
                if (key === 'wireframe' && scope.sphere) {
                    scope.sphere.material.wireframe = value;
                    scope.params.wireframe = value;
                }
                if (key === 'autoRotate') {
                    scope.params.autoRotate = value;
                }
                if (key === 'audioFile') {
                     // Handle File Upload
                     // UnifiedRenderer usually sends { type: 'file', url: 'blob:...' } or just the url string if handled
                     // If it comes from a standard file input, we might get a blob url
                     const url = value.url || value; 
                     if (url && typeof url === 'string') {
                         console.log("Loading user audio:", url);
                         if(scope.loadAudio) scope.loadAudio(url);
                         // Hide overlay if it's there
                         const overlay = document.getElementById('overlay');
                         if(overlay) overlay.style.display = 'none';
                     }
                }
            }
        });
    </script>
</body>
</html>
