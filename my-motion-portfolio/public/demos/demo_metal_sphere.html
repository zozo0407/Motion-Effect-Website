<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 32 - Metal Sphere</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #container { width: 100vw; height: 100vh; }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@tweenjs/tween.js": "https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.esm.js"
            }
        }
    </script>
</head>
<body>
    <div id="container"></div>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
        import * as TWEEN from '@tweenjs/tween.js';
        import { UnifiedRenderer } from '../js/UnifiedRenderer.js';

        // --- Unified Protocol Implementation ---
        const UI_CONFIG = [
            { name: '金属颜色', value: '#ffffff', type: 'color', bind: 'uColor' },
            { name: '粗糙度', value: 0.1, min: 0, max: 1, step: 0.01, bind: 'uRoughness' },
            { name: '金属度', value: 1.0, min: 0, max: 1, step: 0.01, bind: 'uMetalness' },
            { name: '旋转速度', value: 0.5, min: 0, max: 2, step: 0.1, bind: 'uSpeed' }
        ];

        class ScriptScene {
            constructor(amgScene = null, container = null) {
                this.scene = new THREE.Scene();
                this.camera = null;
                this.renderer = null;
                this.sceneObjects = { tweens: [] };
                this.rotationSpeed = 0.01;
                this.isAnimating = false;

                this.initCoreObjects();
                if (container) {
                    this.init(container);
                }
            }

            initCoreObjects() {
                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 0, 10);

                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.outputColorSpace = THREE.SRGBColorSpace;
                
                this.TWEEN = TWEEN;
            }

            init(container) {
                container.appendChild(this.renderer.domElement);
                this.controls = new OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                
                // UnifiedRenderer will handle resize events, but we keep this method for manual calls
                // window.addEventListener('resize', this.handleResize.bind(this)); 
            }

            setupScene() {
                // --- Setup Begin ---
                // 1. Environment (Crucial for Metal)
                const pmremGenerator = new THREE.PMREMGenerator(this.renderer);
                pmremGenerator.compileEquirectangularShader();
                this.scene.environment = pmremGenerator.fromScene(new RoomEnvironment()).texture;
                this.scene.background = new THREE.Color(0x111111);

                // 2. Lights
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
                this.scene.add(ambientLight);

                const dirLight = new THREE.DirectionalLight(0xffffff, 2);
                dirLight.position.set(5, 5, 5);
                this.scene.add(dirLight);

                const pointLight = new THREE.PointLight(0x00CAE0, 5); // Cyan accent
                pointLight.position.set(-5, 0, 5);
                this.scene.add(pointLight);

                // 3. Metal Sphere
                const geometry = new THREE.SphereGeometry(2, 64, 64);
                const material = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    metalness: 1.0,
                    roughness: 0.1,
                    envMapIntensity: 1.0
                });
                
                const sphere = new THREE.Mesh(geometry, material);
                sphere.name = 'MetalSphere';
                this.scene.add(sphere);

                // Save reference for updates
                this.sceneObjects.sphere = sphere;
                // --- Setup End ---

                this.setupAnimations();
            }

            setupAnimations() {
                // --- Animation Begin ---
                // Initial Animation: Scale Up
                if (this.sceneObjects.sphere) {
                    this.sceneObjects.sphere.scale.set(0, 0, 0);
                    const tween = new this.TWEEN.Tween(this.sceneObjects.sphere.scale)
                        .to({ x: 1, y: 1, z: 1 }, 1500)
                        .easing(this.TWEEN.Easing.Elastic.Out)
                        .start();
                    this.sceneObjects.tweens.push(tween);
                }
                // --- Animation End ---
            }

            handleResize(width, height) {
                if (!width) width = window.innerWidth;
                if (!height) height = window.innerHeight;
                this.camera.aspect = width / height;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(width, height);
            }

            start() {
                this.isAnimating = true;
                this.renderer.setAnimationLoop(() => {
                    this.update();
                });
            }

            stop() {
                this.isAnimating = false;
                this.renderer.setAnimationLoop(null);
            }

            update() {
                this.TWEEN.update();
                if (this.controls) this.controls.update();

                // Continuous Rotation
                if (this.sceneObjects.sphere) {
                    this.sceneObjects.sphere.rotation.y += this.rotationSpeed;
                    this.sceneObjects.sphere.rotation.x += this.rotationSpeed * 0.5;
                }

                this.renderer.render(this.scene, this.camera);
            }

            dispose() {
                this.stop();
                if (this.renderer) {
                    this.renderer.dispose();
                    this.renderer.domElement.remove();
                }
            }
            
            // Stub methods for recorder
            startRecording() { console.log('Rec start'); }
            stopRecording() { console.log('Rec stop'); }
            saveImage() { console.log('Save img'); }
        }

        // Initialize UnifiedRenderer
        new UnifiedRenderer({
            type: 'custom',
            container: document.getElementById('container'),
            
            init: (renderer) => {
                const scriptScene = new ScriptScene(null, renderer.container);
                scriptScene.setupScene();
                scriptScene.start();
                
                // Store reference for callbacks
                renderer.scriptScene = scriptScene;

                // Set UI
                renderer.setUI(UI_CONFIG);

                // Handle Resize
                renderer.onResize = (w, h) => scriptScene.handleResize(w, h);
                
                // Handle Dispose
                renderer.onDispose = () => scriptScene.dispose();
            },

            onParamChange: (key, value, renderer) => {
                const scriptScene = renderer.scriptScene;
                if (!scriptScene) return;

                if (scriptScene.sceneObjects && scriptScene.sceneObjects.sphere) {
                    const mat = scriptScene.sceneObjects.sphere.material;
                    if (key === 'uColor') mat.color.set(value);
                    if (key === 'uRoughness') mat.roughness = value;
                    if (key === 'uMetalness') mat.metalness = value;
                }
                if (key === 'uSpeed') {
                    scriptScene.rotationSpeed = value * 0.02;
                }
            }
        });
    </script>
</body>
</html>
