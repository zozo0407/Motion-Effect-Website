<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Grid</title>
    <style>
        body {
            margin: 0;
            background: #0f0f13;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            perspective: 500px;
        }
        .grid {
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(255, 0, 255, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.3) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(45deg);
            animation: slide 2s linear infinite;
            box-shadow: 0 0 100px rgba(255, 0, 255, 0.2);
        }
        @keyframes slide {
            0% { transform: rotateX(45deg) translateY(0); }
            100% { transform: rotateX(45deg) translateY(50px); }
        }
    </style>
</head>
<body>
    <div class="grid" id="grid"></div>

    <script>
        // --- Unified Protocol ---
        const UI_CONFIG = [
            { name: '网格密度', value: 50, min: 20, max: 100, bind: 'param1' },
            { name: '速度', value: 2, min: 0.1, max: 5, bind: 'param2' },
            { name: '透视感', value: 500, min: 200, max: 1000, bind: 'param3' }
        ];

        function sendConfig() {
            if (window.parent) {
                window.parent.postMessage({
                    type: 'UI_CONFIG',
                    config: UI_CONFIG,
                    sources: [] // No input source for this CSS demo
                }, '*');
            }
        }

        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data) return;

            if (data.type === 'HANDSHAKE') sendConfig();

            if (data.type === 'UPDATE_PARAM') {
                const grid = document.getElementById('grid');
                
                if (data.key === 'param1') {
                    grid.style.backgroundSize = `${data.value}px ${data.value}px`;
                }
                if (data.key === 'param2') {
                    grid.style.animationDuration = `${5 / data.value}s`;
                }
                if (data.key === 'param3') {
                    document.body.style.perspective = `${data.value}px`;
                }
            }
        });

        sendConfig();
    </script>
</body>
</html>
