<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 22 - Voronoi Audio</title>
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
    <!-- Local Voronoi Lib -->
    <script src="../assets/demo22/rhill-voronoi-core.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="module">
        import { UnifiedRenderer } from '../js/UnifiedRenderer.js';

        // --- Configuration & Globals ---
        // Variables must be scoped to the module or the init function
        // to avoid polluting global scope and ensuring cleanup.
        
        // --- Communication Protocol ---
        const UI_CONFIG = [
            { name: 'Bob Count', value: 300, min: 100, max: 1000, step: 50, bind: 'uCount' },
            { name: 'Sensitivity', value: 0.1, min: 0.01, max: 1.0, step: 0.01, bind: 'uSens' },
            { name: 'Debug Mode', type: 'checkbox', value: false, bind: 'uDebug' },
            { name: 'Reset', type: 'button', bind: 'cmd_reset', text: 'Reset Bobs' }
        ];

        new UnifiedRenderer({
            type: 'p5',
            init: (p, renderer) => {
                // Vars
                let voronoi;
                let boundingBox;
                let diagram;
                let volume = 0;
                let volumeThreshold = 0.1;
                let bobCount = 300; 
                let bobs = [];
                let globalHue = 0;
                let debug = false;
                
                let audio;
                let amp;
                let isAudioInitialized = false;

                // --- Bob Class (Adapted for Instance Mode) ---
                class Bob {
                    constructor(x, y) {
                        this.pos = p.createVector(x, y);
                        this.vel = p5.Vector.random2D(); // Static method works? Or p.createVector.random2D? p5.Vector is global.
                        this.acc = p.createVector(0, 0);
                        this.target = p.createVector(x, y);
                    }
                    
                    move() {
                        this.vel.mult(0.95);
                        let targetDist = p.dist(this.pos.x, this.pos.y, this.target.x, this.target.y);
                        
                        let distThresh = 50; 
                        let steerMult = 1;
                        if (targetDist < distThresh) {
                            steerMult = targetDist / distThresh;
                        }
                        
                        if (targetDist > 1) {
                            let steer = p.createVector(this.target.x, this.target.y);
                            steer.sub(this.pos);
                            steer.normalize();
                            steer.mult(steerMult);
                            this.acc.add(steer);
                        }
                        
                        if (volume > volumeThreshold) {
                            let centerDist = p.dist(this.pos.x, this.pos.y, p.width / 2, p.height / 2);
                            let push = p.createVector(this.pos.x, this.pos.y);
                            push.sub(p.createVector(p.width / 2, p.height / 2));
                            push.normalize();
                            if (centerDist < 1) centerDist = 1;
                            
                            let force = (volume - volumeThreshold) * 50; 
                            push.mult(force / centerDist * 50); 
                            this.acc.add(push);
                        }
                        
                        this.vel.limit(5);
                        this.vel.add(this.acc);
                        this.pos.add(this.vel);
                        this.acc.mult(0);
                    }
                }

                // Helper Functions
                function updateBoundingBox() {
                    boundingBox = {
                        xl: 1, 
                        xr: p.width - 1, 
                        yt: 1, 
                        yb: p.height - 1
                    };
                }
                
                function initBobs() {
                    bobs = [];
                    for (let i = 0; i < bobCount; i++) {
                        let pos = p5.Vector.random2D();
                        pos.mult(p.random(p.max(p.width, p.height) / 4));
                        pos.add(p.width / 2, p.height / 2);
                        bobs.push(new Bob(pos.x, pos.y));
                    }
                }

                // --- Setup Logic (runs once) ---
                p.colorMode(p.HSB, 255);
                globalHue = p.random(255);
                
                // Voronoi setup (Global Lib)
                voronoi = new Voronoi();
                updateBoundingBox();
                
                // Audio setup
                // Use p.AudioIn if available in instance, else p5.AudioIn
                // p5.sound extends p5.prototype.
                audio = new p5.AudioIn();
                amp = new p5.Amplitude();
                amp.setInput(audio);
                amp.toggleNormalize(1);
                
                initBobs();
                renderer.setUI(UI_CONFIG);

                // --- Event Handlers ---
                renderer.onParamChange = (key, value) => {
                    if (key === 'uCount') {
                        bobCount = parseInt(value);
                        initBobs();
                    }
                    if (key === 'uSens') volumeThreshold = parseFloat(value);
                    if (key === 'uDebug') debug = value;
                    if (key === 'cmd_reset') initBobs();
                };

                p.mousePressed = () => {
                    if (!isAudioInitialized) {
                        p.userStartAudio();
                        audio.start();
                        isAudioInitialized = true;
                    }
                };
                
                // Note: p.windowResized is handled by UnifiedRenderer -> calling _onResize -> calling p.resizeCanvas? 
                // UnifiedRenderer calls p.windowResized internally?
                // UnifiedRenderer calls _onResize() on window resize.
                // But p5 has its own resize handling.
                // UnifiedRenderer's _setupP5 defines p.windowResized to call this._onResize().
                // And _onResize calls p.resizeCanvas(w, h).
                // So we just need to hook into renderer.onResize to update bounding box.
                renderer.onResize = (w, h) => {
                    updateBoundingBox();
                    initBobs();
                };

                // --- Draw Loop ---
                renderer.drawCallback = (p) => {
                    if (isAudioInitialized) {
                        let level = amp.getLevel();
                        if (level != undefined) {
                            volume = p.map(level, 0, 1, 0, 2); 
                        }
                    } else {
                        p.background(0);
                        p.fill(255);
                        p.textAlign(p.CENTER);
                        p.noStroke();
                        p.text("Click anywhere to enable Mic/Audio", p.width/2, p.height/2);
                        return;
                    }
                    
                    p.background(0);
                    
                    for (let i = 0; i < bobs.length; i++) {
                        bobs[i].move();
                    }
                    
                    let transform = [];
                    for (let i = 0; i < bobs.length; i++) {
                        let itsHue = (globalHue + bobs[i].vel.mag() * 10) % 255;
                        let itsAlpha = bobs[i].vel.mag() * 20;
                        transform.push({
                            x: bobs[i].pos.x, 
                            y: bobs[i].pos.y, 
                            color: p.color(itsHue, 200, 200, itsAlpha)
                        });
                    }
                    
                    voronoi.recycle(diagram);
                    diagram = voronoi.compute(transform, boundingBox);
                    
                    if (diagram) {
                        for (let i = 0; i < diagram.cells.length; i++) {
                            let cell = diagram.cells[i];
                            if (!cell.halfedges.length) continue;
                            
                            if (debug) {
                                p.stroke(127);
                                p.strokeWeight(0.1);
                            } else {
                                p.noStroke();
                            }
                            
                            if (cell.site.color) p.fill(cell.site.color);
                            else p.fill(0);
                            
                            p.beginShape();
                            for (let j = 0; j < cell.halfedges.length; j++) {
                                let v = cell.halfedges[j].getStartpoint();
                                p.vertex(v.x, v.y);
                            }
                            p.endShape(p.CLOSE);
                        }
                    }
                    
                    for (let i = 0; i < bobs.length; i++) {
                        if (debug) {
                            p.stroke(255, 100);
                            p.strokeWeight(3);
                        } else {
                            p.stroke(globalHue, 255, 255, bobs[i].vel.mag() * 5);
                            p.strokeWeight(bobs[i].vel.mag() * 1.5);
                        }
                        p.point(bobs[i].pos.x, bobs[i].pos.y);
                    }
                    
                    globalHue = (globalHue + 1) % 255;
                };
            }
        });
    </script>
</body>
</html>
