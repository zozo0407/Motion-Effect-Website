<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 7 - Cyber Face Mesh</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        /* Hide the raw video element, we only show the 3D render */
        #input-video { display: none; }
        
        .loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00CAE0; font-family: monospace; font-size: 14px;
            text-align: center;
            pointer-events: none;
        }
    </style>
    
    <!-- MediaPipe Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <!-- Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <video id="input-video" playsinline></video>
    <div id="loading" class="loading">
        INITIALIZING NEURAL NET...<br>
        [ LOADING MODEL ]
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- Configuration ---
        const CONFIG = {
            color: 0x00CAE0,
            wireframe: true,
            points: true,
            opacity: 0.8
        };

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Camera setup for 2D-like mapping
        // We use perspective but positioned to match video feed reasonably well
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 100; // Arbitrary start, will adjust
        camera.position.set(0, 0, 100);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Post Processing (Bloom)
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.2;
        bloomPass.strength = 1.2;
        bloomPass.radius = 0.5;
        composer.addPass(bloomPass);

        // Geometry for Face Mesh
        // MediaPipe Face Mesh has 468 landmarks
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(468 * 3);
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        // Material
        const material = new THREE.PointsMaterial({ 
            color: CONFIG.color, 
            size: 2.0, 
            transparent: true,
            opacity: CONFIG.opacity,
            blending: THREE.AdditiveBlending
        });

        const mesh = new THREE.Points(geometry, material);
        scene.add(mesh);

        // Lines (Triangulation would be better but simple connections for now)
        // We will just use Points for the "Cyber Cloud" look, or we can use a LineLoop if we had indices.
        // Let's stick to Points + maybe some specific lines for eyes/mouth if we want, but Points look very "Data" style.

        // --- MediaPipe Setup ---
        const videoElement = document.getElementById('input-video');
        const loading = document.getElementById('loading');
        
        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults(onResults);

        // Camera Utils to handle video stream
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        cameraUtils.start();

        // --- Data Handling ---
        function onResults(results) {
            loading.style.display = 'none';

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                
                // Map Landmarks to 3D World
                // MediaPipe: x (0-1), y (0-1), z (scaled relative to x)
                // Three.js: We need to project this to our camera view.
                
                // Simple projection:
                // Center is (0,0). Width/Height depends on Z.
                
                // We'll map 0..1 to -aspect..+aspect
                const aspect = window.innerWidth / window.innerHeight;
                const scale = 100; // World scale
                
                const positions = mesh.geometry.attributes.position.array;

                for (let i = 0; i < landmarks.length; i++) {
                    const lm = landmarks[i];
                    
                    // Flip X because webcam is mirrored usually
                    const x = (0.5 - lm.x) * 2.0 * scale * aspect; 
                    const y = (0.5 - lm.y) * 2.0 * scale;
                    const z = -lm.z * scale; // Depth

                    positions[i * 3] = x;
                    positions[i * 3 + 1] = y;
                    positions[i * 3 + 2] = z;
                }
                
                mesh.geometry.attributes.position.needsUpdate = true;
                
                // Dynamic Color based on mouth opening?
                // Index 13 (upper lip) and 14 (lower lip)
                const upper = landmarks[13];
                const lower = landmarks[14];
                const mouthOpen = Math.hypot(upper.x - lower.x, upper.y - lower.y);
                
                if (mouthOpen > 0.05) {
                    material.color.setHex(0xFF0055); // Red when talking
                } else {
                    material.color.setHex(CONFIG.color); // Cyan default
                }
            }
        }

        // --- Render Loop ---
        function animate() {
            requestAnimationFrame(animate);
            // Rotate slightly for 3D effect if no face detected? 
            // Or just static.
            
            composer.render();
        }
        animate();

        // --- Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Unified UI Protocol ---
        const UI_CONFIG = [
            { name: '点大小', value: 2.0, min: 1.0, max: 10.0, bind: 'size' },
            { name: '透明度', value: 0.8, min: 0.1, max: 1.0, bind: 'opacity' },
            { name: '颜色', value: '#00CAE0', type: 'color', bind: 'color' }
        ];

        function sendConfig() {
            if (window.parent) {
                window.parent.postMessage({
                    type: 'UI_CONFIG',
                    config: UI_CONFIG,
                    sources: [] // Source selection handled by MediaPipe internally (Webcam forced)
                }, '*');
            }
        }

        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data) return;

            if (data.type === 'HANDSHAKE') sendConfig();

            if (data.type === 'UPDATE_PARAM') {
                if (data.key === 'size') material.size = data.value;
                if (data.key === 'opacity') material.opacity = data.value;
                if (data.key === 'color') {
                    CONFIG.color = new THREE.Color(data.value).getHex();
                    material.color.setHex(CONFIG.color);
                }
            }
            
            if (data.type === 'SAVE_IMAGE') {
                 renderer.render(scene, camera);
                 const link = document.createElement('a');
                 link.download = 'cyber-face.png';
                 link.href = renderer.domElement.toDataURL('image/png');
                 link.click();
            }
        });

        sendConfig();

    </script>
</body>
</html>
