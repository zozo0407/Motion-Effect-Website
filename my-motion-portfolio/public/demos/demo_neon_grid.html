<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Synthwave Grid</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
    <!-- Import Map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "../js/libs/three/three.module.js",
                "three/addons/": "../js/libs/three/addons/"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import { UnifiedRenderer } from '../js/UnifiedRenderer.js';
        import * as THREE from 'three';

        // Synthwave Grid Shader
        const fragmentShader = `
            uniform float uTime;
            uniform vec2 uResolution;
            uniform float uSpeed;
            uniform vec3 uColor;
            uniform float uDensity;
            
            varying vec2 vUv;

            void main() {
                vec2 uv = (vUv - 0.5) * 2.0;
                uv.y -= 0.5; // Horizon adjustment
                
                // Perspective projection
                float battery = 1.0;
                vec2 p = uv;
                p.x *= p.y * 1.0; // Simple perspective
                
                // Grid Logic
                // We map the 2D UVs to a "3D" plane moving towards camera
                float z = 1.0 / max(0.001, abs(uv.y));
                float x = uv.x * z;
                
                // Movement
                float time = uTime * uSpeed;
                
                // Grid lines
                float gridX = step(0.98, fract(x * uDensity));
                float gridZ = step(0.98, fract((z + time) * uDensity));
                
                float grid = max(gridX, gridZ);
                
                // Fade into distance
                float fog = smoothstep(0.0, 0.8, abs(uv.y));
                
                // Glow
                float glow = (gridX + gridZ) * z * 0.05;
                
                // Sun
                float sunDist = length(uv - vec2(0.0, 0.2));
                float sun = smoothstep(0.3, 0.29, sunDist);
                // Sun stripes
                float stripes = step(0.1, sin(uv.y * 200.0 + uTime));
                if(uv.y > 0.0) sun *= stripes;

                vec3 finalColor = vec3(0.0);
                
                // Grid Color
                finalColor += vec3(grid) * uColor * fog;
                
                // Add Sun
                finalColor += vec3(1.0, 0.2, 0.5) * sun;
                
                // Background gradient
                finalColor += vec3(0.1, 0.0, 0.2) * (1.0 - uv.y);

                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        // Initialize Renderer
        new UnifiedRenderer({
            type: 'shader',
            fragmentShader: fragmentShader,
            params: {
                uSpeed: 2.0,
                uColor: new THREE.Color(0x00ffff), // Cyan
                uDensity: 1.0
            },
            init: (scope) => {
                // Setup UI
                scope.setUI({
                    uSpeed: { type: 'number', min: 0.1, max: 10.0, value: 2.0, label: 'Speed' },
                    uColor: { type: 'color', value: '#00ffff', label: 'Grid Color' },
                    uDensity: { type: 'number', min: 0.5, max: 5.0, value: 1.0, label: 'Density' }
                });
            },
            onParamChange: (key, value, scope) => {
                // UnifiedRenderer handles uniforms update automatically if names match
                // We just need to handle special cases if any
            }
        });
    </script>
</body>
</html>
