<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 24 - Particle Galaxy</title>
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script>
        // --- Configuration & Globals ---
        let scene, camera, renderer;
        let particleSystem;
        let galaxyTexture;
        let isRotating = true;
        let zoomLevel = 1.0;
        let mouse = new THREE.Vector2();
        
        // --- Communication Protocol ---
        const UI_CONFIG = [
            { name: 'Particle Count', value: 5000, min: 1000, max: 20000, step: 1000, bind: 'uCount' },
            { name: 'Rotation Speed', value: 0.5, min: 0.1, max: 2.0, step: 0.1, bind: 'uSpeed' },
            { name: 'Zoom', value: 1.0, min: 0.1, max: 3.0, step: 0.1, bind: 'uZoom' },
            { name: 'Pause Rotation', type: 'checkbox', value: true, bind: 'uPause' },
            { name: 'Reset', type: 'button', bind: 'cmd_reset', text: 'Reset Galaxy' }
        ];

        function sendConfig() {
            if (window.parent) {
                window.parent.postMessage({
                    type: 'UI_CONFIG',
                    config: UI_CONFIG
                }, '*');
            }
        }

        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data) return;

            if (data.type === 'HANDSHAKE') sendConfig();

            if (data.type === 'UPDATE_PARAM') {
                if (data.key === 'uCount') {
                    particleSystem.updateCount(parseInt(data.value));
                }
                if (data.key === 'uSpeed') {
                    particleSystem.rotationSpeed = parseFloat(data.value);
                }
                if (data.key === 'uZoom') {
                    zoomLevel = parseFloat(data.value);
                    camera.position.z = 10 / zoomLevel;
                }
                if (data.key === 'uPause') {
                    isRotating = data.value;
                }
                if (data.key === 'cmd_reset') {
                    resetGalaxy();
                }
            }
            
            // Standard Protocol: LOAD_SOURCE
            if (data.type === 'LOAD_SOURCE') {
                const src = data.source;
                if (src.type === 'image' || (src.type === 'file' && src.value.match(/\.(jpg|jpeg|png|gif)$/i))) {
                    const path = src.path || src.value || src.url;
                    if (path) {
                        new THREE.TextureLoader().load(path, (texture) => {
                            if (galaxyTexture) galaxyTexture.dispose();
                            galaxyTexture = texture;
                            particleSystem.updateTexture(galaxyTexture);
                        });
                    }
                }
            }
        });

        // --- Three.js Setup ---

        function setup() {
            const container = document.body;
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111); // White background
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 10;
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);
            
            // Create Galaxy Texture (Procedural)
            createGalaxyTexture();
            
            // Create Particle System
            particleSystem = new ParticleSystem(scene, 5000);
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);
            
            const pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.set(0, 0, 50);
            scene.add(pointLight);
            
            // Mouse Interaction
            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });
            
            sendConfig();
            animate();
        }

        function createGalaxyTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Draw spiral galaxy
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, 512, 512);
            
            const arms = 4;
            const starsPerArm = 1000;
            
            for (let i = 0; i < arms; i++) {
                const angle = (i / arms) * Math.PI * 2;
                const cx = 256;
                const cy = 256;
                
                for (let j = 0; j < starsPerArm; j++) {
                    const r = 50 + Math.random() * 150;
                    const a = angle + (j / starsPerArm) * Math.PI * 2;
                    const x = cx + Math.cos(a) * r * (1 - j / starsPerArm);
                    const y = cy + Math.sin(a) * r * (1 - j / starsPerArm);
                    
                    const hue = (i / arms) * 60 + (j / starsPerArm) * 30;
                    ctx.fillStyle = `hsl(${hue}, 80%, 60%)`;
                    ctx.beginPath();
                    ctx.arc(x, y, Math.random() * 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            galaxyTexture = new THREE.CanvasTexture(canvas);
        }

        function animate() {
            requestAnimationFrame(animate);
        }

        function animate() {
            if (isRotating) {
                particleSystem.rotation.y += particleSystem.rotationSpeed * 0.01;
            }
            
            particleSystem.update();
            particleSystem.render();
            
            renderer.render(scene, camera);
        }

        function resetGalaxy() {
            isRotating = true;
            particleSystem.rotation.y = 0;
        }

        function windowResized() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Particle System Class ---
        class ParticleSystem {
            constructor(scene, count) {
                this.scene = scene;
                this.count = count;
                this.rotationSpeed = 0.5;
                this.rotation = { x: 0, y: 0, z: 0 };
                this.particles = [];
                this.texture = null;
                
                this.init();
            }
            
            updateTexture(texture) {
                this.texture = texture;
                // Re-create particles with new texture
                this.dispose();
                this.init();
            }
            
            updateCount(newCount) {
                const diff = newCount - this.particles.length;
                if (diff > 0) {
                    for (let i = 0; i < diff; i++) {
                        this.addParticle();
                    }
                } else if (diff < 0) {
                    for (let i = 0; i < -diff; i++) {
                        if (this.particles.length > 0) {
                            this.particles[0].dispose();
                            this.particles.shift();
                        }
                    }
                }
                this.count = newCount;
            }
            
            init() {
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(this.count * 3);
                const colors = new Float32Array(this.count * 3);
                
                for (let i = 0; i < this.count; i++) {
                    const r = 5 + Math.random() * 10;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.random() * Math.PI * 2;
                    
                    const x = r * Math.sin(phi) * Math.cos(theta);
                    const y = r * Math.sin(phi) * Math.sin(theta);
                    const z = r * Math.cos(phi);
                    
                    positions[i * 3] = x;
                    positions[i * 3 + 1] = y;
                    positions[i * 3 + 2] = z;
                    
                    const color = new THREE.Color();
                    color.setHSL(Math.random() * 360, 0.7, 0.5);
                    colors[i * 3] = color.r;
                    colors[i * 3 + 1] = color.g;
                    colors[i * 3 + 2] = color.b;
                }
                
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                
                const material = new THREE.PointsMaterial({
                    size: 2,
                    vertexColors: true,
                    map: this.texture,
                    transparent: true,
                    opacity: 0.8,
                    sizeAttenuation: true,
                    blending: THREE.AdditiveBlending
                });
                
                this.mesh = new THREE.Points(geometry, material);
                this.scene.add(this.mesh);
                this.particles = new Array(this.count).fill(this.mesh);
            }
            
            update() {
                // Mouse interaction
                const targetRotationX = mouse.x * 0.5;
                const targetRotationY = mouse.y * 0.5;
                
                // Smoothly interpolate current rotation towards target
                this.rotation.x += (targetRotationX - this.rotation.x) * 0.05;
                this.rotation.y += (targetRotationY - this.rotation.y) * 0.05;
                
                // Apply rotation to mesh
                this.mesh.rotation.x = this.rotation.x;
                this.mesh.rotation.y = this.rotation.y;
                this.mesh.rotation.z = this.rotation.z;
            }
            
            render() {
                // No explicit render needed, handled by main loop
            }
            
            dispose() {
                if (this.mesh) {
                    this.scene.remove(this.mesh);
                    this.mesh.geometry.dispose();
                    this.mesh.material.dispose();
                }
            }
            
            addParticle() {
                if (this.particles.length < this.count) {
                    const r = 5 + Math.random() * 10;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.random() * Math.PI * 2;
                    
                    const x = r * Math.sin(phi) * Math.cos(theta);
                    const y = r * Math.sin(phi) * Math.sin(theta);
                    const z = r * Math.cos(phi);
                    
                    const positions = this.mesh.geometry.attributes.position.array;
                    const colors = this.mesh.geometry.attributes.color.array;
                    
                    const index = this.particles.length * 3;
                    positions[index] = x;
                    positions[index + 1] = y;
                    positions[index + 2] = z;
                    
                    const color = new THREE.Color();
                    color.setHSL(Math.random() * 360, 0.7, 0.5);
                    colors[index] = color.r;
                    colors[index + 1] = color.g;
                    colors[index + 2] = color.b;
                    
                    this.particles.push(this.mesh);
                }
                
                this.mesh.geometry.attributes.position.needsUpdate = true;
                this.mesh.geometry.attributes.color.needsUpdate = true;
                this.mesh.geometry.computeBoundingSphere();
            }
        }
    </script>
</body>
</html>
