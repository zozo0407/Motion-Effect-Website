<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 5 - Pose Detection</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.10/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.10/lib/addons/p5.sound.min.js"></script>
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #222;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        #status-text {
            margin-top: 20px;
            font-size: 18px;
            color: #00f0ff;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid #00f0ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #start-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #00f0ff;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="status-text">Loading System...</div>
        <button id="start-btn" onclick="startVideo()">Click to Start</button>
    </div>

    <script>
        let video;
        let poseNet;
        let poses = [];
        let modelReadyFlag = false;
        let videoWidth, videoHeight;
        let scaledWidth, scaledHeight;
        let offsetX, offsetY;

        // Status handling
        const statusText = document.getElementById('status-text');
        const loadingOverlay = document.getElementById('loading-overlay');
        const startBtn = document.getElementById('start-btn');

        function updateStatus(msg) {
            console.log(msg);
            if (statusText) statusText.innerText = msg;
        }

        // Colors
        const colors = [
            [239, 71, 111],   // #ef476f
            [255, 209, 102],  // #ffd166  
            [6, 214, 160],    // #06d6a0
            [17, 138, 178],   // #118ab2
            [7, 59, 76]       // #073b4c
        ];

        let keypointColors = {};
        let currentConfidenceThreshold = 0.5;

        const keypointNames = {
            0: 'nose', 1: 'leftEye', 2: 'rightEye', 3: 'leftEar', 4: 'rightEar',
            5: 'leftShoulder', 6: 'rightShoulder', 7: 'leftElbow', 8: 'rightElbow',
            9: 'leftWrist', 10: 'rightWrist', 11: 'leftHip', 12: 'rightHip',
            13: 'leftKnee', 14: 'rightKnee', 15: 'leftAnkle', 16: 'rightAnkle'
        };

        function setup() {
            createCanvas(windowWidth, windowHeight);
            background(30); 
            
            updateStatus('Initializing...');
            
            updateStatus('Loading Video...');
            initializeDefaultVideo();
            
            // Send Config Immediately
            sendConfig();
        }

        function initializeDefaultVideo() {
            if (video) video.remove();
            
            try {
                video = createVideo('../sample/sample1.mp4', videoLoaded);
                video.hide();
                video.volume(0);
                video.attribute('playsinline', '');
                video.attribute('muted', '');
                
                if (video.elt) {
                    video.elt.onerror = function() {
                        updateStatus('Error loading video file. Please check path.');
                        console.error('Video error:', video.elt.error);
                    };
                }
            } catch (e) {
                updateStatus('Exception creating video: ' + e.message);
            }
        }

        function initializeCamera() {
            updateStatus('Accessing Camera...');
            if (video) video.remove();
            
            video = createCapture(VIDEO, function() {
                updateStatus('Camera Access Granted');
            });
            video.size(640, 480);
            video.hide();

            video.elt.addEventListener('loadeddata', function() {
                updateStatus('Camera Ready. Loading Model...');
                videoWidth = video.elt.videoWidth;
                videoHeight = video.elt.videoHeight;
                calculateScaledDimensions();
                initializeModel();
            });
        }

        function videoLoaded() {
            updateStatus('Video Loaded. Starting playback...');
            videoWidth = video.elt.videoWidth;
            videoHeight = video.elt.videoHeight;
            
            video.elt.muted = true;
            video.elt.loop = true;
            video.elt.playsInline = true; 
            
            let playPromise = video.elt.play();
            
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    updateStatus('Playing. Loading Model...');
                    calculateScaledDimensions();
                    initializeModel();
                })
                .catch(error => {
                    console.error("Autoplay failed:", error);
                    updateStatus('Autoplay prevented. Click Start.');
                    startBtn.style.display = 'block';
                    document.querySelector('.spinner').style.display = 'none';
                });
            } else {
                updateStatus('Playing (Legacy). Loading Model...');
                calculateScaledDimensions();
                initializeModel();
            }
        }

        // Global function for the button
        window.startVideo = function() {
            if (video) {
                video.loop();
                startBtn.style.display = 'none';
                document.querySelector('.spinner').style.display = 'block';
                updateStatus('Playing. Loading Model...');
                calculateScaledDimensions();
                if (!poseNet) initializeModel();
            }
        };

        function calculateScaledDimensions() {
            if (!videoWidth || !videoHeight) return;
            const videoAspect = videoWidth / videoHeight;
            const windowAspect = width / height;
            
            if (windowAspect > videoAspect) {
                scaledHeight = height;
                scaledWidth = height * videoAspect;
            } else {
                scaledWidth = width;
                scaledHeight = width / videoAspect;
            }
            
            offsetX = (width - scaledWidth) / 2;
            offsetY = (height - scaledHeight) / 2;
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            calculateScaledDimensions();
        }

        function initializeModel() {
            updateStatus('Loading PoseNet Model...');
            if (poseNet) {
                poseNet.removeAllListeners();
            }
            
            poseNet = ml5.poseNet(video, {
                architecture: 'MobileNetV1',
                imageScaleFactor: 0.3,
                outputStride: 16,
                flipHorizontal: false,
                minConfidence: currentConfidenceThreshold,
                scoreThreshold: currentConfidenceThreshold,
                nmsRadius: 20,
                detectionType: 'single',
                multiplier: 0.75
            }, modelReady);
            
            poseNet.on('pose', function(results) {
                if (results.length > 0) {
                    poses = results;
                }
            });
        }

        function modelReady() {
            updateStatus('Model Ready!');
            modelReadyFlag = true;
            setTimeout(() => {
                loadingOverlay.style.display = 'none';
            }, 500);
        }

        function assignColorToKeypoint(keypointName) {
            if (!keypointColors[keypointName]) {
                const colorIndex = Math.floor(Math.random() * colors.length);
                keypointColors[keypointName] = colors[colorIndex];
            }
            return keypointColors[keypointName];
        }

        function draw() {
            background(0);
            
            if (video && (video.loadedmetadata || (video.elt && video.elt.readyState >= 1))) {
                push();
                translate(offsetX + scaledWidth, offsetY);
                scale(-1, 1);
                image(video, 0, 0, scaledWidth, scaledHeight);
                pop();
            }

            if (modelReadyFlag && poses.length > 0) {
                for (let pose of poses) {
                    if (pose.pose) {
                        drawPose(pose.pose);
                    }
                }
            }
        }

        function drawPose(pose) {
            let leftSideKeypoints = [];
            let rightSideKeypoints = [];
            
            for (let i = 0; i < pose.keypoints.length; i++) {
                const keypoint = pose.keypoints[i];
                if (keypoint.score > currentConfidenceThreshold) {
                    if (keypoint.position.x < videoWidth / 2) {
                        leftSideKeypoints.push({index: i, keypoint: keypoint});
                    } else {
                        rightSideKeypoints.push({index: i, keypoint: keypoint});
                    }
                }
            }
            
            leftSideKeypoints.sort((a, b) => a.keypoint.position.y - b.keypoint.position.y);
            rightSideKeypoints.sort((a, b) => a.keypoint.position.y - b.keypoint.position.y);
            
            const leftLabelX = width * 0.05;
            const rightLabelX = width * 0.95 - 50;
            
            drawSide(leftSideKeypoints, rightLabelX, 1, true); 
            drawSide(rightSideKeypoints, leftLabelX, -1, true);
        }

        function drawSide(keypoints, labelX, direction, isFlipped = false) {
            for (let j = 0; j < keypoints.length; j++) {
                const {index, keypoint} = keypoints[j];
                const keypointName = keypointNames[index] || `keypoint${index}`;
                const [r, g, b] = assignColorToKeypoint(keypointName);
                
                let screenX;
                if (isFlipped) {
                    screenX = map(keypoint.position.x, 0, videoWidth, offsetX + scaledWidth, offsetX);
                } else {
                    screenX = map(keypoint.position.x, 0, videoWidth, offsetX, offsetX + scaledWidth);
                }
                const scaledY = map(keypoint.position.y, 0, videoHeight, offsetY, offsetY + scaledHeight);
                
                fill(r, g, b);
                noStroke();
                rect(screenX - 1.5, scaledY - 1.5, 3, 3);
                
                const lineLength = 37.5;
                const lineEndX = screenX + (direction * lineLength * 0.7);
                const lineEndY = scaledY - lineLength * 0.7;
                
                const horizontalEndX = labelX;
                const horizontalEndY = lineEndY;
                
                stroke(r, g, b);
                strokeWeight(1);
                line(screenX, scaledY, lineEndX, lineEndY);
                line(lineEndX, lineEndY, horizontalEndX, horizontalEndY);
                
                const brightness = (r * 299 + g * 587 + b * 114) / 1000;
                const textColor = brightness > 128 ? [0, 0, 0] : [255, 255, 255];
                
                const labelY = horizontalEndY;
                const labelPadding = 4;
                const labelHeight = 16;
                fill(r, g, b);
                noStroke();
                const textW = textWidth(keypointName);
                rect(horizontalEndX, labelY - labelHeight/2 - labelPadding, 
                     textW + labelPadding * 2, 
                     labelHeight + labelPadding * 2);
                
                fill(textColor[0], textColor[1], textColor[2]);
                noStroke();
                textSize(12);
                textAlign(LEFT, CENTER);
                text(keypointName, horizontalEndX + labelPadding, labelY);
            }
        }

        // --- Unified Protocol ---

        const UI_CONFIG = [
            { name: '识别阈值', value: 0.5, min: 0.1, max: 0.9, step: 0.01, bind: 'threshold' }
        ];

        const SOURCE_OPTIONS = [
            { name: '默认视频', value: 'default', type: 'video' },
            { name: '🔴 实时摄像头', value: 'camera', type: 'camera' }
        ];

        function sendConfig() {
            if (window.parent) {
                window.parent.postMessage({
                    type: 'UI_CONFIG',
                    config: UI_CONFIG,
                    sources: SOURCE_OPTIONS
                }, '*');
            }
        }

        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data) return;

            if (data.type === 'HANDSHAKE') {
                sendConfig();
            }

            if (data.type === 'UPDATE_PARAM') {
                if (data.key === 'threshold') {
                    currentConfidenceThreshold = data.value;
                    if(poseNet) {
                        poseNet.minConfidence = currentConfidenceThreshold;
                        poseNet.scoreThreshold = currentConfidenceThreshold;
                    }
                }
            }

            if (data.type === 'LOAD_SOURCE') {
                const src = data.source;
                if (src.type === 'camera') {
                    initializeCamera();
                } else if (src.type === 'video') {
                    if (video) video.remove();
                    updateStatus('Loading source...');
                    video = createVideo(src.path, videoLoaded);
                    video.hide();
                    video.volume(0);
                }
            }

            if (data.type === 'START_REC') {
                startRecording();
            }

            if (data.type === 'STOP_REC') {
                stopRecording();
            }

            if (data.type === 'SAVE_IMAGE') {
                saveCanvas('pose-capture', 'png');
            }
        });

        // Recording Logic
        let recorder;
        let chunks = [];

        function startRecording() {
            const canvas = document.querySelector('canvas');
            if (!canvas) return;
            
            // 60 FPS capture
            const stream = canvas.captureStream(60);
            // Try supported mime types
            let mimeType = 'video/webm';
            if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) {
                mimeType = 'video/webm;codecs=vp9';
            } else if (MediaRecorder.isTypeSupported('video/webm;codecs=vp8')) {
                mimeType = 'video/webm;codecs=vp8';
            }

            try {
                recorder = new MediaRecorder(stream, { mimeType: mimeType });
                chunks = [];
                
                recorder.ondataavailable = e => {
                    if (e.data.size > 0) chunks.push(e.data);
                };
                
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: mimeType });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'pose-recording.webm';
                    a.click();
                };
                
                recorder.start();
                updateStatus('Recording started...');
            } catch (e) {
                console.error("Recording failed", e);
                updateStatus('Recording failed: ' + e.message);
            }
        }

        function stopRecording() {
            if (recorder && recorder.state !== 'inactive') {
                recorder.stop();
                updateStatus('Recording stopped.');
            }
        }

    </script>
</body>
</html>
