<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standard Particle Demo</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
    </style>
    <!-- Import Maps Polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { UnifiedRenderer } from '../js/UnifiedRenderer.js';
        import { ParticleSystem } from '../js/modules/ParticleSystem.js';
        import { useBloom } from '../js/modules/PostProcessing.js';

        let particles;

        new UnifiedRenderer({
            type: 'three',
            
            // Initial Parameters
            params: {
                shape: 'spiral',
                palette: 'christmas',
                count: 8000,
                bloom: 1.5,
                scatter: false
            },

            // Initialization
            init: (sketch) => {
                const { scene, params } = sketch;

                // 1. Initialize Particle System Module
                particles = new ParticleSystem(sketch, {
                    count: params.count,
                    size: 0.15
                });

                // Set initial state
                particles.setShape(params.shape);
                particles.setPalette(params.palette);

                // 2. Add Post Processing (Bloom)
                const bloom = useBloom(sketch, { strength: params.bloom });

                // 3. Setup UI
                sketch.setUI([
                    { name: 'Shape', type: 'select', value: 'spiral', options: ['spiral', 'sphere', 'cube'], bind: 'shape' },
                    { name: 'Scatter', type: 'checkbox', value: false, bind: 'scatter' },
                    { name: 'Palette', type: 'select', value: 'christmas', options: ['christmas', 'cyberpunk', 'sunset', 'default'], bind: 'palette' },
                    { name: 'Bloom Strength', value: 1.5, min: 0, max: 3, step: 0.1, bind: 'bloom' }
                ]);
            },

            // Parameter Handling
            onParamChange: (key, value, sketch) => {
                if (!particles) return;

                if (key === 'shape') {
                    sketch.params.shape = value; // Store for scatter toggle
                    if (!sketch.params.scatter) {
                         particles.setShape(value);
                    }
                }
                else if (key === 'scatter') {
                    sketch.params.scatter = value;
                    if (value) {
                        particles.setShape('explosion');
                    } else {
                        particles.setShape(sketch.params.shape || 'spiral');
                    }
                }
                else if (key === 'palette') {
                    particles.setPalette(value);
                }
                else if (key === 'bloom') {
                    // Access bloom pass from sketch (injected by useBloom)
                    if (sketch.bloomPass) sketch.bloomPass.strength = value;
                }
            }
        });
    </script>
</body>
</html>
