<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Template Demo (p5.js)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
    </style>
    <!-- Import Maps Polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <!-- p5.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <script type="module">
        import { UnifiedRenderer } from '../js/UnifiedRenderer.js';

        new UnifiedRenderer({
            type: 'p5',
            
            // Initial Parameters
            params: {
                circleSize: 50,
                colorR: 255,
                colorG: 100,
                colorB: 100,
                speed: 2.0
            },

            // Initialization
            init: (p, sketch) => {
                const { params } = sketch;
                p.background(0);
                p.noStroke();

                // Define UI
                sketch.setUI([
                    { name: 'Circle Size', value: params.circleSize, min: 10, max: 200, bind: 'circleSize' },
                    { name: 'Red', value: params.colorR, min: 0, max: 255, step: 1, bind: 'colorR' },
                    { name: 'Speed', value: params.speed, min: 0.1, max: 10, step: 0.1, bind: 'speed' }
                ]);
            },

            // Draw Loop
            draw: (p, sketch) => {
                const { params } = sketch;
                
                // Semi-transparent background for trail effect
                p.fill(0, 20);
                p.rect(0, 0, p.width, p.height);

                // Calculate position based on time
                const time = p.millis() / 1000;
                const x = p.width / 2 + Math.sin(time * params.speed) * 200;
                const y = p.height / 2 + Math.cos(time * params.speed * 1.5) * 100;

                // Draw Circle
                p.fill(params.colorR, params.colorG, params.colorB);
                p.circle(x, y, params.circleSize);
            },

            // Parameter Handling
            onParamChange: (key, value, sketch) => {
                // In p5 usually we just read params in draw loop, 
                // but we can react to events here if needed.
                if (key === 'circleSize') {
                    console.log('Size changed to:', value);
                }
            }
        });
    </script>
</body>
</html>
