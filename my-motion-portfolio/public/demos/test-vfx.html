<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFX Engine Test — Bloom + Glitch</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #container { width: 100vw; height: 100vh; }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { UnifiedRenderer } from '../js/UnifiedRenderer.js';

        const renderer = new UnifiedRenderer({
            container: document.getElementById('container'),
            type: 'three',
            showStats: true,
            init(sketch) {
                sketch.scene.background = new THREE.Color(0x050510);

                const geometry = new THREE.TorusKnotGeometry(1.2, 0.4, 200, 32);
                const material = new THREE.MeshStandardMaterial({
                    color: 0x00f2ff,
                    emissive: 0x003344,
                    emissiveIntensity: 0.8,
                    metalness: 0.7,
                    roughness: 0.2,
                });
                const mesh = new THREE.Mesh(geometry, material);
                sketch.scene.add(mesh);
                sketch.mesh = mesh;

                const ambientLight = new THREE.AmbientLight(0x111122, 0.5);
                sketch.scene.add(ambientLight);

                const pointLight1 = new THREE.PointLight(0x00f2ff, 2, 20);
                pointLight1.position.set(3, 3, 3);
                sketch.scene.add(pointLight1);

                const pointLight2 = new THREE.PointLight(0xff0040, 1.5, 20);
                pointLight2.position.set(-3, -2, 2);
                sketch.scene.add(pointLight2);

                sketch.camera.position.set(0, 0, 5);

                sketch.addBloom({ strength: 1.5, radius: 0.4, threshold: 0.0 });
                sketch.addGlitch({ intensity: 0.3 });

                sketch.setUI([
                    { name: '发光强度', value: 1.5, min: 0, max: 3, step: 0.1, bind: 'bloomStrength', type: 'range' },
                    { name: '故障程度', value: 0.3, min: 0, max: 1, step: 0.05, bind: 'glitchIntensity', type: 'range' },
                ]);
            },

            update(sketch, time, deltaTime) {
                if (sketch.mesh) {
                    sketch.mesh.rotation.x += 0.3 * deltaTime;
                    sketch.mesh.rotation.y += 0.5 * deltaTime;
                }
            }
        });
    </script>
</body>
</html>
