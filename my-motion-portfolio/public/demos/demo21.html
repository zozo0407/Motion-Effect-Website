<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 21 - Gesture Grid</title>
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        
        /* Vision UI - Corner Debugger */
        #vision-ui {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 240px;
            height: 180px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            overflow: hidden;
            z-index: 1000;
            pointer-events: none; /* Let clicks pass through */
        }
        #vision-video {
            display: none; /* Hidden, we process it but don't show raw video usually, or show in canvas */
        }
        #vision-canvas {
            width: 100%;
            height: 100%;
            transform: scaleX(-1); /* Mirror for natural interaction */
        }
        .vision-label {
            position: absolute;
            top: 5px;
            left: 5px;
            color: rgba(255, 255, 255, 0.7);
            font-family: monospace;
            font-size: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 4px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- Vision UI Container -->
    <div id="vision-ui">
        <div class="vision-label">VISION DEBUGGER</div>
        <video id="vision-video" playsinline></video>
        <canvas id="vision-canvas"></canvas>
    </div>

    <script>
        // --- Configuration & Globals ---
        
        // Roni Kaufman's Grid logic variables
        let n = 10; 
        let sections = []; 
        let weights1 = []; 
        let weights2 = []; 
        
        let imgWidth, imgHeight; 
        let wMargin, hMargin; 
        let phase = 0; 
        
        let img; 
        let t = 0; // interpolation factor
        
        // Hand tracking variables
        let handPoints = [];
        let isHandDetected = false;
        
        // MediaPipe
        let hands;
        let camera;
        let visionCanvasElement;
        let visionCanvasCtx;

        // --- Communication Protocol ---
        const UI_CONFIG = [
            { name: 'Grid Size', value: 10, min: 4, max: 20, step: 2, bind: 'uGrid' },
            { name: 'Phase', type: 'select', options: ['Deform', 'Stretch', 'Hide Grid'], value: 'Deform', bind: 'uPhase' },
            { name: 'Reset', type: 'button', bind: 'cmd_reset', text: 'Reset Grid' }
        ];

        function sendConfig() {
            if (window.parent) {
                window.parent.postMessage({
                    type: 'UI_CONFIG',
                    config: UI_CONFIG
                }, '*');
            }
        }

        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data) return;

            if (data.type === 'HANDSHAKE') sendConfig();

            if (data.type === 'UPDATE_PARAM') {
                if (data.key === 'uGrid') {
                    n = parseInt(data.value);
                    setupGrid();
                }
                if (data.key === 'uPhase') {
                    if (data.value === 'Deform') phase = 0;
                    else if (data.value === 'Stretch') phase = 1;
                    else if (data.value === 'Hide Grid') phase = 2;
                }
                if (data.key === 'cmd_reset') {
                    handX = 0.5;
                    handY = 0.5;
                    updateWeights();
                }
            }
            
            if (data.type === 'LOAD_SOURCE') {
                 const src = data.source;
                // Handle image upload
                if (src.type === 'image' || (src.type === 'file' && src.value.match(/\.(jpg|jpeg|png|gif)$/i))) {
                    const path = src.path || src.value || src.url;
                    if (path) {
                         loadImage(path, (loadedImg) => {
                            img = loadedImg;
                            setupGrid();
                        });
                    }
                }
                // Handle Camera Input Source
                if (src.type === 'camera') {
                    // Start a separate capture for texture if needed, 
                    // or reuse the MediaPipe video element if accessible?
                    // MediaPipe video element is #vision-video.
                    // We can draw it to a p5 graphic or use it as image.
                    const videoEl = document.getElementById('vision-video');
                    // Create a p5 video wrapper for it? 
                    // Actually we can just draw the video element to p5 canvas directly.
                    // But p5 needs an image object.
                    // Let's create a p5 graphic that updates from video.
                    
                    // Simple hack: set img to a special object or flag
                    // Or update img every frame from video.
                    // Let's try grabbing the video element directly.
                    // Note: This might be heavy if grid slicing happens every frame.
                    // Grid slicing happens in setupGrid(). 
                    // If we want real-time video grid, we need to re-slice every frame!
                    // Roni's algo pre-slices in setup(). 
                    // Real-time video grid deformation is expensive in this approach (drawing many image segments).
                    // BUT, we can do it.
                    
                    // For now, let's stick to the "Snapshot" approach for performance, 
                    // OR try real-time if requested "Magic Mirror".
                    // The user said "If it identifies camera... put info overlay".
                    // Let's stick to Snapshot for 'camera' source to keep the "Grid" effect stable.
                    // Or maybe update `img` once per second?
                    
                    // Let's implement Snapshot mode for "Camera Source"
                    if (videoEl && videoEl.readyState === 4) {
                        // Capture current frame
                        let cap = createImage(videoEl.videoWidth, videoEl.videoHeight);
                        cap.drawingContext.drawImage(videoEl, 0, 0);
                        img = cap;
                        setupGrid();
                    }
                }
            }
        });

        // --- MediaPipe Setup ---
        function onResults(results) {
            // Update Vision Debugger Canvas
            visionCanvasCtx.save();
            visionCanvasCtx.clearRect(0, 0, visionCanvasElement.width, visionCanvasElement.height);
            visionCanvasCtx.drawImage(results.image, 0, 0, visionCanvasElement.width, visionCanvasElement.height);
            
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    isHandDetected = true;
                    handPoints = [];
                    for (let k = 0; k < Math.min(2, results.multiHandLandmarks.length); k++) {
                        const landmarks = results.multiHandLandmarks[k];
                        drawConnectors(visionCanvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
                        drawLandmarks(visionCanvasCtx, landmarks, {color: '#FF0000', lineWidth: 1, radius: 3});
                        const indexTip = landmarks[8];
                        handPoints.push({ x: 1 - indexTip.x, y: indexTip.y });
                    }
                } else {
                    isHandDetected = false;
                    handPoints = [];
                }
            visionCanvasCtx.restore();
        }

        // --- p5.js Sketch ---

        function preload() { 
            // Try to load sample image by default
            img = loadImage("../sample/Sample1.jpg", 
                () => { console.log("Sample loaded"); },
                () => { 
                    console.log("Sample failed, trying asset");
                    img = loadImage("../assets/demo21/courbet.jpg"); 
                }
            );
        } 

        function setup() { 
            createCanvas(windowWidth, windowHeight); 
            
            // Setup Vision UI
            const videoElement = document.getElementById('vision-video');
            visionCanvasElement = document.getElementById('vision-canvas');
            visionCanvasCtx = visionCanvasElement.getContext('2d');
            
            // Initialize MediaPipe Hands
            hands = new Hands({locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }});
            
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            
            hands.onResults(onResults);
            
            // Start Camera
            camera = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({image: videoElement});
                },
                width: 640,
                height: 480
            });
            camera.start();
            
            // Set Vision Canvas size to match video aspect (4:3 usually)
            visionCanvasElement.width = 640;
            visionCanvasElement.height = 480;
            
            setupGrid();
            sendConfig();
        } 
        
        function setupGrid() {
            if (!img) return;
            
            sections = [...Array(n)].map((e) => Array(n));
            weights1 = [];
            weights2 = [];
            
            let scale = min((width * 0.9) / img.width, (height * 0.9) / img.height);
            imgWidth = img.width * scale;
            imgHeight = img.height * scale;
            
            wMargin = (width - imgWidth) / 2;
            hMargin = (height - imgHeight) / 2;
            
            let w = img.width/n, h = img.height/n; 
            for (let i = 0; i < n; i++) { 
                let x = i*w; 
                for (let j = 0; j < n; j++) { 
                    let y = j*h; 
                    sections[i][j] = img.get(x, y, w, h); 
                } 
            } 
            
            // Init weights
            for (let i = 0; i < n; i++) { 
                weights1.push([1, 1]); 
                weights2.push([1, 1]); 
            } 
        }

        function draw() { 
            background(0); 
            if (!img) return;

            // Update Weights based on Hand Position
            updateWeights();
            
            let lerpedWeights = []; 
            let wSum = 0, hSums = []; 
            
            for (let i = 0; i < n; i++) {
                // Smooth transition
                weights1[i][0] = lerp(weights1[i][0], weights2[i][0], 0.1);
                weights1[i][1] = lerp(weights1[i][1], weights2[i][1], 0.1);
                
                let w = weights1[i][0];
                wSum += w;
                
                let hSum = 0; 
                let weightsLine = [];
                for (let j = 0; j < n; j++) { 
                    let h = weights1[j][1];
                    hSum += h; 
                    weightsLine.push([w, h]); 
                } 
                hSums.push(hSum); 
                lerpedWeights.push(weightsLine); 
            } 
            
            let x = wMargin; 
            let uw = imgWidth/wSum; 
            
            for (let i = 0; i < n; i++) { 
                let y = hMargin; 
                let uh = imgHeight/hSums[i]; 
                let w = lerpedWeights[i][0][0]*uw; 
                
                for (let j = 0; j < n; j++) { 
                    let h = lerpedWeights[i][j][1]*uh; 
                    let section = sections[i][j]; 
                    
                    // Draw Image
                    image(section, x, y, w+1, h+1); 
                    
                    // Draw Grid
                    let sw = 1.5; 
                    if (phase == 0) { // Deform
                        strokeWeight(sw); 
                        noFill();
                        stroke(255, 0, 0); 
                    } else if (phase == 1) { // Stretch
                        noFill(); 
                        strokeWeight(sw); 
                        stroke(0, 255, 0);
                    } else { // Hide
                        noStroke();
                        noFill();
                    } 
                    
                    if (phase !== 2) {
                        rect(x, y, w+1, h+1); 
                    }
                    
                    y += h; 
                } 
                x += w; 
            } 
            
            // Draw Hand Cursor
            if (isHandDetected) {
                for (let p of handPoints) {
                    noStroke();
                    fill(255, 0, 0, 200);
                    circle(p.x * width, p.y * height, 20);
                    fill(255);
                    textAlign(CENTER);
                    text("👆", p.x * width, p.y * height - 20);
                }
            } else {
                // Guide text
                fill(255);
                textAlign(CENTER);
                text("Waiting for hand...", width/2, height - 20);
            }
        } 
        
        function updateWeights() {
            if (!isHandDetected) {
                // If no hand, reset weights to 1 (normal grid)
                for (let i = 0; i < n; i++) {
                    weights2[i] = [1, 1];
                }
                return;
            }

            // Map handX/handY to weights
            for (let i = 0; i < n; i++) {
                let colPos = (i + 0.5) / n;
                let rowPos = (i + 0.5) / n;
                let w = 1;
                let h = 1;
                for (let p of handPoints) {
                    let distW = abs(colPos - p.x);
                    let distH = abs(rowPos - p.y);
                    let wInfluence = map(distW, 0, 0.5, 10, 1);
                    let hInfluence = map(distH, 0, 0.5, 10, 1);
                    w += max(0, wInfluence - 1);
                    h += max(0, hInfluence - 1);
                }
                w = constrain(w, 1, 14);
                h = constrain(h, 1, 14);
                weights2[i] = [w, h];
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            setupGrid();
        }
    </script>
</body>
</html>
