<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 6 - ASCII Effect</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: #ffffff;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        #video-hidden {
            display: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">ASCII Effect - Drag to Rotate</div>
    
    <!-- Hidden Video Element -->
    <video id="video-hidden" playsinline webkit-playsinline loop muted crossorigin="anonymous"></video>

    <script type="module">
        import * as THREE from 'three';
        import { AsciiEffect } from 'three/addons/effects/AsciiEffect.js';
        import { TrackballControls } from 'three/addons/controls/TrackballControls.js';

        let camera, controls, scene, renderer, effect;
        let sphere, plane; // 3D Objects
        let videoMesh, videoTexture; // Video Objects
        let videoElement;
        const start = Date.now();

        // Configuration State
        const cfg = {
            resolution: 0.15,
            invert: true,
            color: false,
            speed: 1.0,
            charSetType: 'default',
            source: 'video', // Default to video
            customString: '龙年大吉' // Default custom string
        };

        const charSets = {
            'default': ' .:-+*=%@#',
            'block': ' ░▒▓█',
            'binary': ' 01',
            'dense': ' .`^",:;Il!i~+_-?][}{1)(|\\/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$',
            'custom': '' // Will be filled dynamically
        };

        // --- Helper: Sort characters by pixel density ---
        function sortCharsByDensity(text) {
            // Remove duplicates
            const uniqueChars = Array.from(new Set(text.split('')));
            if (uniqueChars.length === 0) return ' ';

            // Create off-screen canvas
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const size = 30;
            canvas.width = size;
            canvas.height = size;
            ctx.font = `${size}px monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const densities = uniqueChars.map(char => {
                // Clear canvas
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, size, size);
                
                // Draw character in black
                ctx.fillStyle = 'black';
                ctx.fillText(char, size/2, size/2);
                
                // Count black pixels (non-255)
                const imgData = ctx.getImageData(0, 0, size, size).data;
                let blackPixels = 0;
                for (let i = 0; i < imgData.length; i += 4) {
                    // Check R channel (since it's grayscale, R=G=B)
                    // If < 255, it has some "ink"
                    if (imgData[i] < 255) {
                        blackPixels++;
                    }
                }
                return { char, density: blackPixels };
            });

            // Sort by density (ascending: least ink -> most ink)
            // ' ' (space) has 0 ink -> index 0
            // '@' has lot of ink -> last index
            densities.sort((a, b) => a.density - b.density);

            return densities.map(item => item.char).join('');
        }

        init();

        function init() {
            // Setup Video Element
            videoElement = document.getElementById('video-hidden');

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.y = 150;
            camera.position.z = 500;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0, 0, 0);

            // Lights
            const pointLight1 = new THREE.PointLight(0xffffff, 3, 0, 0);
            pointLight1.position.set(500, 500, 500);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0xffffff, 1, 0, 0);
            pointLight2.position.set(-500, -500, -500);
            scene.add(pointLight2);

            // --- 3D Scene Objects ---
            sphere = new THREE.Mesh(
                new THREE.SphereGeometry(200, 20, 10), 
                new THREE.MeshPhongMaterial({ flatShading: true })
            );
            scene.add(sphere);

            plane = new THREE.Mesh(
                new THREE.PlaneGeometry(400, 400), 
                new THREE.MeshBasicMaterial({ color: 0xe0e0e0 })
            );
            plane.position.y = -200;
            plane.rotation.x = -Math.PI / 2;
            scene.add(plane);

            // --- Video Object ---
            // Create a plane that fills the camera view roughly
            const videoGeo = new THREE.PlaneGeometry(1600, 900); // 16:9 Aspect
            videoTexture = new THREE.VideoTexture(videoElement);
            videoTexture.minFilter = THREE.LinearFilter;
            videoTexture.magFilter = THREE.LinearFilter;
            
            const videoMat = new THREE.MeshBasicMaterial({ 
                map: videoTexture,
                side: THREE.DoubleSide
            });
            videoMesh = new THREE.Mesh(videoGeo, videoMat);
            videoMesh.visible = false;
            // Face camera
            videoMesh.position.set(0, 0, -200); 
            scene.add(videoMesh);

            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);

            // Initialize Effect
            // Initial sort for default custom string
            if (cfg.customString) {
                charSets['custom'] = sortCharsByDensity(cfg.customString);
            }
            createEffect();
            
            // Set initial state based on default source
            updateSource();

            window.addEventListener('resize', onWindowResize);
            
            // Start Loop
            animate();
            
            // Handshake for UI
            if (window.parent) {
                window.parent.postMessage({ type: 'HANDSHAKE' }, '*');
            }
        }

        function createEffect() {
            // Cleanup existing
            if (effect && effect.domElement.parentNode) {
                effect.domElement.parentNode.removeChild(effect.domElement);
            }
            if (controls) {
                controls.dispose();
            }

            // Handle Custom Charset
            if (cfg.charSetType === 'custom') {
                // If custom string is provided, use the sorted version
                // The sorting is done when the string is updated
                if (!charSets['custom']) {
                    charSets['custom'] = sortCharsByDensity(cfg.customString || 'Custom');
                }
            }

            const chars = charSets[cfg.charSetType] || charSets.default;
            
            effect = new AsciiEffect(renderer, chars, { 
                invert: cfg.invert,
                color: cfg.color,
                resolution: cfg.resolution
            });
            effect.setSize(window.innerWidth, window.innerHeight);
            effect.domElement.style.color = 'white';
            effect.domElement.style.backgroundColor = 'black';

            document.body.appendChild(effect.domElement);

            controls = new TrackballControls(camera, effect.domElement);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();

            renderer.setSize(window.innerWidth, window.innerHeight);
            effect.setSize(window.innerWidth, window.innerHeight);
        }

        // Source Management
        function updateSource() {
            // Reset visibilities
            sphere.visible = false;
            plane.visible = false;
            videoMesh.visible = false;

            // Stop any active streams
            if (videoElement.srcObject) {
                const tracks = videoElement.srcObject.getTracks();
                tracks.forEach(track => track.stop());
                videoElement.srcObject = null;
            }

            if (cfg.source === 'scene') {
                sphere.visible = true;
                plane.visible = true;
                videoElement.pause();
                document.getElementById('info').innerText = "ASCII Effect - Drag to Rotate";
            } else if (cfg.source === 'video') {
                videoMesh.visible = true;
                videoElement.src = '../sample/sample1.mp4';
                videoElement.play().catch(e => console.log("Auto-play blocked", e));
                document.getElementById('info').innerText = "ASCII Video - Playing Sample";
            } else if (cfg.source === 'camera') {
                videoMesh.visible = true;
                document.getElementById('info').innerText = "ASCII Camera - Requesting Access...";
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                    navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720, facingMode: 'user' } })
                        .then(function (stream) {
                            videoElement.srcObject = stream;
                            videoElement.play();
                            document.getElementById('info').innerText = "ASCII Camera - Live";
                        })
                        .catch(function (error) {
                            console.error('Unable to access the camera/webcam.', error);
                            document.getElementById('info').innerText = "Camera Access Denied";
                        });
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            const timer = Date.now() - start;

            // Animate Scene Objects
            if (cfg.source === 'scene') {
                sphere.position.y = Math.abs(Math.sin(timer * 0.002 * cfg.speed)) * 150;
                sphere.rotation.x = timer * 0.0003 * cfg.speed;
                sphere.rotation.z = timer * 0.0002 * cfg.speed;
            } else {
                // For video/camera, ensure texture updates
                // Three.js VideoTexture handles updates automatically if video is playing
                
                // Make the video plane always face the camera
                videoMesh.lookAt(camera.position);
            }

            controls.update();

            effect.render(scene, camera);
        }

        // --- UI Communication ---
        window.addEventListener('message', (e) => {
            if (!e.data) return;

            // 1. Handshake Response
            if (e.data.type === 'HANDSHAKE') {
                const uiConfig = [
                    { name: '源模式 / Source', type: 'select', value: 'scene', options: [
                        { name: '3D 场景', value: 'scene' },
                        { name: '示例视频', value: 'video' },
                        { name: '实时摄像头', value: 'camera' }
                    ], bind: 'set_source' },
                    { name: '分辨率 / Resolution', value: 0.15, min: 0.05, max: 0.3, step: 0.01, bind: 'resolution' },
                    { name: '反色 / Invert', value: true, type: 'checkbox', bind: 'invert' },
                    { name: '彩色 / Color', value: false, type: 'checkbox', bind: 'color' },
                    { name: '动画速度 / Speed', value: 1.0, min: 0.0, max: 3.0, step: 0.1, bind: 'speed' },
                    { 
                        name: '字符集 / Charset', 
                        type: 'row', 
                        children: [
                            { type: 'button', text: '默认', bind: 'set_default', value: 'default' },
                            { type: 'button', text: '方块', bind: 'set_block', value: 'block' },
                            { type: 'button', text: '密集', bind: 'set_dense', value: 'dense' },
                            { type: 'button', text: '自定义', bind: 'set_custom_text', value: 'custom' }
                        ]
                    }
                ];
                window.parent.postMessage({ type: 'UI_CONFIG', config: uiConfig }, '*');
            }

            // 2. Parameter Update
            if (e.data.type === 'UPDATE_PARAM') {
                const { key, value } = e.data;
                
                // Source Switching
                if (key === 'set_source') {
                    cfg.source = value;
                    updateSource();
                    return;
                }

                // Handle Buttons (Charsets)
                if (key.startsWith('set_')) {
                    if (key === 'set_custom_text') {
                        // Prompt user for input
                        const input = prompt("请输入自定义字符 (建议输入由深到浅排列的字符，或任何你想展示的文字):", cfg.customString);
                        if (input !== null && input.trim() !== '') {
                            cfg.customString = input;
                            // Sort the new input by density
                            charSets['custom'] = sortCharsByDensity(cfg.customString);
                            cfg.charSetType = 'custom';
                            createEffect();
                        }
                    } else {
                        cfg.charSetType = value;
                        createEffect();
                    }
                    return;
                }

                // Handle Standard Params
                if (key in cfg) {
                    cfg[key] = value;
                    
                    // Re-create effect for structural changes
                    if (['resolution', 'invert', 'color'].includes(key)) {
                        createEffect();
                    }
                }
            }
        });
    </script>
</body>
</html>
