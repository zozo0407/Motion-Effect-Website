<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Splat - 3D Gaussian Splatting</title>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00CAE0; font-family: monospace; font-size: 20px; pointer-events: none; }
        
        /* Left Side UI */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .hud-panel {
            position: absolute;
            top: 20%;
            left: 40px;
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .hud-item {
            background: linear-gradient(90deg, rgba(0, 202, 224, 0.1), transparent);
            border-left: 3px solid #00CAE0;
            color: #00CAE0;
            padding: 12px 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            opacity: 0;
            transform: translateX(-30px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            text-shadow: 0 0 5px rgba(0, 202, 224, 0.5);
            letter-spacing: 1px;
        }
        
        .hud-item.visible {
            opacity: 1;
            transform: translateX(0);
        }
        
        .hud-label {
            font-size: 10px;
            opacity: 0.7;
            margin-bottom: 4px;
            display: block;
        }
        
        .hud-value {
            font-weight: bold;
            font-size: 16px;
        }

        /* Scanline effect */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 202, 224, 0.5);
            position: absolute;
            bottom: 0;
            left: 0;
            animation: scan 2s infinite linear;
        }
        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
    <!-- Import Maps Polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">LOADING SPLAT...</div>
    
    <div id="ui-layer">
        <div class="hud-panel">
            <div class="hud-item">
                <span class="hud-label">SYSTEM STATUS</span>
                <span class="hud-value">INITIALIZING...</span>
                <div class="scanline"></div>
            </div>
            <div class="hud-item" style="transition-delay: 0.2s">
                <span class="hud-label">RENDER MODE</span>
                <span class="hud-value">GAUSSIAN SPLAT</span>
            </div>
            <div class="hud-item" style="transition-delay: 0.4s">
                <span class="hud-label">MEMORY USAGE</span>
                <span class="hud-value">OPTIMAL</span>
            </div>
            <div class="hud-item" style="transition-delay: 0.6s">
                <span class="hud-label">TARGET</span>
                <span class="hud-value">PLUSH.SPLAT</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { UnifiedRenderer } from '../js/UnifiedRenderer.js';

        // 3D Gaussian Splatting Demo
        // Uses a sample .splat file from a public repository
        // Note: Splat files can be large. This is a small sample (Garden).
        
        new UnifiedRenderer({
            type: 'splat',
            
            // Public sample URL (Garden scene)
            params: {
                // Using a known working, smaller splat file from antimatter15's repo (the creator of the web viewer)
                // The Garden file on HuggingFace might be too large or have CORS issues or require heavy processing.
                // Let's try the classic "Truck" or "Garden" from a direct CDN that is optimized for web.
                url: '../assets/models/plush.splat'
            },
            
            init: (renderer) => {
                renderer.setUI([
                    { name: 'Info', type: 'text', value: 'Drag to Rotate, Scroll to Zoom' }
                ]);
                
                // --- Camera Intro Animation ---
                if(renderer.camera) {
                    // Initial Position (Far away and high)
                    // We manually set it here, overriding the default
                    renderer.camera.position.set(0, 5, 10);
                    renderer.camera.lookAt(0, 0, 0);

                    // Target Position
                    const targetPos = { x: 0, y: 1, z: 2 };
                    
                    new TWEEN.Tween(renderer.camera.position)
                        .to(targetPos, 2500)
                        .easing(TWEEN.Easing.Cubic.Out)
                        .onUpdate(() => {
                            renderer.camera.lookAt(0, 0, 0);
                        })
                        .delay(500)
                        .start();
                }

                // --- UI Animation ---
                // Trigger visibility
                setTimeout(() => {
                    const items = document.querySelectorAll('.hud-item');
                    items.forEach(item => item.classList.add('visible'));
                    
                    // Update text after a while
                    setTimeout(() => {
                        const status = document.querySelector('.hud-item:first-child .hud-value');
                        if(status) {
                            status.innerText = "ONLINE";
                            status.style.color = "#fff";
                            status.style.textShadow = "0 0 10px #fff";
                        }
                    }, 3500);
                }, 1000);

                // --- Animation Loop for Tween ---
                // Since Splat renderer might not run our loop callback, we run a separate one for UI/Tween
                function animate() {
                    requestAnimationFrame(animate);
                    TWEEN.update();
                }
                animate();
            }
        });
    </script>
</body>
</html>
