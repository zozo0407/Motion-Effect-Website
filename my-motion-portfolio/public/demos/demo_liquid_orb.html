<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Raymarching Orb</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "../js/libs/three/three.module.js",
                "three/addons/": "../js/libs/three/addons/"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import { UnifiedRenderer } from '../js/UnifiedRenderer.js';
        import * as THREE from 'three';

        const fragmentShader = `
            uniform float uTime;
            uniform vec2 uResolution;
            uniform float uDistortion;
            uniform vec3 uColor;
            uniform float uSpeed;

            // SDF Primitives
            float sdSphere(vec3 p, float s) {
                return length(p) - s;
            }

            // Smooth Min
            float smin(float a, float b, float k) {
                float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
                return mix(b, a, h) - k * h * (1.0 - h);
            }

            // 3D Noise (Gradient Noise)
            vec3 hash(vec3 p) {
                p = vec3(dot(p, vec3(127.1, 311.7, 74.7)),
                         dot(p, vec3(269.5, 183.3, 246.1)),
                         dot(p, vec3(113.5, 271.9, 124.6)));
                return -1.0 + 2.0 * fract(sin(p) * 43758.5453123);
            }

            float noise(vec3 p) {
                vec3 i = floor(p);
                vec3 f = fract(p);
                vec3 u = f * f * (3.0 - 2.0 * f);
                return mix(mix(mix(dot(hash(i + vec3(0.0, 0.0, 0.0)), f - vec3(0.0, 0.0, 0.0)),
                                   dot(hash(i + vec3(1.0, 0.0, 0.0)), f - vec3(1.0, 0.0, 0.0)), u.x),
                               mix(dot(hash(i + vec3(0.0, 1.0, 0.0)), f - vec3(0.0, 1.0, 0.0)),
                                   dot(hash(i + vec3(1.0, 1.0, 0.0)), f - vec3(1.0, 1.0, 0.0)), u.x), u.y),
                           mix(mix(dot(hash(i + vec3(0.0, 0.0, 1.0)), f - vec3(0.0, 0.0, 1.0)),
                                   dot(hash(i + vec3(1.0, 0.0, 1.0)), f - vec3(1.0, 0.0, 1.0)), u.x),
                               mix(dot(hash(i + vec3(0.0, 1.0, 1.0)), f - vec3(0.0, 1.0, 1.0)),
                                   dot(hash(i + vec3(1.0, 1.0, 1.0)), f - vec3(1.0, 1.0, 1.0)), u.x), u.y), u.z);
            }

            // Map function
            float map(vec3 p) {
                float time = uTime * uSpeed;
                
                // Displace the sphere
                vec3 p2 = p;
                p2 += vec3(sin(time), cos(time * 0.5), sin(time * 0.3)) * 0.5;
                
                // Liquid distortion
                float n = noise(p * 2.0 + time);
                float displacement = n * uDistortion;
                
                float d1 = sdSphere(p, 1.5 + displacement);
                
                // Second blob
                float d2 = sdSphere(p + vec3(sin(time*1.2)*2.0, cos(time)*1.5, 0.0), 0.8);
                
                return smin(d1, d2, 1.0);
            }

            // Raymarching
            float raymarch(vec3 ro, vec3 rd) {
                float dO = 0.0;
                for(int i = 0; i < 64; i++) {
                    vec3 p = ro + rd * dO;
                    float dS = map(p);
                    dO += dS;
                    if(dO > 20.0 || abs(dS) < 0.001) break;
                }
                return dO;
            }

            // Normal calculation
            vec3 getNormal(vec3 p) {
                float d = map(p);
                vec2 e = vec2(0.01, 0);
                vec3 n = d - vec3(
                    map(p - e.xyy),
                    map(p - e.yxy),
                    map(p - e.yyx)
                );
                return normalize(n);
            }

            void main() {
                vec2 uv = (gl_FragCoord.xy * 2.0 - uResolution.xy) / uResolution.y;
                
                vec3 ro = vec3(0.0, 0.0, 5.0); // Ray Origin
                vec3 rd = normalize(vec3(uv, -1.0)); // Ray Direction
                
                float d = raymarch(ro, rd);
                
                vec3 col = vec3(0.0);
                
                if(d < 20.0) {
                    vec3 p = ro + rd * d;
                    vec3 n = getNormal(p);
                    
                    // Lighting
                    vec3 lightPos = vec3(2.0, 2.0, 5.0);
                    vec3 l = normalize(lightPos - p);
                    
                    // Diffuse
                    float diff = max(dot(n, l), 0.0);
                    
                    // Specular
                    vec3 viewDir = normalize(ro - p);
                    vec3 reflectDir = reflect(-l, n);
                    float spec = pow(max(dot(viewDir, reflectDir), 0.0), 32.0);
                    
                    // Fresnel
                    float fresnel = pow(1.0 - max(dot(viewDir, n), 0.0), 4.0);
                    
                    col = uColor * diff + vec3(1.0) * spec + vec3(0.5, 0.8, 1.0) * fresnel;
                }
                
                // Gamma correction
                col = pow(col, vec3(0.4545));
                
                gl_FragColor = vec4(col, 1.0);
            }
        `;

        new UnifiedRenderer({
            type: 'shader',
            fragmentShader: fragmentShader,
            params: {
                uDistortion: 0.5,
                uColor: new THREE.Color(0xff0055),
                uSpeed: 1.0
            },
            init: (scope) => {
                scope.setUI({
                    uDistortion: { type: 'number', min: 0.0, max: 2.0, value: 0.5, label: 'Wobble' },
                    uColor: { type: 'color', value: '#ff0055', label: 'Liquid Color' },
                    uSpeed: { type: 'number', min: 0.1, max: 3.0, value: 1.0, label: 'Flow Speed' }
                });
            }
        });
    </script>
</body>
</html>
