    class ScriptScene {
      constructor(amgScene = null, container = null) {
        this.scene = new THREE.Scene();
        this.camera = null;
        this.renderer = null;
        this.sceneObjects = { tweens: [] };
        this.isAnimating = false;
        this.animationFrameId = null;

        this.Duration = 2000;

        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      }

      init(container) {
        container.appendChild(this.renderer.domElement);
        window.addEventListener('resize', () => this.handleResize());
      }

      handleResize() {
        if (!this.camera || !this.renderer) return;
        this.camera.aspect = window.innerWidth / window.innerHeight;

        if (this.isAnimating) return;
        this.isAnimating = true;

          if (!this.isAnimating) return;
          updateCallback(t);
          this.animationFrameId = requestAnimationFrame(animateFrame);
        };

        if (this.renderer) this.renderer.render(this.scene, this.camera);

          this.TWEEN.update(timestamp);

          this.sceneObjects.tweens.forEach(tween => {

        Object.keys(params).forEach((key) => {
          const value = params[key];
          if (typeof shaderPass.setParameter === 'function') {
            shaderPass.setParameter(key, value);
            return;
          }
          if (typeof shaderPass.setParameters === 'function') {
            shaderPass.setParameters({ [key]: value });
            return;
          }
          if (typeof shaderPass.setParams === 'function') {
            shaderPass.setParams({ [key]: value });
            return;
          }
          if (shaderPass.params && Object.prototype.hasOwnProperty.call(shaderPass.params, key)) {
            shaderPass.params[key] = value;
          }
        });
      });
    }
  }

  updateEffects() {
    if (!this.effectStack) return;
    this.applyEffectStack(this.effectStack);
  }
    }

    const container = document.getElementById('container');
    const s = new ScriptScene(null, container);
    window.__scriptScene = s;

    async function boot() {
      await s._ensureTextures();
      if (typeof s.setupScene === 'function') await s.setupScene();
      s.start((t) => s.defaultUpdate(t));
    }
    boot();

    window.addEventListener('message', (e) => {
      const d = e.data;
      if (!d || !d.type) return;
      if (d.type === 'HANDSHAKE') {
        parent.postMessage({ type: 'UI_CONFIG', config: [] }, '*');
      }
      if (d.type === 'EXPORT_SCRIPT_SCENE') {
        const blob = new Blob([__EXPORT_TEXT], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'scriptScene.js';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }
    });
  </script>
