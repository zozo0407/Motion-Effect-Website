<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 23 - Neon Flow Field</title>
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script>
        // --- Configuration & Globals ---
        let particles = [];
        let noiseScale = 0.01;
        let speed = 1.0;
        let baseHue = 0;
        let particleCount = 2000;
        let trailAlpha = 50;
        
        // --- Communication Protocol ---
        const UI_CONFIG = [
            { name: 'Speed', value: 1.0, min: 0.1, max: 5.0, step: 0.1, bind: 'uSpeed' },
            { name: 'Noise Scale', value: 0.01, min: 0.001, max: 0.1, step: 0.001, bind: 'uNoise' },
            { name: 'Particle Count', value: 2000, min: 500, max: 5000, step: 100, bind: 'uCount' },
            { name: 'Trail Alpha', value: 50, min: 0, max: 255, step: 1, bind: 'uTrail' },
            { name: 'Color Shift', type: 'button', bind: 'cmd_color' }
        ];

        function sendConfig() {
            if (window.parent) {
                window.parent.postMessage({
                    type: 'UI_CONFIG',
                    config: UI_CONFIG
                }, '*');
            }
        }

        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data) return;

            if (data.type === 'HANDSHAKE') sendConfig();

            if (data.type === 'UPDATE_PARAM') {
                if (data.key === 'uSpeed') speed = parseFloat(data.value);
                if (data.key === 'uNoise') noiseScale = parseFloat(data.value);
                if (data.key === 'uCount') {
                    particleCount = parseInt(data.value);
                    initParticles();
                }
                if (data.key === 'uTrail') trailAlpha = parseInt(data.value);
                if (data.key === 'cmd_color') {
                    baseHue = (baseHue + 60) % 360;
                }
            }
        });

        // --- p5.js Sketch ---

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360);
            initParticles();
            sendConfig();
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function draw() {
            background(0, 20);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].display();
            }
        }

        class Particle {
            constructor() {
                this.pos = createVector(random(width), random(height));
                this.vel = createVector(0, 0);
                this.acc = createVector(0, 0);
                this.noiseOffset = random(1000);
                this.maxSpeed = random(1, 3);
                this.hue = baseHue;
                this.size = random(2, 5);
            }

            update() {
                // Calculate flow field using Perlin noise
                let xOff = this.pos.x * noiseScale;
                let yOff = this.pos.y * noiseScale;
                let angle = noise(xOff, yOff, this.noiseOffset) * TWO_PI * 4;
                
                // Add flow force
                let force = p5.Vector.fromAngle(angle);
                force.mult(speed);
                this.acc.add(force);
                
                // Apply friction
                this.vel.mult(0.96);
                this.vel.add(this.acc);
                this.acc.mult(0);
                
                // Limit speed
                this.vel.limit(this.maxSpeed);
                this.pos.add(this.vel);
                
                // Wrap around screen
                if (this.pos.x > width) this.pos.x = 0;
                if (this.pos.x < 0) this.pos.x = width;
                if (this.pos.y > height) this.pos.y = 0;
                if (this.pos.y < 0) this.pos.y = height;
                
                // Cycle hue slightly
                this.hue = (this.hue + 0.5) % 360;
            }

            display() {
                noStroke();
                fill(this.hue, 200, 255, 255);
                circle(this.pos.x, this.pos.y, this.size);
            }
    </script>
</body>
</html>
