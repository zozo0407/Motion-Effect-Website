<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Glitch Text</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; }
        canvas { display: block; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "../js/libs/three/three.module.js",
                "three/addons/": "../js/libs/three/addons/"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import { UnifiedRenderer } from '../js/UnifiedRenderer.js';
        import * as THREE from 'three';

        // Helper to create text texture
        function createTextTexture(text, font = 'bold 100px Arial', color = '#ffffff') {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Background (Transparent)
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Text
            ctx.fillStyle = color;
            ctx.font = font;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Add Glow
            ctx.shadowColor = "#00ffff";
            ctx.shadowBlur = 20;
            
            // Handle multi-line text
            const lines = text.split('\n');
            const lineHeight = 100;
            const startY = canvas.height / 2 - ((lines.length - 1) * lineHeight) / 2;
            
            lines.forEach((line, index) => {
                const y = startY + index * lineHeight;
                ctx.fillText(line, canvas.width / 2, y);
            });
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        const fragmentShader = `
            uniform sampler2D uTexture;
            uniform float uTime;
            uniform float uGlitchIntensity;
            uniform vec2 uResolution;
            
            varying vec2 vUv;

            // Random Noise
            float random(vec2 st) {
                return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123);
            }

            void main() {
                vec2 uv = vUv;
                
                // Glitch Logic
                float time = uTime * 5.0;
                
                // Split RGB
                float noiseVal = random(vec2(0.0, floor(uv.y * 20.0) + time));
                float shift = (noiseVal - 0.5) * uGlitchIntensity * 0.1;
                
                // Scanlines
                float scanline = sin(uv.y * 800.0 + time * 10.0) * 0.05;
                
                // Block Glitch
                float blockNoise = random(floor(uv * vec2(10.0, 50.0) + time));
                if (blockNoise > 0.95 - uGlitchIntensity * 0.5) {
                     uv.x += (random(vec2(time)) - 0.5) * 0.2;
                }

                // Sample texture with RGB shift
                float r = texture2D(uTexture, uv + vec2(shift, 0.0)).r;
                float g = texture2D(uTexture, uv).g;
                float b = texture2D(uTexture, uv - vec2(shift, 0.0)).b;
                
                vec3 color = vec3(r, g, b);
                
                // Add scanlines
                color -= scanline;
                
                // Vignette
                float dist = length(uv - 0.5);
                color *= 1.0 - dist * 0.5;

                gl_FragColor = vec4(color, texture2D(uTexture, uv).a);
            }
        `;

        new UnifiedRenderer({
            type: 'three', // We use 'three' to manage the plane and texture easily
            params: {
                text: "剪映 Capcut\nEffect Studio",
                intensity: 0.5
            },
            init: (scope) => {
                // UI
                scope.setUI({
                    text: { type: 'text', value: '剪映 Capcut\nEffect Studio', label: '显示文字' },
                    intensity: { type: 'number', min: 0.0, max: 2.0, value: 0.5, label: '故障强度' }
                });

                // Move camera closer to make text appear 2x larger
                if (scope.camera) {
                    scope.camera.position.z = 2.5; // Default is usually 5, halving distance doubles size
                }

                // Setup Scene
                scope.textTexture = createTextTexture(scope.params.text);
                
                const geometry = new THREE.PlaneGeometry(4, 2);
                const material = new THREE.ShaderMaterial({
                    uniforms: {
                        uTime: { value: 0 },
                        uTexture: { value: scope.textTexture },
                        uGlitchIntensity: { value: scope.params.intensity },
                        uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
                    },
                    vertexShader: `
                        varying vec2 vUv;
                        void main() {
                            vUv = uv;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: fragmentShader,
                    transparent: true,
                    side: THREE.DoubleSide
                });
                
                scope.plane = new THREE.Mesh(geometry, material);
                scope.scene.add(scope.plane);
                
                // Add a cool background grid
                const gridHelper = new THREE.GridHelper(40, 40, 0x444444, 0x222222);
                gridHelper.rotation.x = Math.PI / 2;
                gridHelper.position.z = -2;
                scope.scene.add(gridHelper);
            },
            update: (state, scope) => {
                if (scope.plane) {
                    scope.plane.material.uniforms.uTime.value = state.time;
                }
            },
            onParamChange: (key, value, scope) => {
                if (key === 'intensity' && scope.plane) {
                    scope.plane.material.uniforms.uGlitchIntensity.value = value;
                }
                if (key === 'text') {
                    scope.textTexture = createTextTexture(value);
                    scope.plane.material.uniforms.uTexture.value = scope.textTexture;
                }
            }
        });

        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data) return;
            if (data.type === 'REQUEST_GAME_JS_SOURCE') {
                fetch(window.location.href, { cache: 'no-store' })
                    .then((r) => r.text())
                    .then((html) => {
                        const m = html.match(/<script type="module">([\s\S]*?)<\/script>/);
                        const code = m && m[1] ? m[1].trim() : '';
                        window.parent && window.parent.postMessage({ type: 'GAME_JS_SOURCE', code, filename: 'game.js' }, '*');
                    })
                    .catch(() => {
                        window.parent && window.parent.postMessage({ type: 'GAME_JS_SOURCE', code: '', filename: 'game.js' }, '*');
                    });
            }
        });
    </script>
</body>
</html>
