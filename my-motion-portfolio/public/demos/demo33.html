sparent: true,\n    side: THREE.DoubleSide\n  });\n}\n\n/**\n * 初始化所有平面的 TWEEN 动画\n */\nsetupAnimations() {\n  const { cellPlanes, originalPositions, rotationAxes, rotationAngles, animationData } = this.sceneObjects;\n  const duration = this.Duration; // 使用 this.Duration 作为动画总时长\n\n  this.sceneObjects.tweens = []; // 初始化 tweens 数组\n\n  for (let i = 0; i < cellPlanes.length; i++) {\n    const plane = cellPlanes[i];\n    const origPos = originalPositions[i];\n    const rotAxis = rotationAxes[i];\n    const rotAngle = rotationAngles[i];\n    const animData = animationData[i];\n\n    // 第一段：到最大zOffset\n    const start = { angle: 0, zOffset: 0, mixFactor: 0 };\n    const mid = { angle: rotAngle, zOffset: -1.0*animData.zOffset, mixFactor: 0.5 };\n    // 第二段：zOffset回到0\n    const end = { angle: 0, zOffset: 0, mixFactor: 1 };\n\n    // 第一段Tween\n    const tween1 = new TWEEN.Tween(start)\n      .to(mid, duration * 0.7)\n      .delay(animData.delayFactor * duration)\n      .easing(TWEEN.Easing.Cubic.InOut)\n      .onUpdate(obj => {\n        const quaternion = new THREE.Quaternion();\n        quaternion.setFromAxisAngle(rotAxis, obj.angle);\n        plane.quaternion.copy(quaternion);\n        plane.position.z = origPos.z + obj.zOffset;\n        if (plane.material && plane.material.uniforms) {\n          plane.material.uniforms.mixFactor.value = obj.mixFactor;\n        }\n      })\n      .start();\n\n    const tween2 = new TWEEN.Tween(mid)\n      .to(end, duration * 0.3)\n      .delay(animData.delayFactor * duration + duration * 0.5)  // 延迟 + 第一段的50%时间后开始\n      .easing(TWEEN.Easing.Cubic.InOut)\n      .onUpdate(obj => {\n        const quaternion = new THREE.Quaternion();\n        quaternion.setFromAxisAngle(rotAxis, obj.angle);\n        plane.quaternion.copy(quaternion);\n        plane.position.z = origPos.z + obj.zOffset;\n        if (plane.material && plane.material.uniforms) {\n          plane.material.uniforms.mixFactor.value = obj.mixFactor;\n        }\n      })\n      .s     class ScriptScene {
      constructor(amgScene = null, container = null) {
        this.scene = new THREE.Scene();
        this.camera = null;
        this.renderer = null;
        this.sceneObjects = { tweens: [] };
        this.isAnimating = false;
        this.animationFrameId = null;
        this.TWEEN = TWEEN;
        this.Duration = 2000;
        this.texture1 = null;
        this.texture2 = null;

        this.initCoreObjects();
        if (container) this.init(container);
      }

      initCoreObjects() {
        this.camera = new THREE.PerspectiveCamera(53.1, window.innerWidth / window.innerHeight, 0.1, 10000);
        this.camera.position.z = 10;
        this.scene.add(this.camera);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        this.renderer.outputColorSpace = THREE.SRGBColorSpace;
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      }

      init(container) {
        container.appendChild(this.renderer.domElement);
        window.addEventListener('resize', () => this.handleResize());
      }

      handleResize() {
        if (!this.camera || !this.renderer) return;
        this.camera.aspect = window.innerWidth / window.innerHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(window.innerWidth, window.innerHeight);
      }

      start(updateCallback) {
        if (this.isAnimating) return;
        this.isAnimating = true;
        const animateFrame = (t) => {
          if (!this.isAnimating) return;
          updateCallback(t);
          this.animationFrameId = requestAnimationFrame(animateFrame);
        };
        this.animationFrameId = requestAnimationFrame(animateFrame);
      }

      update() {
        if (this.renderer) this.renderer.render(this.scene, this.camera);
      }

      defaultUpdate(timestamp) {
        if (this.TWEEN && typeof this.TWEEN.update === 'function') {
          this.TWEEN.update(timestamp);
        } else if (this.sceneObjects && this.sceneObjects.tweens && this.sceneObjects.tweens.length > 0) {
          this.sceneObjects.tweens.forEach(tween => {
            if (tween && typeof tween.update === 'function') tween.update(timestamp);
          });
        }
        this.update();
      }

    async _ensureTextures() {
      const loader = new THREE.TextureLoader();
      const loadOne = (url) => new Promise(resolve => {
        loader.load(url, (tex) => resolve(tex), undefined, () => resolve(null));
      });
      const [t1, t2] = await Promise.all([
        loadOne('../sample/Sample1.jpg'),
        loadOne('../sample/Sample2.jpg')
      ]);
      if (t1) {
        t1.colorSpace = THREE.SRGBColorSpace;
        t1.wrapS = THREE.RepeatWrapping;
        t1.wrapT = THREE.RepeatWrapping;
      }
      if (t2) {
        t2.colorSpace = THREE.SRGBColorSpace;
        t2.wrapS = THREE.RepeatWrapping;
        t2.wrapT = THREE.RepeatWrapping;
      }
      this.texture1 = t1;
      this.texture2 = t2;
    }

  /**
   * 初始化一个完整的基本场景（不包含动画循环）
   * 包括相机、场景对象的创建
   * @returns {Object} 场景中的对象引用
   */
setupScene() {
  // 初始化场景对象容器
  this.initSceneObjects();

  // 设置场景背景为黑色
  this.scene.background = new THREE.Color(0x000000);
  
  // 创建多面体转场特效
  this.createGridTransition();

  // 新增：初始化动画
  this.setupAnimations();
  
  return this.sceneObjects;
}

/**
 * 初始化场景对象容器
 */
initSceneObjects() {
  this.sceneObjects = {
    gridSize: 7 , // gridSize x gridSize网格
    cellPlanes: [], // 存储所有的平面网格
    planeGroup: null, // 用于整体管理平面的组
    originalPositions: [], // 存储每个平面的原始位置
    rotationAxes: [], // 存储每个平面的旋转轴
    rotationAngles: [], // 存储每个平面的最大旋转角度
    animationData: [] // 存储每个平面的动画数据
  };

}

/**
 * 创建网格转场特效
 */
createGridTransition() {
  // 创建一个组来容纳所有的平面
  const planeGroup = new THREE.Group();
  planeGroup.name = "PlaneGroup";
  this.scene.add(planeGroup);
  this.sceneObjects.planeGroup = planeGroup;
  
  const gridSize = this.sceneObjects.gridSize;
  const totalSize = 10.0; // 总场景大小为2x2单位
  const cellSize = totalSize / gridSize; // 每个单元格的大小
  
  // 创建gridSize x gridSize网格的平面
  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      const index = i * gridSize + j;
      
      // 计算平面在总网格中的位置
      const offsetX = -totalSize / 2 + cellSize / 2 + j * cellSize;
      const offsetY = totalSize / 2 - cellSize / 2 - i * cellSize;
      
      // 创建平面几何体
      const geometry = new THREE.PlaneGeometry(cellSize, cellSize, 1, 1);
      
      // 创建混合两个纹理的着色器材质
      const material = this.createMixShaderMaterial(i, j, gridSize);
      material.name = `CellMaterial_${i}_${j}`;
      
      // 创建网格对象
      const plane = new THREE.Mesh(geometry, material);
      plane.name = `CellPlane_${i}_${j}`;
      plane.position.set(offsetX, offsetY, 0);
      
      // 存储原始位置
      this.sceneObjects.originalPositions.push({
        x: offsetX,
        y: offsetY,
        z: 0
      });
      
      // 创建随机旋转轴，偏向z轴
      const rotAxis = new THREE.Vector3(
        (Math.random() - 0.5) * 0.4, // x分量, ±0.2左右
        (Math.random() - 0.5) * 0.6, // y分量, ±0.3左右
        1.0 // z分量为主
      ).normalize();
      this.sceneObjects.rotationAxes.push(rotAxis);
      
      // 设置随机旋转角度(180°-360°)
      const rotAngle = Math.PI + Math.random() * Math.PI;
      this.sceneObjects.rotationAngles.push(rotAngle);
      
      // 计算从中心的距离，用于动画延迟和z轴移动
      const centerI = gridSize / 2 - 0.5;
      const centerJ = gridSize / 2 - 0.5;
      const distFromCenter = Math.sqrt(Math.pow(i - centerI, 2) + Math.pow(j - centerJ, 2));
      const normalizedDist = distFromCenter / (Math.sqrt(2) * centerI); // 归一化距离[0,1]
      
      // 存储动画数据
      this.sceneObjects.animationData.push({
        distFromCenter: normalizedDist,
        delayFactor: normalizedDist * 0.2, // 0到0.2的延迟因子
        zOffset: 1.5 + normalizedDist * 10.2 // 最大z轴偏移
      });
      
      // 添加到组和数组
      planeGroup.add(plane);
      this.sceneObjects.cellPlanes.push(plane);
    }
  }
}

/**
 * 创建混合两个纹理的着色器材质
 * @param {number} i - 行索引
 * @param {number} j - 列索引
 * @param {number} gridSize - 网格大小
 * @returns {THREE.ShaderMaterial} 着色器材质
 */
createMixShaderMaterial(i, j, gridSize) {
  // 确保纹理已加载
  if (!this.texture1 || !this.texture2) {
    console.error("纹理未加载！");
    return new THREE.MeshBasicMaterial({ color: 0xff0000 });
  }
  

  
  // 计算UV偏移和比例以映射正确的纹理部分
  const uvOffsetX = j / gridSize;
  const uvOffsetY = 1 - (i+1) / gridSize;
  const uvScale = 1 / gridSize;
  
  // 创建着色器材质
  return new THREE.ShaderMaterial({
    uniforms: {
      texture1: { value: this.texture1 },
      texture2: { value: this.texture2 },
      uvOffset: { value: new THREE.Vector2(uvOffsetX, uvOffsetY) },
      uvScale: { value: new THREE.Vector2(uvScale, uvScale) },
      mixFactor: { value: 0.0 } // 混合因子，0=第一张图，1=第二张图
    },
    vertexShader: `
      varying vec2 vUv;
      
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform sampler2D texture1;
      uniform sampler2D texture2;
      uniform vec2 uvOffset;
      uniform vec2 uvScale;
      uniform float mixFactor;
      
      varying vec2 vUv;
      
      void main() {
        // 计算实际的UV坐标，映射到对应的图像部分
        vec2 scaledUv = uvOffset + vUv * uvScale;
        
        // 采样两张纹理
        vec4 color1 = texture2D(texture1, scaledUv);
        vec4 color2 = texture2D(texture2, scaledUv);
        
        // 混合两种颜色
        gl_FragColor = mix(color1, color2, mixFactor);
      }
    `,
    transparent: true,
    side: THREE.DoubleSide
  });
}

/**
 * 初始化所有平面的 TWEEN 动画
 */
setupAnimations() {
  const { cellPlanes, originalPositions, rotationAxes, rotationAngles, animationData } = this.sceneObjects;
  const duration = this.Duration; // 使用 this.Duration 作为动画总时长

  this.sceneObjects.tweens = []; // 初始化 tweens 数组

  for (let i = 0; i < cellPlanes.length; i++) {
    const plane = cellPlanes[i];
    const origPos = originalPositions[i];
    const rotAxis = rotationAxes[i];
    const rotAngle = rotationAngles[i];
    const animData = animationData[i];

    // 第一段：到最大zOffset
    const start = { angle: 0, zOffset: 0, mixFactor: 0 };
    const mid = { angle: rotAngle, zOffset: -1.0*animData.zOffset, mixFactor: 0.5 };
    // 第二段：zOffset回到0
    const end = { angle: 0, zOffset: 0, mixFactor: 1 };

    // 第一段Tween
    const tween1 = new TWEEN.Tween(start)
      .to(mid, duration * 0.7)
      .delay(animData.delayFactor * duration)
      .easing(TWEEN.Easing.Cubic.InOut)
      .onUpdate(obj => {
        const quaternion = new THREE.Quaternion();
        quaternion.setFromAxisAngle(rotAxis, obj.angle);
        plane.quaternion.copy(quaternion);
        plane.position.z = origPos.z + obj.zOffset;
        if (plane.material && plane.material.uniforms) {
          plane.material.uniforms.mixFactor.value = obj.mixFactor;
        }
      })
      .start();

    const tween2 = new TWEEN.Tween(mid)
      .to(end, duration * 0.3)
      .delay(animData.delayFactor * duration + duration * 0.5)  // 延迟 + 第一段的50%时间后开始
      .easing(TWEEN.Easing.Cubic.InOut)
      .onUpdate(obj => {
        const quaternion = new THREE.Quaternion();
        quaternion.setFromAxisAngle(rotAxis, obj.angle);
        plane.quaternion.copy(quaternion);
        plane.position.z = origPos.z + obj.zOffset;
        if (plane.material && plane.material.uniforms) {
          plane.material.uniforms.mixFactor.value = obj.mixFactor;
        }
      })
      .start();

    this.sceneObjects.tweens.push(tween1); // 收集第一段tween
    this.sceneObjects.tweens.push(tween2); // 收集第二段tween
  }
}
    }

    const container = document.getElementById('container');
    const s = new ScriptScene(null, container);
    window.__scriptScene = s;

    async function boot() {
      await s._ensureTextures();
      if (typeof s.setupScene === 'function') await s.setupScene();
      s.start((t) => s.defaultUpdate(t));
    }
    boot();

    window.addEventListener('message', (e) => {
      const d = e.data;
      if (!d || !d.type) return;
      if (d.type === 'HANDSHAKE') {
        parent.postMessage({ type: 'UI_CONFIG', config: [] }, '*');
      }
      if (d.type === 'EXPORT_SCRIPT_SCENE') {
        const blob = new Blob([__EXPORT_TEXT], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'scriptScene.js';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }
    });
  </script>
</body>
