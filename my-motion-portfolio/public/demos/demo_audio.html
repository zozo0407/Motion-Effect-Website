<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Audio - Visualizer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
    </style>
    <!-- Import Maps Polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import { UnifiedRenderer } from '../js/UnifiedRenderer.js';

        // Audio Visualizer Shader
        const fragmentShader = `
            uniform float uTime;
            uniform vec2 uResolution;
            uniform sampler2D uAudioTexture; // 1x128 RedFormat texture
            
            varying vec2 vUv;

            void main() {
                vec2 uv = vUv;
                
                // Audio Data is in a 1D texture (128 bins)
                // Map x coordinate to frequency bin
                float fft = texture2D(uAudioTexture, vec2(uv.x, 0.5)).r / 255.0;
                
                // Visualize waveform/spectrum
                // Create a bar graph effect
                float bar = step(uv.y, fft * 0.8 + 0.1);
                
                // Color based on x position and intensity
                vec3 col = vec3(0.0);
                if (bar > 0.0) {
                    col = vec3(uv.x, 0.5, 1.0 - uv.x);
                    col *= fft * 2.0; // Brighter for louder sounds
                }
                
                // Add a glow
                col += vec3(0.1, 0.2, 0.5) * (fft * 0.5);
                
                gl_FragColor = vec4(col, 1.0);
            }
        `;

        new UnifiedRenderer({
            type: 'shader',
            fragmentShader: fragmentShader,
            audio: true, // Enable Audio System
            
            init: (renderer) => {
                const uiConfig = [
                    { name: '上传音乐 / Upload Audio', type: 'file', bind: 'audioFile' },
                    { name: '播放/暂停 / Toggle', type: 'button', bind: 'toggleAudio' }
                ];
                
                // Handle file upload manually to call loadAudio
                renderer.params.audioFile = { type: 'file', url: '' }; // Placeholder
                
                // Override default onParamChange to intercept file upload
                const originalParamChange = renderer.onParamChange;
                renderer.onParamChange = (key, value) => {
                    if (key === 'audioFile' && value && value.url) {
                        renderer.loadAudio(value.url);
                    }
                };
                
                renderer.setUI(uiConfig);
            }
        });
    </script>
</body>
</html>
