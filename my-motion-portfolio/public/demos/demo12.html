<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 12 - Particle Heart</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #container { width: 100vw; height: 100vh; }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@tweenjs/tween.js": "https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.esm.js"
            }
        }
    </script>
</head>
<body>
    <div id="container"></div>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
        import * as TWEEN from '@tweenjs/tween.js';

        // ... [Existing Code] ...

        // --- Unified Protocol Implementation ---
        const UI_CONFIG = [
            { name: '旋转速度', value: 0.5, min: 0, max: 1, step: 0.01, bind: 'uSpeed' },
            { name: '粒子数量', value: 900, min: 100, max: 2000, step: 100, bind: 'uParticles' },
            { name: '切换时长 (秒)', value: 1.0, min: 0.5, max: 3.0, step: 0.1, bind: 'uDuration' },
            { 
                name: '形态切换', 
                type: 'row', 
                children: [
                    { type: 'button', text: '聚合 / Aggregate', bind: 'cmd_aggregate', value: 1 },
                    { type: 'button', text: '散开 / Disperse', bind: 'cmd_disperse', value: 0 }
                ]
            },
            { name: '上传图片 (多选)', type: 'file', bind: 'uImages', multiple: true, accept: 'image/*' }
        ];

        function sendConfig() {
            if (window.parent) {
                window.parent.postMessage({
                    type: 'UI_CONFIG',
                    config: UI_CONFIG,
                    sources: [] // No video input
                }, '*');
            }
        }

        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data) return;

            if (data.type === 'HANDSHAKE') sendConfig();

            if (data.type === 'UPDATE_PARAM') {
                if (data.key === 'uSpeed') {
                    // Map 0-1 to 0.005-0.02
                    // Formula: min + val * (max - min)
                    // 0.005 + val * 0.015
                    scriptScene.rotationSpeed = 0.005 + data.value * 0.015;
                }
                if (data.key === 'uParticles') {
                    // Debounce rebuild or handle carefully
                    // For now, let's just update config, rebuild is expensive
                    if (scriptScene.sceneObjects && scriptScene.sceneObjects.cfg) {
                         // Only rebuild if value changed significantly
                         if(scriptScene.sceneObjects.cfg.needlesCount !== data.value) {
                            scriptScene.sceneObjects.cfg.needlesCount = data.value;
                            scriptScene.sceneObjects.cfg.spheresCount = Math.floor(data.value * 0.18);
                            scriptScene.sceneObjects.cfg.trisCount = Math.floor(data.value * 0.13);
                            scriptScene.sceneObjects.cfg.blocksCount = Math.floor(data.value * 0.13);
                            scriptScene.rebuildScene();
                         }
                    }
                }
                if (data.key === 'uDuration') {
                    scriptScene.transitionDuration = data.value * 1000;
                }
                if (data.key === 'cmd_aggregate') {
                    scriptScene.tweenProgress(1);
                }
                if (data.key === 'cmd_disperse') {
                    scriptScene.tweenProgress(0);
                }
            }
            
            if (data.type === 'LOAD_SOURCE') {
                // Legacy handler for single file if needed, or remove if unused
                // We keep it for compatibility if index.html global upload is used
                const src = data.source;
                if (src.type === 'image') {
                    const loader = new THREE.TextureLoader();
                    loader.load(src.path, (tex) => {
                        tex.colorSpace = THREE.SRGBColorSpace;
                        tex.needsUpdate = true;
                        scriptScene.customTextures = [tex]; 
                        scriptScene.rebuildScene();
                    });
                }
            }

            if (data.type === 'FILE_UPLOAD' && data.bind === 'uImages') {
                const loader = new THREE.TextureLoader();
                const promises = data.files.map(f => new Promise(resolve => {
                    loader.load(f.url, (tex) => {
                        tex.colorSpace = THREE.SRGBColorSpace;
                        tex.needsUpdate = true;
                        resolve(tex);
                    });
                }));
                
                Promise.all(promises).then(textures => {
                    if (textures.length > 0) {
                        scriptScene.customTextures = textures;
                        scriptScene.rebuildScene();
                    }
                });
            }

            if (data.type === 'START_REC') scriptScene.startRecording();
            if (data.type === 'STOP_REC') scriptScene.stopRecording();
            if (data.type === 'SAVE_IMAGE') scriptScene.saveImage(); // Added Screenshot Support
        });

        // ... [Rest of initialization] ...
        
        // Remove setupUIListeners call as we use postMessage now
        // scriptScene.setupUIListeners(); -> Comment out or remove logic inside class
        
        // At the end
        sendConfig();

        // Global definition for geomBlock as it was at the end of the reference file
        const geomBlock = new THREE.BoxGeometry(1, 1, 1);

        class ScriptScene {
            constructor(amgScene = null, container = null) {
                if (amgScene) {
                    this.scene = new THREE.Scene();
                    this.scene._amgScene = amgScene;
                } else {
                    this.scene = new THREE.Scene();
                }
                this.effect_type = "transition";
                this.camera = null;
                this.renderer = null;
                this.scene.background = new THREE.Color(0x333333);
                this.isAnimating = false;
                this.animationFrameId = null;
                this.sceneObjects = null;
                this.lastTime = 0;
                this.sceneElapsed = 0;

                this.texture1 = null;
                this.texture2 = null;
                this.texture3 = null;
                this.texture4 = null;
                this.texture5 = null;
                this.texture6 = null;
                this.texture7 = null;
                this.texture8 = null;
                this.texture9 = null;

                this.composer = null;
                this.renderPass = null;
                this.usePostProcessing = true;

                this.initCoreObjects();
                if (container) {
                    this.init(container);
                }
            }

            destroy() {
                this.isAnimating = false;
                if (this.animationFrameId !== null && typeof cancelAnimationFrame !== 'undefined') {
                    cancelAnimationFrame(this.animationFrameId);
                    this.animationFrameId = null;
                }
                if (this.renderer) {
                    this.renderer.setAnimationLoop(null);
                    this.renderer.dispose();
                    if (this.renderer.domElement && this.renderer.domElement.parentNode) {
                        this.renderer.domElement.parentNode.removeChild(this.renderer.domElement);
                    }
                }
                if (this.scene) {
                    this.scene.dispose();
                }
                if (typeof window !== 'undefined') {
                    window.removeEventListener('resize', this.handleResize);
                }
                if (this.sceneObjects && this.sceneObjects.tweens) {
                    this.sceneObjects.tweens.forEach(tween => {
                        if (tween && typeof tween.stop === 'function') {
                            tween.stop();
                        }
                    });
                    this.sceneObjects.tweens = [];
                }
                if (this.composer) {
                    this.composer.dispose();
                    this.composer = null;
                }
                this.renderPass = null;
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.sceneObjects = null;
            }

            initCoreObjects() {
                // Use actual window size
                // window.innerWidth = 600; // Commented out to use real size
                // window.innerHeight = 600;
                // window.devicePixelRatio = 1;
                
                this.camera = new THREE.PerspectiveCamera(
                    53.1,
                    window.innerWidth / window.innerHeight,
                    0.1,
                    10000
                );
                this.camera.position.z = 10;
                this.scene.add(this.camera);

                if (this.scene._amgScene == null) {
                    this.renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: false });
                    this.renderer.outputColorSpace = THREE.LinearSRGBColorSpace;
                }
                if (this.renderer) {
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                    this.renderer.setPixelRatio(window.devicePixelRatio);
                }

                this.sliders = {};
                this.TWEEN = TWEEN;
                this.Duration = 2000;
                
                // New Properties
                this.rotationSpeed = 0.005 + 0.5 * 0.015; // Default 0.5 mapped value
                this.transitionDuration = 1000;
                this.customTextures = [];
                this.mediaRecorder = null;
                this.recordedChunks = [];
                this.isRecording = false;
            }

            // --- Capability: Dynamic Shader Pass (Placeholder) ---
            addShaderPass(shaderPassConfigs) {
                // Dynamic require not supported in browser environment without bundler
                console.warn('addShaderPass is not supported in this demo environment');
            }

            setupPostProcessing(shaderPassConfigs) {
                // Uses imports from top level
                this.composer = new EffectComposer(this.renderer);
                this.renderPass = new RenderPass(this.scene, this.camera);
                this.composer.addPass(this.renderPass);
                this.shaderPasses = [];
                this.addShaderPass(shaderPassConfigs);
            }

            initPostProcessing() {
                if (!this.renderer || !this.camera || !this.scene) return;

                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.15;
                this.renderer.outputColorSpace = THREE.SRGBColorSpace;
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                // this.renderer.physicallyCorrectLights = true; // Deprecated
                this.renderer.useLegacyLights = false;

                this.composer = new EffectComposer(this.renderer);
                this.renderPass = new RenderPass(this.scene, this.camera);
                this.composer.addPass(this.renderPass);

                const resolution = new THREE.Vector2(window.innerWidth, window.innerHeight);
                const bloom = new UnrealBloomPass(resolution, 1.0, 0.6, 0.85);
                this.bloomPass = bloom;
                this.composer.addPass(bloom);
            }

            init(container) {
                if (this.renderer) {
                    if (container) {
                        container.appendChild(this.renderer.domElement);
                    } else if (typeof document !== 'undefined') {
                        document.body.appendChild(this.renderer.domElement);
                    }
                }
                if (typeof window !== 'undefined') {
                    // Bind handleResize to this instance
                    this.handleResizeBound = this.handleResize.bind(this);
                    window.addEventListener('resize', this.handleResizeBound);
                }
            }

            start(updateCallback) {
                if (this.isAnimating) return;
                this.isAnimating = true;

                if (updateCallback) {
                    const animateFrame = () => {
                        if (!this.isAnimating) return;
                        updateCallback();
                        this.animationFrameId = requestAnimationFrame(animateFrame);
                    };
                    animateFrame();
                } else {
                    this.renderer.setAnimationLoop(() => {
                        this.update();
                    });
                }
            }

            updateScene(timestamp) {
                if (!this.isAnimating) {
                    this.isAnimating = true;
                }
                
                // Manual Rotation Logic
                if (this.sceneObjects && this.sceneObjects.contentGroup) {
                    this.sceneObjects.contentGroup.rotation.y -= this.rotationSpeed;
                }

                this.defaultUpdate(timestamp);
            }

            update() {
                if (this.sceneObjects && this.sceneObjects.shaderPlane) {
                    const uniforms = this.sceneObjects.shaderPlane.material.uniforms || {};
                    if (uniforms.iTime) {
                        const nowSec = (typeof performance !== 'undefined' ? performance.now() : Date.now()) / 1000;
                        uniforms.iTime.value = nowSec;
                    }
                }
                if (this.usePostProcessing && this.composer) {
                    if (this.renderPass) {
                        this.renderPass.camera = this.camera;
                    }
                    this.composer.render();
                } else if (this.renderer) {
                    this.renderer.render(this.scene, this.camera);
                }
            }

            handleResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                if (this.renderer) {
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                }
                if (this.composer) {
                    this.composer.setSize(window.innerWidth, window.innerHeight);
                }
                if (this.sceneObjects && this.sceneObjects.shaderPlane) {
                    const uniforms = this.sceneObjects.shaderPlane.material.uniforms || {};
                    if (uniforms.iResolution) {
                        uniforms.iResolution.value.set(window.innerWidth, window.innerHeight, window.devicePixelRatio || 1);
                    }
                }
                if (!this.isAnimating) {
                    this.update();
                }
            }

            loadTextures() {
                const textureLoader = new THREE.TextureLoader();
                // Use sample1.jpg for all textures as requested
                // const sampleUrl = '../sample/sample1.jpg';
                
                const sampleUrls = [
                    '../sample/Sample1.jpg',
                    '../sample/Sample2.jpg',
                    '../sample/Sample3.jpg'
                ];

                this.defaultTextures = [];
                const promises = sampleUrls.map(url => new Promise(resolve => {
                    textureLoader.load(url, (tex) => {
                        tex.colorSpace = THREE.SRGBColorSpace;
                        tex.wrapS = THREE.RepeatWrapping;
                        tex.wrapT = THREE.RepeatWrapping;
                        resolve(tex);
                    }, undefined, () => resolve(null));
                }));

                return Promise.all(promises).then(textures => {
                    this.defaultTextures = textures.filter(t => t);
                });
            }

            seekToTime(time) {
                if (!this.isAnimating) {
                    this.isAnimating = true;
                }
                const clampedTime = Math.max(0, Math.min(time, this.Duration));
                if (!this.sceneObjects.tweens || this.sceneObjects.tweens.length === 0) {
                    return;
                }

                let notStartTweens = [];
                let runningTweens = [];
                let finishedTweens = [];

                for (let i = 0; i <= this.sceneObjects.tweens.length - 1; i++) {
                    const tween = this.sceneObjects.tweens[i];
                    let TweenStartTime = tween._delayTime + 10;
                    let TweenEndTime = tween._delayTime + tween._duration;

                    if (clampedTime <= TweenStartTime) {
                        notStartTweens.push({time: TweenStartTime, tween: tween}); 
                    }
                    else if (clampedTime >= TweenEndTime) {
                        finishedTweens.push({time: TweenEndTime, tween: tween});
                    } 
                    else {
                        runningTweens.push(tween);
                    }
                }

                notStartTweens.sort((a, b) => b.time - a.time);
                finishedTweens.sort((a, b) => a.time - b.time);

                notStartTweens.forEach((item, index) => {
                    let tween = item.tween;
                    tween.start(0);
                    tween.update(tween._delayTime + 2 + index * 0.04);
                });

                finishedTweens.forEach(item => {
                    let tween = item.tween;
                    tween.start(0);
                    tween.update(tween._delayTime + tween._duration + 2);
                });

                runningTweens.forEach(tween => {
                    tween.start(0);
                    tween.update(clampedTime);
                });

                this.update();
            }

            setupSliders(){
                this.sliders["effects_adjust_intensity"] = {
                    max: 1,
                    min: 0,
                    value: 0.5
                };
            }

            updateSliders(){
                const sliderValue = this.sliders["effects_adjust_intensity"] ? this.sliders["effects_adjust_intensity"].value : 0.5;
                this.speedFactor = THREE.MathUtils.lerp(0.5, 1.5, sliderValue);
            }

            registerTween(tween){
                const self = this;
                const originalUpdate = tween.update.bind(tween);
                tween.update = (time, preserve) => {
                    const scaledTime = time * self.speedFactor;
                    return originalUpdate(scaledTime, preserve);
                };
                tween.start(0);
                this.sceneObjects.tweens.push(tween);
                return tween;
            }

            setupScene() {
                this.initSceneObjects();
                this.scene.background = new THREE.Color(0x011c12);

                if (this.renderer) {
                    this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                    this.renderer.toneMappingExposure = 1.1;
                    this.renderer.shadowMap.enabled = true;
                    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                    this.renderer.useLegacyLights = false;
                }

                this.camera.position.set(0, 0, 40);
                this.camera.lookAt(0, 0, 0);
                this.controls = new OrbitControls(this.camera, this.renderer ? this.renderer.domElement : undefined);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.06;
                this.controls.rotateSpeed = 0.85;
                this.controls.autoRotate = false;

                try {
                    const pmrem = new THREE.PMREMGenerator(this.renderer);
                    this.scene.environment = pmrem.fromScene(new RoomEnvironment()).texture;
                } catch (e) {
                }

                const ambient = new THREE.AmbientLight(0x0e3b2e, 0.35);
                this.scene.add(ambient);

                const spotMain = new THREE.SpotLight(0xD4AF37, 45.0, 0, Math.PI / 6, 0.25, 2.0);
                spotMain.position.set(12, 18, 12);
                spotMain.castShadow = true;
                spotMain.shadow.mapSize.set(1024, 1024);
                spotMain.target.position.set(0, 0, 0);
                this.scene.add(spotMain);
                this.scene.add(spotMain.target);

                const rim = new THREE.SpotLight(0xffffff, 20.0, 0, Math.PI / 7, 0.4, 2.0);
                rim.position.set(-14, 10, -14);
                rim.castShadow = true;
                rim.target.position.set(0, 0, 0);
                this.scene.add(rim);
                this.scene.add(rim.target);

                const tealPoint = new THREE.PointLight(0x0aa38a, 6.0, 0, 2.0);
                tealPoint.position.set(-6, 2, 10);
                this.scene.add(tealPoint);

                this.createCustomEffect();
                this.initPostProcessing();
                this.setupAnimations();
                return this.sceneObjects;
            }

            initSceneObjects() {
                this.Duration = 3000;
                const cfg = {
                    needlesCount: 900,
                    spheresCount: 160,
                    trisCount: 120,
                    radiusScatter: 30,
                    treeHeight: 12,
                    treeRadiusBase: 8,
                    needleScaleBase: 0.22,
                    sphereScaleBase: 0.3,
                    triScaleBase: 0.1,
                    blocksCount: 120,
                    blockScaleBase: 0.3 * 2.5,
                    redRatio: 0.3
                };
                this.sceneObjects = {
                    cfg,
                    tweens: [],
                    progress: 0,
                    needles: { scatter: [], tree: [], rot: [], scale: [] },
                    spheres: { scatter: [], tree: [], rot: [], scale: [] },
                    redSpheres: { scatter: [], tree: [], rot: [], scale: [] },
                    tris: { scatter: [], tree: [], rot: [], scale: [] },
                    blocksBrown: { scatter: [], tree: [], rot: [], scale: [] },
                    blocksGreen: { scatter: [], tree: [], rot: [], scale: [] },
                    blocksLightGreen: { scatter: [], tree: [], rot: [], scale: [] },
                    photos: { meshes: [], scatter: [], tree: [], rot: [], scale: [] },
                    needlesMesh: null,
                    spheresMesh: null,
                    redSpheresMesh: null,
                    trisMesh: null,
                    blocksBrownMesh: null,
                    blocksGreenMesh: null,
                    blocksLightGreenMesh: null,
                    photosMeshes: null,
                    materials: {}
                };
            }

            createCustomEffect() {
                const so = this.sceneObjects;
                const cfg = so.cfg;

                const contentGroup = new THREE.Group();
                contentGroup.name = 'ContentGroup_Root';
                this.scene.add(contentGroup);
                so.contentGroup = contentGroup;
                contentGroup.position.y = 1;

                const needlesMat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color('#D81B60'), // Deep Red / Pink
                    emissive: new THREE.Color('#880E4F'),
                    metalness: 0.15,
                    roughness: 0.75,
                    emissiveIntensity: 0.6,
                    transparent: true,
                    opacity: 1
                });
                const spheresMat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color('#FF4081'), // Bright Pink
                    emissive: new THREE.Color('#F50057'),
                    metalness: 1.0,
                    roughness: 0.25,
                    emissiveIntensity: 0.25,
                    transparent: true,
                    opacity: 1
                });
                const trisMat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color('#FF80AB'), // Light Pink
                    emissive: new THREE.Color('#FF4081'),
                    metalness: 1.0,
                    roughness: 0.3,
                    emissiveIntensity: 0.2,
                    transparent: true,
                    opacity: 1,
                    side: THREE.DoubleSide
                });
                so.materials = { needlesMat, spheresMat, trisMat };

                const brownMat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color('#FCE4EC'), // Very Light Pink/White for fill
                    metalness: 0.1,
                    roughness: 0.85,
                    transparent: true,
                    opacity: 0.8
                });
                const greenBlockMat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color('#E91E63'),
                    metalness: 0.1,
                    roughness: 0.85,
                    transparent: true,
                    opacity: 1
                });
                const lightGreenBlockMat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color('#F48FB1'),
                    metalness: 0.1,
                    roughness: 0.85,
                    transparent: true,
                    opacity: 1
                });
                const redMat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color('#C0392B'),
                    metalness: 0.1,
                    roughness: 0.85,
                    transparent: true,
                    opacity: 1
                });
                so.materials.redMat = redMat;

                const geomNeedle = new THREE.TetrahedronGeometry(1, 0);
                const geomSphere = new THREE.SphereGeometry(1, 16, 16);
                const geomTri = new THREE.BufferGeometry();
                {
                    const triSize = 1;
                    const h = Math.sqrt(3) / 2 * triSize;
                    const verts = new Float32Array([
                        -triSize / 2, -h / 3, 0,
                        triSize / 2, -h / 3, 0,
                        0,           (2 * h) / 3, 0
                    ]);
                    geomTri.setAttribute('position', new THREE.BufferAttribute(verts, 3));
                    geomTri.computeVertexNormals();
                }

                const nCount = cfg.needlesCount, sCount = cfg.spheresCount, tCount = cfg.trisCount;
                const needlesMesh = new THREE.InstancedMesh(geomNeedle, needlesMat, nCount);
                const spheresMesh = new THREE.InstancedMesh(geomSphere, spheresMat, sCount);
                const redCount = Math.floor(sCount * cfg.redRatio);
                const redSpheresMesh = new THREE.InstancedMesh(geomSphere, redMat, redCount);
                const trisMesh = new THREE.InstancedMesh(geomTri, trisMat, tCount);
                const bCount = cfg.blocksCount;
                const brownCount = 0;
                const greenCount = bCount;
                const blocksGreenMesh = new THREE.InstancedMesh(geomBlock, greenBlockMat, greenCount);
                const lightGreenCount = bCount;
                const blocksLightGreenMesh = new THREE.InstancedMesh(geomBlock, lightGreenBlockMat, lightGreenCount);
                
                needlesMesh.castShadow = needlesMesh.receiveShadow = true;
                spheresMesh.castShadow = spheresMesh.receiveShadow = true;
                redSpheresMesh.castShadow = redSpheresMesh.receiveShadow = true;
                trisMesh.castShadow = trisMesh.receiveShadow = true;
                blocksGreenMesh.castShadow = blocksGreenMesh.receiveShadow = true;
                blocksLightGreenMesh.castShadow = blocksLightGreenMesh.receiveShadow = true;
                contentGroup.add(needlesMesh, spheresMesh, redSpheresMesh, trisMesh, blocksGreenMesh, blocksLightGreenMesh);
                so.needlesMesh = needlesMesh;
                so.spheresMesh = spheresMesh;
                so.redSpheresMesh = redSpheresMesh;
                so.trisMesh = trisMesh;
                so.blocksGreenMesh = blocksGreenMesh;
                so.blocksLightGreenMesh = blocksLightGreenMesh;

                const distScale = 0.9;
                const randUnit = () => {
                    const u = Math.random();
                    const v = Math.random();
                    const theta = 2 * Math.PI * u;
                    const phi = Math.acos(2 * v - 1);
                    const r = cfg.radiusScatter * distScale * Math.cbrt(Math.random());
                    return new THREE.Vector3(
                        r * Math.sin(phi) * Math.cos(theta),
                        r * Math.cos(phi),
                        r * Math.sin(phi) * Math.sin(theta)
                    );
                };
                
                const heartPos = () => {
                    const scale = 1.2; 
                    let x, y, z;
                    let safe = 0;
                    while(safe++ < 1000) {
                        x = (Math.random() * 2 - 1) * 1.5;
                        y = (Math.random() * 2 - 1) * 1.5;
                        z = (Math.random() * 2 - 1) * 1.5;
                        
                        const a = x*x + 9/4*y*y + z*z - 1;
                        if (a*a*a - x*x*z*z*z - 9/80*y*y*z*z*z <= 0) {
                            const v = new THREE.Vector3(x, y, z).multiplyScalar(8 * scale);
                            v.y += 2; 
                            return v;
                        }
                    }
                    console.warn("HeartPos fallback triggered");
                    return new THREE.Vector3(0, 2, 0);
                };

                const randEuler = () => new THREE.Euler(
                    Math.random() * Math.PI * 2,
                    Math.random() * Math.PI * 2,
                    Math.random() * Math.PI * 2
                );
                const randUnitAlt = () => {
                    const r = cfg.radiusScatter * distScale * (0.8 + Math.random() * 0.6);
                    const theta = Math.random() * Math.PI * 2;
                    const y = (Math.random() - 0.5) * cfg.radiusScatter * 0.6;
                    return new THREE.Vector3(r * Math.cos(theta), y, r * Math.sin(theta));
                };

                for (let i = 0; i < nCount; i++) {
                    so.needles.scatter.push(randUnit());
                    so.needles.tree.push(heartPos());
                    so.needles.rot.push(randEuler());
                    so.needles.scale.push(cfg.needleScaleBase * (0.6 + Math.random() * 0.8));
                }
                for (let i = 0; i < sCount; i++) {
                    so.spheres.scatter.push(randUnit());
                    so.spheres.tree.push(heartPos());
                    so.spheres.rot.push(randEuler());
                    so.spheres.scale.push(cfg.sphereScaleBase * (0.7 + Math.random() * 0.6));
                }
                so.spheres.pulseM = new Array(sCount).fill(1);
                so.spheres.pulsing = new Array(sCount).fill(false);
                
                const randUnitOuter = () => {
                    const v = randUnit();
                    v.multiplyScalar(1.0 + Math.random() * 0.5);
                    return v;
                };

                const heartPosOuter = () => {
                    const v = heartPos();
                    v.multiplyScalar(1.1); // Slightly larger
                    return v;
                };

                for (let i = 0; i < redCount; i++) {
                    so.redSpheres.scatter.push(randUnitOuter());
                    so.redSpheres.tree.push(heartPosOuter());
                    so.redSpheres.rot.push(randEuler());
                    so.redSpheres.scale.push(cfg.sphereScaleBase * (0.7 + Math.random() * 0.6));
                }
                for (let i = 0; i < tCount; i++) {
                    so.tris.scatter.push(randUnit());
                    so.tris.tree.push(heartPos());
                    so.tris.rot.push(randEuler());
                    so.tris.scale.push(cfg.triScaleBase * (0.7 + Math.random() * 0.6));
                }

                const sampleNoOverlap = (genCandidate, count, minDist) => {
                    const out = [];
                    const maxAttempts = 60;
                    for (let i = 0; i < count; i++) {
                        let p = genCandidate();
                        let attempts = 0;
                        while (attempts < maxAttempts) {
                            let ok = true;
                            for (let j = 0; j < out.length; j++) {
                                if (out[j].distanceTo(p) < minDist) { ok = false; break; }
                            }
                            if (ok) break;
                            p = genCandidate();
                            attempts++;
                        }
                        out.push(p);
                    }
                    return out;
                };
                const minBlockDist = cfg.blockScaleBase * 1.5 * 0.9;
                const brownScatter = sampleNoOverlap(randUnit, brownCount, minBlockDist);
                const greenScatter = sampleNoOverlap(randUnit, greenCount, minBlockDist);
                for (let i = 0; i < brownCount; i++) {
                    so.blocksBrown.scatter.push(brownScatter[i]);
                    so.blocksBrown.tree.push(heartPos());
                    so.blocksBrown.rot.push(randEuler());
                    so.blocksBrown.scale.push(cfg.blockScaleBase * 1.5 *0.6* (0.9 + Math.random() * 0.2));
                }
                for (let i = 0; i < greenCount; i++) {
                    so.blocksGreen.scatter.push(greenScatter[i]);
                    so.blocksGreen.tree.push(heartPos());
                    so.blocksGreen.rot.push(randEuler());
                    so.blocksGreen.scale.push(cfg.blockScaleBase * 1.5  * 0.6 * (0.9 + Math.random() * 0.2));
                }
                const minBlockDistAlt = cfg.blockScaleBase * 1.5 * 0.7;
                const lightGreenScatter = sampleNoOverlap(randUnitAlt, lightGreenCount, minBlockDistAlt);
                for (let i = 0; i < lightGreenCount; i++) {
                    so.blocksLightGreen.scatter.push(lightGreenScatter[i]);
                    so.blocksLightGreen.tree.push(heartPos());
                    so.blocksLightGreen.rot.push(randEuler());
                    so.blocksLightGreen.scale.push(cfg.blockScaleBase * 1.5 * 0.5 * 1.2 * (0.9 + Math.random() * 0.2));
                }

                this.updateInstancedMatrices(0);

                try {
                    let textures = [];
                    if (this.customTextures && this.customTextures.length > 0) {
                        textures = this.customTextures;
                    } else if (this.defaultTextures && this.defaultTextures.length > 0) {
                        textures = this.defaultTextures;
                    } else {
                        // Fallback logic in case loading failed
                        const loader = new THREE.TextureLoader();
                        const sampleUrl = '../sample/sample1.jpg'; // Lowercase fallback
                        const tex1 = loader.load(sampleUrl);
                        textures = [tex1];
                    }

                    const photoSize = 2.5;
                    const photoGeom = new THREE.PlaneGeometry(1, 1);

                    const smallJitter = 0.025;
                    const turns = 2; // Fewer turns for heart
                    const yMin = -5;
                    const yMax = 9;
                    const total = 12;
                    so.photos.meshes = [];
                    for (let i = 0; i < total; i++) {
                        const tBase = (i + 0.5) / total;
                        const t = tBase; 
                        const y = yMin + (yMax - yMin) * t;
                        const radius = 14; // Constant radius for cylinder around heart
                        const theta = turns * Math.PI * 2 * t;
                        const pos = new THREE.Vector3(Math.cos(theta) * radius, y, Math.sin(theta) * radius);

                        const tex = textures[i % textures.length];
                        const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide });
                        const mesh = new THREE.Mesh(photoGeom, mat);
                        
                        // Calculate Aspect Ratio Scale
                        let aspect = 1;
                        if (tex && tex.image && tex.image.width && tex.image.height) {
                            aspect = tex.image.width / tex.image.height;
                        }
                        
                        let sx = photoSize;
                        let sy = photoSize;
                        if (aspect >= 1) {
                            sy = photoSize / aspect;
                        } else {
                            sx = photoSize * aspect;
                        }
                        mesh.userData.baseScale = new THREE.Vector3(sx, sy, 1);

                        mesh.position.copy(pos);
                        const yaw = Math.atan2(pos.x, pos.z);
                        mesh.rotation.y = yaw + Math.PI * 2; 
                        mesh.name = `Photo_${i}`;
                        contentGroup.add(mesh);

                        so.photos.meshes.push(mesh);
                        const sScatter = randUnit().multiplyScalar(1.2);
                        so.photos.scatter.push(sScatter);
                        so.photos.tree.push(pos.clone());
                        so.photos.rot.push(new THREE.Euler(mesh.rotation.x, mesh.rotation.y, mesh.rotation.z));
                        so.photos.scale.push(1.0); // Animation scale factor
                    }
                    // Removed complex slot sorting specific to tree
                } catch (e) {
                    console.error("Error creating custom effect:", e);
                }
            }

            updateInstancedMatrices(progress) {
                const so = this.sceneObjects;
                const lerpPos = new THREE.Vector3();
                const m = new THREE.Matrix4();
                const applyGroup = (mesh, group, preserveRotation = false) => {
                    const count = group.scatter.length;
                    for (let i = 0; i < count; i++) {
                        const sPos = group.scatter[i].clone();
                        const phase = (i % 17) * 0.35 + (i % 7) * 0.12;
                        const amp = 0.6;
                        sPos.y += Math.sin(progress * Math.PI * 2 + phase) * amp * (1.0 - progress);
                        lerpPos.lerpVectors(sPos, group.tree[i], progress);
                        const pulseM = group.pulseM ? (group.pulseM[i] || 1) : 1;
                        const scale = group.scale[i] * (1.0 + 0.15 * progress) * pulseM;
                        const e = group.rot[i];
                        const rot = preserveRotation
                            ? new THREE.Euler(e.x, e.y, e.z)
                            : new THREE.Euler(e.x * (1.0 - progress), e.y * (1.0 - progress), e.z * (1.0 - progress));
                        m.compose(lerpPos, new THREE.Quaternion().setFromEuler(rot), new THREE.Vector3(scale, scale, scale));
                        mesh.setMatrixAt(i, m);
                    }
                    mesh.instanceMatrix.needsUpdate = true;
                };
                const applyMeshes = (meshes, group, preserveRotation = true, ampY = 0.6, faceRadial = false) => {
                    if (!meshes || !group) return;
                    const count = group.scatter.length;
                    for (let i = 0; i < count; i++) {
                        const sPos = group.scatter[i].clone();
                        const phase = (i % 17) * 0.35 + (i % 7) * 0.12;
                        const amp = ampY;
                        sPos.y += Math.sin(progress * Math.PI * 2 + phase) * amp * (1.0 - progress);
                        lerpPos.lerpVectors(sPos, group.tree[i], progress);
                        let scale;
                        if (faceRadial) {
                            scale = group.scale[i] * (2 - 1 * progress);
                        } else {
                            scale = group.scale[i] * (1.0 + 0.15 * progress);
                        }
                        const e = group.rot[i];
                        const rot = preserveRotation
                            ? new THREE.Euler(e.x, e.y, e.z)
                            : new THREE.Euler(e.x * (1.0 - progress), e.y * (1.0 - progress), e.z * (1.0 - progress));
                        const mesh = meshes[i];
                        if (!mesh) continue;
                        mesh.position.copy(lerpPos);
                        if (faceRadial) {
                            const yaw = Math.atan2(lerpPos.x, lerpPos.z);
                            mesh.rotation.set(0, yaw, 0);
                        } else {
                            mesh.rotation.set(rot.x, rot.y, rot.z);
                        }
                        
                        if (mesh.userData.baseScale) {
                             mesh.scale.set(scale * mesh.userData.baseScale.x, scale * mesh.userData.baseScale.y, scale * mesh.userData.baseScale.z);
                        } else {
                             mesh.scale.set(scale, scale, scale);
                        }
                    }
                };
                if (so.needlesMesh) applyGroup(so.needlesMesh, so.needles);
                if (so.spheresMesh) applyGroup(so.spheresMesh, so.spheres);
                if (so.redSpheresMesh) applyGroup(so.redSpheresMesh, so.redSpheres);
                if (so.trisMesh) applyGroup(so.trisMesh, so.tris, true);
                if (so.blocksBrownMesh) applyGroup(so.blocksBrownMesh, so.blocksBrown, true);
                if (so.blocksGreenMesh) applyGroup(so.blocksGreenMesh, so.blocksGreen, true);
                if (so.blocksLightGreenMesh) applyGroup(so.blocksLightGreenMesh, so.blocksLightGreen, true);
                if (so.photos && so.photos.meshes) applyMeshes(so.photos.meshes, so.photos, true, 0.0, true);
            }

            tweenProgress(target) {
                if (!this.sceneObjects) return;
                if (this.sceneObjects.tweens.length > 0) {
                     this.sceneObjects.tweens.forEach(t => t.stop());
                     this.sceneObjects.tweens = [];
                }

                const start = { 
                    p: this.sceneObjects.progress
                };
                
                const tween = new this.TWEEN.Tween(start)
                    .to({ p: target }, this.transitionDuration)
                    .easing(this.TWEEN.Easing.Cubic.InOut)
                    .onUpdate(() => {
                        this.sceneObjects.progress = start.p;
                        this.updateInstancedMatrices(start.p);
                    });
                tween.start();
                this.sceneObjects.tweens.push(tween);
            }
            
            setupAnimations() {
                const so = this.sceneObjects;
                so.progress = 1;
                this.updateInstancedMatrices(so.progress);
                const driver = { p: 1 };
                const tweenExplode = new this.TWEEN.Tween(driver)
                    .to({ p: 0 }, 1000)
                    .delay(800)
                    .easing(this.TWEEN.Easing.Cubic.InOut)
                    .onUpdate(() => {
                        so.progress = driver.p;
                        this.updateInstancedMatrices(so.progress);
                    });
                tweenExplode.start();
                so.tweens.push(tweenExplode);

                if (this.camera) {
                    this.camera.position.z = 40; // Reset to initial
                    const camZStart = 40;
                    const camDriver = { z: camZStart };
                    const camTween = new this.TWEEN.Tween(camDriver)
                        .to({ z: camZStart + 8 }, 1000)
                        .delay(800)
                        .easing(this.TWEEN.Easing.Cubic.InOut)
                        .onUpdate(() => {
                            this.camera.position.z = camDriver.z;
                            this.camera.lookAt(0, 0, 0);
                        });
                    camTween.start();
                    so.tweens.push(camTween);
                }
            }

            setupUIListeners() {
                const photoInput = document.getElementById('photo-upload');
                const speedSlider = document.getElementById('speed-slider');
                const particleSlider = document.getElementById('particle-slider');
                const timelineSlider = document.getElementById('timeline-slider');
                const exportBtn = document.getElementById('export-btn');

                if (photoInput) {
                    photoInput.addEventListener('change', (e) => this.handlePhotoUpload(e));
                }
                if (speedSlider) {
                    speedSlider.addEventListener('input', (e) => {
                        this.rotationSpeed = parseFloat(e.target.value);
                    });
                }
                if (particleSlider) {
                    particleSlider.addEventListener('change', (e) => {
                        const count = parseInt(e.target.value, 10);
                        if (this.sceneObjects && this.sceneObjects.cfg) {
                            this.sceneObjects.cfg.needlesCount = count;
                            this.sceneObjects.cfg.spheresCount = Math.floor(count * 0.18);
                            this.sceneObjects.cfg.trisCount = Math.floor(count * 0.13);
                            this.sceneObjects.cfg.blocksCount = Math.floor(count * 0.13);
                            this.rebuildScene();
                        }
                    });
                }
                if (timelineSlider) {
                    timelineSlider.addEventListener('input', (e) => {
                        const val = parseFloat(e.target.value);
                        if (this.sceneObjects) {
                            this.sceneObjects.progress = 1 - val;
                            this.updateInstancedMatrices(this.sceneObjects.progress);
                            // Stop explosion tween if interacting
                             if (this.sceneObjects.tweens && this.sceneObjects.tweens[0]) {
                                this.sceneObjects.tweens[0].stop();
                            }
                        }
                    });
                }
                if (exportBtn) {
                    exportBtn.addEventListener('click', () => {
                        if (this.isRecording) {
                            this.stopRecording();
                            exportBtn.textContent = 'Export Video';
                            exportBtn.classList.remove('recording');
                        } else {
                            this.startRecording();
                            exportBtn.textContent = 'Stop Recording';
                            exportBtn.classList.add('recording');
                        }
                    });
                }
            }

            handlePhotoUpload(e) {
                const files = e.target.files;
                if (!files || files.length === 0) return;
                
                this.customTextures = [];
                const promises = [];
                const loader = new THREE.TextureLoader();

                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const url = URL.createObjectURL(file);
                    promises.push(new Promise(resolve => {
                        loader.load(url, (tex) => {
                            tex.colorSpace = THREE.SRGBColorSpace;
                            tex.needsUpdate = true;
                            this.customTextures.push(tex);
                            resolve();
                        });
                    }));
                }

                Promise.all(promises).then(() => {
                    this.rebuildScene();
                });
            }

            rebuildScene() {
                if (this.sceneObjects && this.sceneObjects.contentGroup) {
                    this.scene.remove(this.sceneObjects.contentGroup);
                    this.sceneObjects.contentGroup.traverse((child) => {
                        if (child.geometry) child.geometry.dispose();
                        if (child.material) {
                            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
                            else child.material.dispose();
                        }
                    });
                }
                
                if (this.sceneObjects && this.sceneObjects.tweens) {
                    this.sceneObjects.tweens.forEach(t => t.stop());
                }

                const currentCfg = this.sceneObjects ? this.sceneObjects.cfg : null;
                this.initSceneObjects();
                if (currentCfg) {
                    this.sceneObjects.cfg.needlesCount = currentCfg.needlesCount;
                    this.sceneObjects.cfg.spheresCount = currentCfg.spheresCount;
                    this.sceneObjects.cfg.trisCount = currentCfg.trisCount;
                    this.sceneObjects.cfg.blocksCount = currentCfg.blocksCount;
                    // Preserve progress
                    this.sceneObjects.progress = currentCfg.progress !== undefined ? currentCfg.progress : 1; 
                } else {
                    // Default progress for fresh init
                    this.sceneObjects.progress = 1;
                }
                
                // Store progress in cfg for next rebuild
                this.sceneObjects.cfg.progress = this.sceneObjects.progress;

                this.createCustomEffect();
                this.updateInstancedMatrices(this.sceneObjects.progress);
                
                // Only setup animations if it's fresh load (no currentCfg) or if we want specific behavior
                // But for rebuilding due to particle count change, we just want to maintain state.
                // setupAnimations() creates initial explosion tween which we might NOT want on rebuild.
                if (!currentCfg) {
                    this.setupAnimations();
                }
            }

            startRecording() {
                const stream = this.renderer.domElement.captureStream(30);
                
                // MIME Check
                let mimeType = 'video/webm;codecs=vp9';
                if (!MediaRecorder.isTypeSupported(mimeType)) {
                    mimeType = 'video/webm';
                    if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/mp4';
                }
                
                try {
                    this.mediaRecorder = new MediaRecorder(stream, { mimeType });
                } catch(err) {
                    console.warn("Recorder init failed, trying default", err);
                    this.mediaRecorder = new MediaRecorder(stream);
                }

                this.recordedChunks = [];
                this.mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) this.recordedChunks.push(e.data);
                };
                this.mediaRecorder.onstop = () => {
                    const blob = new Blob(this.recordedChunks, { type: this.mediaRecorder.mimeType || 'video/webm' });
                    // Send to parent for top-level download
                    try {
                        if (window.parent) {
                            window.parent.postMessage({ type: 'REC_BLOB', blob, mimeType: this.mediaRecorder.mimeType || 'video/webm' }, '*');
                        }
                    } catch (_) {}
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const ext = (this.mediaRecorder.mimeType && this.mediaRecorder.mimeType.includes('mp4')) ? 'mp4' : 'webm';
                    a.download = `christmas-tree.${ext}`;
                    a.click();
                    URL.revokeObjectURL(url);
                };
                // Enter performance mode to reduce stutter during recording
                this.setRecordingPerformanceMode(true);
                this.mediaRecorder.start();
                this.isRecording = true;
            }

            stopRecording() {
                if (this.mediaRecorder && this.isRecording) {
                    this.mediaRecorder.stop();
                    this.isRecording = false;
                    // Restore quality settings after recording
                    this.setRecordingPerformanceMode(false);
                }
            }
            
            saveImage() {
                const w = Math.floor(window.innerWidth);
                const h = Math.floor(window.innerHeight);
                const target = new THREE.WebGLRenderTarget(w, h);
                const prevTarget = this.renderer.getRenderTarget();
                this.renderer.setRenderTarget(target);
                this.renderer.render(this.scene, this.camera);
                this.renderer.setRenderTarget(prevTarget);

                const pixels = new Uint8Array(w * h * 4);
                this.renderer.readRenderTargetPixels(target, 0, 0, w, h, pixels);
                target.dispose();

                const canvas2d = document.createElement('canvas');
                canvas2d.width = w;
                canvas2d.height = h;
                const ctx2d = canvas2d.getContext('2d');
                const imageData = ctx2d.createImageData(w, h);
                // Flip Y when copying pixels
                for (let y = 0; y < h; y++) {
                    const srcStart = y * w * 4;
                    const destStart = (h - 1 - y) * w * 4;
                    imageData.data.set(pixels.subarray(srcStart, srcStart + w * 4), destStart);
                }
                ctx2d.putImageData(imageData, 0, 0);
                const dataUrl = canvas2d.toDataURL('image/png');

                try {
                    if (window.parent) {
                        window.parent.postMessage({ type: 'IMAGE_DATA', dataUrl }, '*');
                    }
                } catch (_) {}
                const link = document.createElement('a');
                link.download = 'christmas-tree-export.png';
                link.href = dataUrl;
                link.click();
            }

            setRecordingPerformanceMode(enable) {
                if (!this.renderer) return;
                if (enable) {
                    this.prevPixelRatio = this.renderer.getPixelRatio();
                    this.renderer.setPixelRatio(1);
                    if (this.composer) this.composer.setSize(window.innerWidth, window.innerHeight);
                    if (this.bloomPass) {
                        this.prevBloom = {
                            strength: this.bloomPass.strength,
                            radius: this.bloomPass.radius,
                            threshold: this.bloomPass.threshold
                        };
                        this.bloomPass.strength = Math.min(0.8, this.bloomPass.strength * 0.6);
                        this.bloomPass.radius = Math.min(0.3, this.bloomPass.radius * 0.6);
                    }
                } else {
                    if (typeof this.prevPixelRatio === 'number') {
                        this.renderer.setPixelRatio(this.prevPixelRatio);
                        if (this.composer) this.composer.setSize(window.innerWidth, window.innerHeight);
                    }
                    if (this.bloomPass && this.prevBloom) {
                        this.bloomPass.strength = this.prevBloom.strength;
                        this.bloomPass.radius = this.prevBloom.radius;
                        this.bloomPass.threshold = this.prevBloom.threshold;
                    }
                }
            }

            defaultUpdate(timestamp) {
                this.lastTime = timestamp;
                if (this.controls && this.controls.enableDamping) this.controls.update();
                this.update();
            }
        }

        const scriptScene = new ScriptScene(null, document.getElementById('container'));
        scriptScene.loadTextures().then(() => {
            scriptScene.setupScene();
            // scriptScene.setupUIListeners(); // Disabled
            scriptScene.start(() => {
                TWEEN.update();
                scriptScene.updateScene();
            });
        });

    </script>
