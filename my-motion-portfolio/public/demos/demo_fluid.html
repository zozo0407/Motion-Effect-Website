<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Fluid - Multipass Feedback</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
    </style>
    <!-- Import Maps Polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import { UnifiedRenderer } from '../js/UnifiedRenderer.js';

        // Feedback Shader
        // Reads previous frame from uBuffer, adds mouse interaction, and fades out
        const fragmentShader = `
            uniform float uTime;
            uniform vec2 uResolution;
            uniform vec2 uMouse;
            uniform sampler2D uBuffer; // Previous frame
            
            uniform float uDecay;
            uniform float uSize;
            
            varying vec2 vUv;

            void main() {
                vec2 uv = vUv;
                
                // 1. Read previous frame
                vec4 prev = texture2D(uBuffer, uv);
                
                // 2. Draw circle at mouse position
                // Fix aspect ratio for circle shape
                vec2 p = uv;
                p.x *= uResolution.x / uResolution.y;
                vec2 m = uMouse.xy / uResolution.xy;
                m.x *= uResolution.x / uResolution.y;
                
                float dist = length(p - m);
                float circle = smoothstep(uSize, 0.0, dist);
                
                // 3. Color logic
                vec3 newColor = vec3(circle);
                
                // Add color variation based on time
                if (circle > 0.0) {
                    newColor.r *= 0.5 + 0.5 * sin(uTime * 3.0);
                    newColor.g *= 0.5 + 0.5 * cos(uTime * 2.0);
                    newColor.b *= 1.0;
                }

                // 4. Mix: Previous * Decay + New Input
                // The "max" operator creates a trail effect
                vec3 finalColor = max(prev.rgb * uDecay, newColor);
                
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        new UnifiedRenderer({
            type: 'shader',
            fragmentShader: fragmentShader,
            buffers: true, // Enable Multipass
            
            params: {
                uDecay: 0.98,
                uSize: 0.05
            },
            
            init: (renderer) => {
                renderer.setUI([
                    { name: '拖尾长度 / Decay', value: 0.98, min: 0.90, max: 0.995, step: 0.001, bind: 'uDecay' },
                    { name: '笔刷大小 / Size', value: 0.05, min: 0.01, max: 0.2, step: 0.01, bind: 'uSize' }
                ]);
            }
        });
    </script>
</body>
</html>
