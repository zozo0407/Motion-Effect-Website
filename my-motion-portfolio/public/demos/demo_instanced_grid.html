<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo - 方形矩阵 (Instanced)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #container { width: 100vw; height: 100vh; }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@tweenjs/tween.js": "https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.esm.js"
            }
        }
    </script>
</head>
<body>
    <div id="container"></div>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import * as TWEEN from '@tweenjs/tween.js';
        import { UnifiedRenderer } from '../js/UnifiedRenderer.js';

        // --- Unified Protocol Implementation ---
        const UI_CONFIG = [
            { name: '矩阵尺寸', value: 8, min: 2, max: 16, step: 1, bind: 'uGridSize' },
            { name: '间距', value: 1.5, min: 1.0, max: 3.0, step: 0.1, bind: 'uSpacing' },
            { name: '动画速度', value: 0.5, min: 0, max: 2, step: 0.1, bind: 'uSpeed' }
        ];

        class ScriptScene {
            constructor(amgScene = null, container = null) {
                this.scene = new THREE.Scene();
                this.camera = null;
                this.renderer = null;
                this.sceneObjects = { tweens: [], mesh: null };
                this.animationSpeed = 0.5;
                this.gridSize = 8;
                this.spacing = 1.5;
                this.isAnimating = false;
                this.dummy = new THREE.Object3D();

                this.initCoreObjects();
                if (container) {
                    this.init(container);
                }
            }

            initCoreObjects() {
                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(10, 10, 10);

                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.outputColorSpace = THREE.SRGBColorSpace;
                
                this.TWEEN = TWEEN;
            }

            init(container) {
                container.appendChild(this.renderer.domElement);
                this.controls = new OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
            }

            setupScene() {
                // --- Setup Begin ---
                // 1. Environment
                this.scene.background = new THREE.Color(0x0a0a0a);

                // 2. Lights
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
                this.scene.add(ambientLight);

                const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
                dirLight.position.set(5, 10, 5);
                this.scene.add(dirLight);

                // 3. Load Texture (Fallback to color if not found)
                const loader = new THREE.TextureLoader();
                
                // Try loading sample1.jpg, fallback to color if fails
                const texturePromise = new Promise((resolve) => {
                    loader.load(
                        '../sample/Sample1.jpg',
                        (tex) => {
                            tex.colorSpace = THREE.SRGBColorSpace;
                            tex.wrapS = THREE.RepeatWrapping;
                            tex.wrapT = THREE.RepeatWrapping;
                            resolve(tex);
                        },
                        undefined,
                        () => {
                            resolve(null);
                        }
                    );
                });

                // Create Instanced Mesh
                this.createInstancedGrid(texturePromise);
                // --- Setup End ---

                this.setupAnimations();
            }

            createInstancedGrid(texturePromise) {
                const count = this.gridSize * this.gridSize;

                const geometry = new THREE.BoxGeometry(1, 1, 0.1);
                
                texturePromise.then((texture) => {
                    let material;
                    if (texture) {
                        material = new THREE.MeshStandardMaterial({
                            map: texture,
                            metalness: 0.1,
                            roughness: 0.8
                        });
                    } else {
                        // Fallback material with subtle color variation
                        material = new THREE.MeshStandardMaterial({
                            color: 0x00CAE0,
                            metalness: 0.3,
                            roughness: 0.5
                        });
                    }

                    const mesh = new THREE.InstancedMesh(geometry, material, count);
                    
                    // Positions
                    let index = 0;
                    const offset = (this.gridSize - 1) * this.spacing / 2;
                    
                    for (let x = 0; x < this.gridSize; x++) {
                        for (let z = 0; z < this.gridSize; z++) {
                            this.dummy.position.set(
                                x * this.spacing - offset,
                                0,
                                z * this.spacing - offset
                            );
                            this.dummy.updateMatrix();
                            mesh.setMatrixAt(index++, this.dummy.matrix);
                        }
                    }

                    mesh.instanceMatrix.needsUpdate = true;
                    this.scene.add(mesh);
                    this.sceneObjects.mesh = mesh;
                });
            }

            setupAnimations() {
                // --- Animation Begin ---
                // 动画逻辑将在 update() 循环中基于时间驱动
                // --- Animation End ---
            }

            handleResize(width, height) {
                if (!width) width = window.innerWidth;
                if (!height) height = window.innerHeight;
                this.camera.aspect = width / height;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(width, height);
            }

            start() {
                this.isAnimating = true;
                this.renderer.setAnimationLoop(() => {
                    this.update();
                });
            }

            stop() {
                this.isAnimating = false;
                this.renderer.setAnimationLoop(null);
            }

            update() {
                this.TWEEN.update();
                if (this.controls) this.controls.update();

                // Animate Instanced Mesh
                if (this.sceneObjects.mesh) {
                    const mesh = this.sceneObjects.mesh;
                    const time = Date.now() * 0.001 * this.animationSpeed;
                    let index = 0;
                    const offset = (this.gridSize - 1) * this.spacing / 2;
                    
                    for (let x = 0; x < this.gridSize; x++) {
                        for (let z = 0; z < this.gridSize; z++) {
                            // Calculate wave height based on position and time
                            const waveX = Math.sin(time + x * 0.5) * 0.5;
                            const waveZ = Math.sin(time + z * 0.5) * 0.5;
                            const yPos = (waveX + waveZ) * 1.0;

                            this.dummy.position.set(
                                x * this.spacing - offset,
                                yPos,
                                z * this.spacing - offset
                            );
                            
                            // Subtle rotation
                            this.dummy.rotation.y = time + x * 0.1;
                            this.dummy.rotation.x = time * 0.5 + z * 0.1;

                            this.dummy.updateMatrix();
                            mesh.setMatrixAt(index++, this.dummy.matrix);
                        }
                    }
                    mesh.instanceMatrix.needsUpdate = true;
                }

                this.renderer.render(this.scene, this.camera);
            }

            dispose() {
                this.stop();
                if (this.sceneObjects.mesh) {
                    this.sceneObjects.mesh.geometry.dispose();
                    if (this.sceneObjects.mesh.material.map) {
                        this.sceneObjects.mesh.material.map.dispose();
                    }
                    this.sceneObjects.mesh.material.dispose();
                }
                if (this.renderer) {
                    this.renderer.dispose();
                    this.renderer.domElement.remove();
                }
            }
        }

        // Initialize UnifiedRenderer
        new UnifiedRenderer({
            type: 'custom',
            container: document.getElementById('container'),
            
            init: (renderer) => {
                const scriptScene = new ScriptScene(null, renderer.container);
                scriptScene.setupScene();
                scriptScene.start();
                
                // Store reference for callbacks
                renderer.scriptScene = scriptScene;

                // Set UI
                renderer.setUI(UI_CONFIG);

                // Handle Resize
                renderer.onResize = (w, h) => scriptScene.handleResize(w, h);
                
                // Handle Dispose
                renderer.onDispose = () => scriptScene.dispose();
            },

            onParamChange: (key, value, renderer) => {
                const scriptScene = renderer.scriptScene;
                if (!scriptScene) return;

                if (key === 'uSpeed') {
                    scriptScene.animationSpeed = value;
                }
                
                if (key === 'uGridSize' || key === 'uSpacing') {
                    // Recreate grid if these params change (simplified)
                    if (key === 'uGridSize') scriptScene.gridSize = value;
                    if (key === 'uSpacing') scriptScene.spacing = value;
                    
                    // Quick refresh: dispose old mesh and re-setup
                    if (scriptScene.sceneObjects.mesh) {
                         scriptScene.scene.remove(scriptScene.sceneObjects.mesh);
                         scriptScene.sceneObjects.mesh.geometry.dispose();
                         scriptScene.sceneObjects.mesh.material.dispose();
                    }
                    
                    // Recreate with new params
                    // We need to recreate the texture promise logic, for simplicity we just reload setupScene's logic partially
                    const loader = new THREE.TextureLoader();
                    const texturePromise = new Promise((resolve) => {
                         loader.load(
                             'assets/sample1.jpg',
                             (tex) => {
                                 tex.colorSpace = THREE.SRGBColorSpace;
                                 tex.wrapS = THREE.RepeatWrapping;
                                 tex.wrapT = THREE.RepeatWrapping;
                                 resolve(tex);
                             },
                             undefined,
                             () => resolve(null)
                         );
                    });
                    scriptScene.createInstancedGrid(texturePromise);
                }
            }
        });
    </script>
</body>
</html>
