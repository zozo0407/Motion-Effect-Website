<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding Demo</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: 'Inter', sans-serif; }
        
        /* Layout */
        #canvas-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
        }

        /* Vibe Interface */
        #vibe-interface {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            max-width: 90%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Chat Input */
        .chat-input-wrapper {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 4px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s;
        }
        .chat-input-wrapper:focus-within {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(40, 40, 40, 0.9);
        }

        #chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 16px;
            font-size: 16px;
            outline: none;
        }

        #send-btn {
            background: #fff;
            color: #000;
            border: none;
            border-radius: 12px;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 4px;
            transition: transform 0.2s;
        }
        #send-btn:hover { transform: scale(1.05); }
        #send-btn svg { width: 20px; height: 20px; }

        /* Status Indicator */
        #status-indicator {
            align-self: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            height: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .thinking { opacity: 1 !important; }
        
        /* Mock "Thought Process" Logs (Hidden by default, for debug) */
        #agent-logs {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 300px;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            border-radius: 8px;
            display: none; /* Can be toggled */
        }

    </style>
    <!-- Dependencies -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="vibe-interface">
        <div id="status-indicator">AI is thinking...</div>
        <div class="chat-input-wrapper">
            <input type="text" id="chat-input" placeholder="Describe a visual effect... (e.g. 'Make it red and faster')">
            <button id="send-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="agent-logs"></div>

    <script type="module">
        import * as THREE from 'three';
        import { UnifiedRenderer } from '../js/UnifiedRenderer.js';

        let currentSketch = null;
        
        // --- 1. Initial State (The "Template") ---
        // This is the code string that we will dynamically modify
        let activeCode = `
            init: (sketch) => {
                const { scene, params } = sketch;
                const geometry = new THREE.IcosahedronGeometry(1, 1);
                const material = new THREE.MeshStandardMaterial({ 
                    color: new THREE.Color(params.color),
                    wireframe: true
                });
                sketch.mesh = new THREE.Mesh(geometry, material);
                scene.add(sketch.mesh);
                
                const light = new THREE.DirectionalLight(0xffffff, 1);
                light.position.set(1, 1, 1);
                scene.add(light);
                scene.add(new THREE.AmbientLight(0x222222));
            },
            update: ({ time }, sketch) => {
                if (sketch.mesh) {
                    sketch.mesh.rotation.x = time * 0.5;
                    sketch.mesh.rotation.y = time * 0.3;
                }
            }
        `;

        let activeParams = {
            color: '#00ff88'
        };

        // --- 2. Runtime: Code Injection Engine ---
        function runCode(codeString, params) {
            // Cleanup old sketch
            if (currentSketch) {
                // UnifiedRenderer doesn't have destroy yet, but we can clear container
                document.getElementById('canvas-container').innerHTML = '';
                // In a real app, we'd call currentSketch.dispose()
            }

            try {
                // Construct the full class instantiation string
                // We use 'new Function' to create a sandbox-like scope
                const factory = new Function('THREE', 'UnifiedRenderer', 'params', `
                    return new UnifiedRenderer({
                        type: 'three',
                        container: document.getElementById('canvas-container'),
                        params: params,
                        ${codeString}
                    });
                `);

                currentSketch = factory(THREE, UnifiedRenderer, params);
                console.log("Code injected successfully");
            } catch (e) {
                console.error("Injection Failed:", e);
                logAgent("Runtime Error: " + e.message);
            }
        }

        // Initialize
        runCode(activeCode, activeParams);


        // --- 3. Mock Agent (The "Silent Coder") ---
        // In a real app, this would call an LLM API.
        // Here, we simulate the LLM's response logic with regex/presets.
        
        async function mockAgentThinking(prompt) {
            const status = document.getElementById('status-indicator');
            status.innerText = "Analyzing request...";
            status.classList.add('thinking');
            logAgent(`User Input: "${prompt}"`);

            // Simulate network delay
            await new Promise(r => setTimeout(r, 1000));

            status.innerText = "Generating code...";
            
            // --- Logic Simulation ---
            let newCode = activeCode;
            let newParams = { ...activeParams };

            const p = prompt.toLowerCase();

            if (p.includes('red') || p.includes('红')) {
                newParams.color = '#ff0000';
                logAgent("Action: Update Param (Color -> Red)");
            } 
            else if (p.includes('blue') || p.includes('蓝')) {
                newParams.color = '#0088ff';
                logAgent("Action: Update Param (Color -> Blue)");
            }
            else if (p.includes('fast') || p.includes('快')) {
                // Modify Update Loop Code
                newCode = newCode.replace('time * 0.5', 'time * 2.0');
                newCode = newCode.replace('time * 0.3', 'time * 1.5');
                logAgent("Action: Rewrite Code (Speed Up)");
            }
            else if (p.includes('sphere') || p.includes('球')) {
                newCode = newCode.replace('IcosahedronGeometry(1, 1)', 'SphereGeometry(1, 32, 32)');
                newCode = newCode.replace('wireframe: true', 'wireframe: false');
                logAgent("Action: Rewrite Code (Geometry -> Sphere)");
            }
            else if (p.includes('box') || p.includes('方')) {
                newCode = newCode.replace('IcosahedronGeometry(1, 1)', 'BoxGeometry(1.5, 1.5, 1.5)');
                logAgent("Action: Rewrite Code (Geometry -> Box)");
            }
            
            // Simulate Sandbox Validation (Pass)
            await new Promise(r => setTimeout(r, 500));
            status.innerText = "Applying changes...";
            
            // Apply
            activeCode = newCode;
            activeParams = newParams;
            runCode(activeCode, activeParams);
            
            status.classList.remove('thinking');
        }

        // --- UI Events ---
        const input = document.getElementById('chat-input');
        const btn = document.getElementById('send-btn');

        function handleSend() {
            const val = input.value.trim();
            if (!val) return;
            mockAgentThinking(val);
            input.value = '';
        }

        btn.addEventListener('click', handleSend);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        function logAgent(msg) {
            const logs = document.getElementById('agent-logs');
            const line = document.createElement('div');
            line.innerText = `> ${msg}`;
            logs.appendChild(line);
            logs.scrollTop = logs.scrollHeight;
        }

    </script>
</body>
</html>
