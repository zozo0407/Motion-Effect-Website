<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js 3D Editor</title>
  <link rel="stylesheet" href="/css/editor.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <!-- 顶部工具栏 -->
  <header class="toolbar">
    <div class="toolbar-section">
      <button class="toolbar-btn" id="newScene" title="新建场景">
        <i class="fas fa-plus"></i>
      </button>
      <button class="toolbar-btn" id="saveScene" title="保存场景">
        <i class="fas fa-save"></i>
      </button>
      <button class="toolbar-btn" id="loadScene" title="加载场景">
        <i class="fas fa-folder-open"></i>
      </button>
    </div>
    
    <div class="toolbar-section">
      <button class="toolbar-btn" id="undoBtn" title="撤销">
        <i class="fas fa-undo"></i>
      </button>
      <button class="toolbar-btn" id="redoBtn" title="重做">
        <i class="fas fa-redo"></i>
      </button>
    </div>
    
    <div class="toolbar-section">
      <button class="toolbar-btn transform-btn active" data-mode="translate" title="移动">
        <i class="fas fa-arrows-alt"></i>
      </button>
      <button class="toolbar-btn transform-btn" data-mode="rotate" title="旋转">
        <i class="fas fa-sync-alt"></i>
      </button>
      <button class="toolbar-btn transform-btn" data-mode="scale" title="缩放">
        <i class="fas fa-expand-arrows-alt"></i>
      </button>
    </div>
    
    <div class="toolbar-section">
      <button class="toolbar-btn" id="playBtn" title="播放/暂停">
        <i class="fas fa-play"></i>
      </button>
    </div>
  </header>

  <div class="editor-container">
    <!-- 左侧面板 -->
    <aside class="left-panel">
      <!-- 对象库 -->
      <div class="panel-section">
        <h3 class="panel-title">
          <i class="fas fa-cube"></i>
          对象库
        </h3>
        <div class="object-library">
          <button class="object-btn" data-type="box">
            <i class="fas fa-cube"></i>
            立方体
          </button>
          <button class="object-btn" data-type="sphere">
            <i class="fas fa-circle"></i>
            球体
          </button>
          <button class="object-btn" data-type="cylinder">
            <i class="fas fa-database"></i>
            圆柱体
          </button>
          <button class="object-btn" data-type="plane">
            <i class="fas fa-square"></i>
            平面
          </button>
          <button class="object-btn" data-type="light">
            <i class="fas fa-lightbulb"></i>
            光源
          </button>
          <button class="object-btn" data-type="camera">
            <i class="fas fa-video"></i>
            相机
          </button>
        </div>
      </div>

      <!-- 场景层级 -->
      <div class="panel-section">
        <h3 class="panel-title">
          <i class="fas fa-sitemap"></i>
          场景层级
        </h3>
        <div class="scene-hierarchy" id="sceneHierarchy">
          <!-- 动态生成的场景树 -->
        </div>
      </div>
    </aside>

    <!-- 主编辑区域 -->
    <main class="viewport">
      <div class="viewport-header">
        <div class="viewport-info">
          <span>透视视图</span>
          <span id="fpsCounter">FPS: 60</span>
          <span class="transform-hint">快捷键: G-移动 R-旋转 S-缩放 ESC-取消 SPACE-播放/暂停</span>
        </div>
        <div class="viewport-controls">
          <button class="view-btn active" data-view="perspective" title="透视视图">3D</button>
          <button class="view-btn" data-view="top" title="顶视图">顶</button>
          <button class="view-btn" data-view="front" title="前视图">前</button>
          <button class="view-btn" data-view="side" title="侧视图">侧</button>
          <button class="view-btn" data-view="scene" title="场景相机视角">
            <i class="fas fa-eye"></i>
            场景
          </button>
        </div>
        <!-- 相机模式开关 -->
        <div class="camera-mode-switch">
          <div class="switch-container">
            <label class="switch-label">
              <input type="checkbox" id="cameraToggle">
              <span class="switch-slider">
                <span class="switch-text-left">场景相机</span>
                <span class="switch-text-right">漫游相机</span>
              </span>
            </label>
            <div class="switch-hint">
              <span id="cameraModeText">漫游相机</span>
            </div>
          </div>
        </div>
      </div>
      <div class="canvas-container" id="canvasContainer">
        <!-- Three.js canvas 将在这里生成 -->
      </div>
    </main>

    <!-- 右侧属性面板 -->
    <aside class="right-panel">
      <div class="panel-section">
        <h3 class="panel-title">
          <i class="fas fa-cog"></i>
          属性面板
        </h3>
        <div class="properties-panel" id="propertiesPanel">
          <div class="no-selection">
            <p>请选择一个对象</p>
          </div>
        </div>
      </div>

      <!-- 材质编辑器 -->
      <div class="panel-section">
        <h3 class="panel-title">
          <i class="fas fa-palette"></i>
          材质编辑
        </h3>
        <div class="material-editor" id="materialEditor">
          <div class="material-property">
            <label>颜色:</label>
            <input type="color" id="materialColor" value="#ffffff">
          </div>
          <div class="material-property">
            <label>粗糙度:</label>
            <input type="range" id="materialRoughness" min="0" max="1" step="0.01" value="0.5">
            <span class="value-display">0.5</span>
          </div>
          <div class="material-property">
            <label>金属度:</label>
            <input type="range" id="materialMetalness" min="0" max="1" step="0.01" value="0">
            <span class="value-display">0</span>
          </div>
        </div>
      </div>

      <!-- 变换控制 -->
      <div class="panel-section">
        <h3 class="panel-title">
          <i class="fas fa-arrows-alt"></i>
          变换
        </h3>
        <div class="transform-controls">
          <div class="transform-group">
            <label>位置 (X, Y, Z):</label>
            <div class="input-group">
              <input type="number" id="posX" step="0.1" placeholder="X">
              <input type="number" id="posY" step="0.1" placeholder="Y">
              <input type="number" id="posZ" step="0.1" placeholder="Z">
            </div>
          </div>
          <div class="transform-group">
            <label>旋转 (X, Y, Z):</label>
            <div class="input-group">
              <input type="number" id="rotX" step="1" placeholder="X°">
              <input type="number" id="rotY" step="1" placeholder="Y°">
              <input type="number" id="rotZ" step="1" placeholder="Z°">
            </div>
          </div>
          <div class="transform-group">
            <label>缩放 (X, Y, Z):</label>
            <div class="input-group">
              <input type="number" id="scaleX" step="0.1" placeholder="X" value="1">
              <input type="number" id="scaleY" step="0.1" placeholder="Y" value="1">
              <input type="number" id="scaleZ" step="0.1" placeholder="Z" value="1">
            </div>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <!-- 时间轴 -->
  <div class="timeline-container">
    <div class="timeline-header">
      <div class="timeline-title">
        <i class="fas fa-clock"></i>
        <span>时间轴</span>
      </div>
      <div class="timeline-info">
        <span id="timelineCurrentTime">0.00s</span>
        <span>/</span>
        <span id="timelineDuration">3.00s</span>
      </div>
    </div>
    <div class="timeline-track">
      <div class="timeline-background">
        <div class="timeline-progress" id="timelineProgress"></div>
        <div class="timeline-cursor" id="timelineCursor"></div>
      </div>
      <div class="timeline-markers">
        <!-- 时间刻度标记将通过JS动态生成 -->
      </div>
    </div>
  </div>

  <!-- 底部状态栏 -->
  <footer class="status-bar">
    <div class="status-section">
      <span id="selectedObjectInfo">未选择对象</span>
    </div>
    <div class="status-section">
      <span id="sceneStats">对象: 0 | 三角形: 0</span>
    </div>
    <div class="status-section">
      <span id="renderMode">渲染模式: 实时</span>
    </div>
  </footer>

  <!-- 脚本文件 -->
  <script src="/js/CCapture.all.min.js"></script>
  <script src="/dist/bundle.js"></script>
  <script src="/dist/editor.js"></script>
  <script src="/js/editor.js"></script>
</body>
</html>
