<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Effect</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
    }
    
    canvas {
      display: block;
    }
    
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: Arial, sans-serif;
      padding: 10px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 5px;
      max-width: 300px;
      pointer-events: none;
    }
    
    .editor-entrance {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
    }
    
    .editor-btn {
      background: linear-gradient(135deg, #4CAF50, #45a049);
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .editor-btn:hover {
      background: linear-gradient(135deg, #45a049, #4CAF50);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
    }
    
    .editor-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 10px rgba(76, 175, 80, 0.3);
    }
  </style>
</head>
<body>
  <!-- <div class="info">
    <h1>3D Effect</h1> -->
  <!-- </div> -->
  
  <!-- 编辑器入口
  <div class="editor-entrance">
    <button class="editor-btn" onclick="openEditor()">
      <span>🎛️</span>
      <span>进入编辑器</span>
    </button>
  </div> -->
  
  <!-- 主应用脚本 -->
  <script src="dist/bundle.js"></script>

  <script src="js/CCapture.all.min.js"></script>
  
  <!-- 编辑器入口脚本 -->
  <script>
    function openEditor() {
      const editorUrl = window.location.origin + '/editor';
      
      // 显示加载提示
      const btn = document.querySelector('.editor-btn');
      const originalContent = btn.innerHTML;
      btn.innerHTML = '<span>⏳</span><span>正在加载...</span>';
      btn.disabled = true;
      
      // 检查编辑器页面是否可用
      fetch(editorUrl)
        .then(response => {
          if (response.ok) {
            // 直接在当前页面跳转
            window.location.href = editorUrl;
          } else {
            alert('编辑器页面暂时不可用，请稍后重试');
            btn.innerHTML = originalContent;
            btn.disabled = false;
          }
        })
        .catch(error => {
          console.error('无法访问编辑器:', error);
          // 直接尝试跳转
          window.location.href = editorUrl;
        });
    }
  </script>
</body>
</html>
