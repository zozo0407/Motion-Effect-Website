<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Fireworks Animation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            /* background-color: #1a0505; */
            background-image: url('image/bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        canvas {
            display: block;
        }
        /* UI Control Panel */
        #ui-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            color: white;
            font-family: Arial, sans-serif;
            z-index: 1000;
        }
        .control-group {
            margin-bottom: 10px;
        }
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .control-group input {
            width: 150px;
        }
        
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Post Processing Dependencies -->
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>
<body>
    <div id="container"></div>
    
    <!-- UI Controls will be generated here -->
    <div id="ui-controls"></div>

    <!-- 
        ========================================
        SHADERS
        ========================================
    -->

    <!-- 1. MAIN PARTICLE SHADERS (For Rings) -->
    <script type="x-shader/x-vertex" id="vertexshader">
        uniform float uTime;
        uniform float uDuration;
        uniform float uGlobalScale; 
        
        attribute vec3 aTargetPos;
        attribute float aSize;
        attribute float aRotation;
        attribute float aRingIndex;

        varying float vAlpha;
        varying float vRotation;
        varying float vLife;

        float easeOutQuad(float t) {
            return 1.0 - (1.0 - t) * (1.0 - t);
        }

        void main() {
            vRotation = aRotation;

            float time = mod(uTime, uDuration);
            
            // Animation Phases with overlap
            float explosionProgress = smoothstep(0.0, 0.5, time); 
            float driftProgress = smoothstep(0.3, 1.0, time);
            
            float currentProgress = easeOutQuad(explosionProgress);
            
            // Movement
            vec3 pos = mix(vec3(0.0), aTargetPos * uGlobalScale, currentProgress);
            
            // Drift: outward + slightly down
            pos += normalize(aTargetPos) * driftProgress * 2.0;
            pos.y -= driftProgress * driftProgress * 5.0; 

            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            
            // Apply Global Scale to Point Size
            gl_PointSize = aSize * uGlobalScale * (300.0 / -mvPosition.z);
            
            // Opacity Control
            float fadeIn = smoothstep(0.0, 0.1, time);
            
            // Ring-based fade out (50%-100%)
            float fadeOut = 1.0;
            if (aRingIndex < 4.0) {
                // Inner rings (0-3): start at 50%-70%, each takes 20%
                float ringFadeStart = 0.50 + aRingIndex * 0.05;
                float ringFadeEnd = ringFadeStart + 0.20;
                fadeOut = 1.0 - smoothstep(ringFadeStart, ringFadeEnd, time);
            } else {
                // Outermost ring (4): 70%-100%
                fadeOut = 1.0 - smoothstep(0.70, 1.0, time);
            }
            
            vAlpha = fadeIn * fadeOut;
            vLife = time / uDuration; 

            gl_Position = projectionMatrix * mvPosition;
        }
    </script>

    <script type="x-shader/x-fragment" id="fragmentshader">
        uniform sampler2D uTexture;
        uniform vec3 uColor; // Uniform color for the whole ring
        uniform float uOpacityMultiplier;
        uniform vec3 uGlobalTint;
        uniform float uGlowIntensity;
        
        varying float vAlpha;
        varying float vRotation;
        varying float vLife;

        vec2 rotate(vec2 uv, float rotation, vec2 center) {
            return vec2(
                cos(rotation) * (uv.x - center.x) + sin(rotation) * (uv.y - center.y) + center.x,
                cos(rotation) * (uv.y - center.y) - sin(rotation) * (uv.x - center.x) + center.y
            );
        }

        void main() {
            vec2 uv = gl_PointCoord;
            uv.y = 1.0 - uv.y;
            
            vec2 rotatedUV = rotate(uv, vRotation, vec2(0.5));
            vec4 texColor = texture2D(uTexture, rotatedUV);
            
            if (texColor.a < 0.1) discard;

            // Final Color Calculation
            vec3 finalColor = uColor * uGlobalTint * uGlowIntensity;

            gl_FragColor = vec4(finalColor, vAlpha * texColor.a * uOpacityMultiplier);
        }
    </script>

    <!-- 2. SPARKLE SHADERS (For Twinkling Particles) -->
    <script type="x-shader/x-vertex" id="sparkles-vertex">
        uniform float uTime;
        uniform float uDuration;
        uniform float uGlobalScale; 
        uniform vec3 uColorInner;
        uniform vec3 uColorOuter;

        attribute vec3 aTargetPos;
        attribute float aSize;
        attribute float aRandom;
        attribute float aMixFactor; 

        varying float vAlpha;
        varying vec3 vColor;

        float easeOutQuad(float t) {
            return 1.0 - (1.0 - t) * (1.0 - t);
        }

        void main() {
            // Determine color based on mix factor
            vColor = mix(uColorInner, uColorOuter, aMixFactor);

            float time = mod(uTime, uDuration);
            
            float explosionProgress = smoothstep(0.0, 0.5, time); 
            float driftProgress = smoothstep(0.3, 1.0, time);
            
            float currentProgress = easeOutQuad(explosionProgress);
            
            vec3 pos = mix(vec3(0.0), aTargetPos * uGlobalScale, currentProgress);
            pos += normalize(aTargetPos) * driftProgress * 5.0; 
            pos.y -= driftProgress * driftProgress * 8.0; 

            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            
            float twinkle = 0.5 + 0.5 * sin(uTime * 15.0 + aRandom);
            float sizeScale = (0.5 + twinkle) * 0.7; 
            
            gl_PointSize = aSize * sizeScale * uGlobalScale * (300.0 / -mvPosition.z);
            
            float fadeIn = smoothstep(0.0, 0.1, time);
            float fadeOut = 1.0 - smoothstep(0.70, 1.0, time);
            vAlpha = fadeIn * fadeOut;

            gl_Position = projectionMatrix * mvPosition;
        }
    </script>

    <script type="x-shader/x-fragment" id="sparkles-fragment">
        uniform vec3 uGlobalTint;
        uniform float uGlowIntensity;
        varying float vAlpha;
        varying vec3 vColor;

        void main() {
            vec2 uv = gl_PointCoord - 0.5;
            float dist = length(uv);
            if (dist > 0.5) discard;
            
            float alpha = 1.0 - smoothstep(0.3, 0.5, dist);
            gl_FragColor = vec4(vColor * uGlobalTint * uGlowIntensity, vAlpha * alpha);
        }
    </script>

    <!-- 3. LAUNCH TEXT SHADERS -->
    <script type="x-shader/x-vertex" id="text-vertex">
        attribute float aSize;
        attribute vec3 aColor;
        varying vec3 vColor;
        varying float vIndex;
        uniform float uScale; 
        uniform float uGlobalScale; 

        void main() {
            vColor = aColor;
            vIndex = float(gl_VertexID); 
            
            // Apply scale to position to shrink the distance between texts
            vec4 scaledPosition = vec4(position * uScale*1.5, 1.0);
            vec4 mvPosition = modelViewMatrix * scaledPosition;
            
            gl_PointSize = aSize * uScale * (uGlobalScale * 0.6) * (300.0 / -mvPosition.z);
            
            gl_Position = projectionMatrix * mvPosition;
        }
    </script>

    <script type="x-shader/x-fragment" id="text-fragment">
        uniform sampler2D uTextureYan;
        uniform sampler2D uTextureHua;
        uniform float uOpacity;
        uniform vec3 uGlobalTint;
        uniform float uGlowIntensity;
        varying vec3 vColor;
        varying float vIndex;
        void main() {
            vec2 uv = gl_PointCoord;
            uv.y = 1.0 - uv.y; 
            
            vec4 texColor;
            if (vIndex < 0.5) {
                texColor = texture2D(uTextureYan, uv);
            } else {
                texColor = texture2D(uTextureHua, uv);
            }
            
            if (texColor.a < 0.1) discard;
            gl_FragColor = vec4(vColor * uGlobalTint * uGlowIntensity, texColor.a * uOpacity);
        }
    </script>

    <script>
        // =========================================================================
        // UI CONFIGURATION
        // Modify these values to adjust UI ranges and defaults easily
        // =========================================================================
        const uiConfig = {
            scale: { label: "爆炸大小", min: 0.5, max: 1.0, step: 0.1, value: 0.7, suffix: "" },
            speed: { label: "速度", min: 0.5, max: 2.0, step: 0.1, value: 1.0, suffix: "x" },
            concurrency: { label: "频率", min: 1, max: 4, step: 1, value: 3, suffix: "" },
            glow: { label: "发光强度", min: 0, max: 1.5, step: 0.1, value: 0.8, suffix: "" },
            colorShift: { label: "色彩倾向", min: -0.25, max: 0.25, step: 0.05, value: 0.0, suffix: "" },
            duration: { label: "持续时间", min: 3, max: 10, step: 0.5, value: 6.0, suffix: "s" }
        };

        // --- Global Configuration ---
        const config = {
            glowIntensity: 1.0,
            launchInterval: 4.0,
            speed: uiConfig.speed.value,
            globalScale: 1.0, // Base scale, overridden by random factor
            concurrency: uiConfig.concurrency.value,
            colorShift: uiConfig.colorShift.value,
            duration: uiConfig.duration.value,
            userScale: uiConfig.scale.value // Store user selected scale
        };
        config.globalScale = config.userScale; 

        // --- UI Generation ---
        const uiContainer = document.getElementById('ui-controls');
        const uiElements = {}; 

        Object.keys(uiConfig).forEach(key => {
            const setting = uiConfig[key];
            const group = document.createElement('div');
            group.className = 'control-group';
            
            const label = document.createElement('label');
            label.innerHTML = `${setting.label}: <span id="${key}Value">${setting.value}</span>${setting.suffix}`;
            
            const input = document.createElement('input');
            input.type = 'range';
            input.id = `${key}Slider`;
            input.min = setting.min;
            input.max = setting.max;
            input.step = setting.step;
            input.value = setting.value;
            
            group.appendChild(label);
            group.appendChild(input);
            uiContainer.appendChild(group);
            
            uiElements[key] = { input, valueSpan: label.querySelector('span'), setting };
        });

        

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x1a0505, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 40;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.getElementById('container').appendChild(renderer.domElement);

        // --- Post Processing Setup ---
        const renderScene = new THREE.RenderPass(scene, camera);
        
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight), 
            1.5, 0.4, 0.85
        );
        bloomPass.threshold = 0.1;
        bloomPass.strength = uiConfig.glow.value;
        bloomPass.radius = uiConfig.glow.value * 0.33;

        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- Assets ---
        const textureLoader = new THREE.TextureLoader();
        const textureYan = textureLoader.load('image/text1.png');
        const textureHua = textureLoader.load('image/text2.png');
        const textureYanExplosion = textureLoader.load('image/text5.png');
        const textureHuaExplosion = textureLoader.load('image/text6.png');
        const textureYanExplosion2 = textureLoader.load('image/text3.png');
        const textureHuaExplosion2 = textureLoader.load('image/text4.png');
        const globalTint = new THREE.Color(0xffffff);

        // --- Helper: Shared Shader Material Creator ---
        function createParticleMaterial(texture, opacity) {
            return new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uDuration: { value: 0 },
                    uTexture: { value: texture }, 
                    uOpacityMultiplier: { value: opacity },
                    uGlobalTint: { value: globalTint },
                    uGlowIntensity: { value: config.glowIntensity },
                    uGlobalScale: { value: config.globalScale },
                    uColor: { value: new THREE.Color(0xffffff) } 
                },
                vertexShader: document.getElementById('vertexshader').textContent,
                fragmentShader: document.getElementById('fragmentshader').textContent,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
        }

        // --- Geometry Helpers ---
        function createRingLayer(radius, count, size, opacity, textureYan, textureHua, ringIndex) {
            const geometryYan = new THREE.BufferGeometry();
            const geometryHua = new THREE.BufferGeometry();
            
            const scaledRadius = radius; 

             const positionsYan = [], targetPosYan = [], sizesYan = [], rotationsYan = [], ringIndicesYan = [];
             const positionsHua = [], targetPosHua = [], sizesHua = [], rotationsHua = [], ringIndicesHua = [];
    
             for (let i = 0; i < count; i++) {
                 const angle = (i / count) * Math.PI * 2;
                 const x = scaledRadius * Math.cos(angle);
                 const y = scaledRadius * Math.sin(angle);
                 const z = 0;
    
                 const rotation = angle - Math.PI / 2; 
    
                 if (i % 2 === 0) {
                     positionsYan.push(0, 0, 0);
                     targetPosYan.push(x, y, z);
                     sizesYan.push(size);
                     rotationsYan.push(rotation);
                     ringIndicesYan.push(ringIndex);
                 } else {
                     positionsHua.push(0, 0, 0);
                     targetPosHua.push(x, y, z);
                     sizesHua.push(size);
                     rotationsHua.push(rotation);
                     ringIndicesHua.push(ringIndex);
                 }
             }
    
             geometryYan.setAttribute('position', new THREE.Float32BufferAttribute(positionsYan, 3));
             geometryYan.setAttribute('aTargetPos', new THREE.Float32BufferAttribute(targetPosYan, 3));
             geometryYan.setAttribute('aSize', new THREE.Float32BufferAttribute(sizesYan, 1));
             geometryYan.setAttribute('aRotation', new THREE.Float32BufferAttribute(rotationsYan, 1));
             geometryYan.setAttribute('aRingIndex', new THREE.Float32BufferAttribute(ringIndicesYan, 1));
    
             geometryHua.setAttribute('position', new THREE.Float32BufferAttribute(positionsHua, 3));
             geometryHua.setAttribute('aTargetPos', new THREE.Float32BufferAttribute(targetPosHua, 3));
             geometryHua.setAttribute('aSize', new THREE.Float32BufferAttribute(sizesHua, 1));
             geometryHua.setAttribute('aRotation', new THREE.Float32BufferAttribute(rotationsHua, 1));
             geometryHua.setAttribute('aRingIndex', new THREE.Float32BufferAttribute(ringIndicesHua, 1));
    
             const materialYan = createParticleMaterial(textureYan, opacity);
             const materialHua = createParticleMaterial(textureHua, opacity);
    
             const group = new THREE.Group();
             group.add(new THREE.Points(geometryYan, materialYan));
             group.add(new THREE.Points(geometryHua, materialHua));
             
             return group;
         }
    
         function createSparkles(count, radius) {
             const geometry = new THREE.BufferGeometry();
             const positions = [];
             const targetPositions = [];
             const sizes = [];
             const randoms = []; 
             const mixFactors = [];
    
             for (let i = 0; i < count; i++) {
                 positions.push(0, 0, 0); 
    
                 const r = radius * Math.pow(Math.random(), 1/3); 
                 const theta = Math.random() * Math.PI * 2;
                 const phi = Math.acos(2 * Math.random() - 1);
                 
                 const x = r * Math.sin(phi) * Math.cos(theta);
                 const y = r * Math.sin(phi) * Math.sin(theta);
                 const z = r * Math.cos(phi);
    
                 targetPositions.push(x, y, z);
                 sizes.push(2.0 + Math.random() * 2.0); 
                 randoms.push(Math.random() * 100.0);
                 
                 // 50% chance to be Inner Color (0.0), 50% chance to be Outer Color (1.0)
                 mixFactors.push(Math.random() > 0.5 ? 1.0 : 0.0);
             }
    
             geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
             geometry.setAttribute('aTargetPos', new THREE.Float32BufferAttribute(targetPositions, 3));
             geometry.setAttribute('aSize', new THREE.Float32BufferAttribute(sizes, 1));
             geometry.setAttribute('aRandom', new THREE.Float32BufferAttribute(randoms, 1));
             geometry.setAttribute('aMixFactor', new THREE.Float32BufferAttribute(mixFactors, 1));
    
             const material = new THREE.ShaderMaterial({
                 uniforms: {
                     uTime: { value: 0 },
                     uDuration: { value: 0 },
                     uColorInner: { value: new THREE.Color(0xffffff) },
                     uColorOuter: { value: new THREE.Color(0xffffff) },
                     uGlobalTint: { value: globalTint },
                     uGlowIntensity: { value: config.glowIntensity }, 
                     uGlobalScale: { value: config.globalScale } 
                 },
                 vertexShader: document.getElementById('sparkles-vertex').textContent,
                 fragmentShader: document.getElementById('sparkles-fragment').textContent,
                 transparent: true,
                 depthWrite: false,
                 blending: THREE.AdditiveBlending
             });
    
             return new THREE.Points(geometry, material);
         }

         function createLaunchText() {
             const geometry = new THREE.BufferGeometry();
             const positions = [0, 3, 0,  0, -3, 0]; 
             const sizes = [30, 30]; 
             const colors = [];
             
             const color = new THREE.Color(0xffffff);
             for(let i=0; i<2; i++) colors.push(color.r, color.g, color.b);
    
             geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
             geometry.setAttribute('aSize', new THREE.Float32BufferAttribute(sizes, 1));
             geometry.setAttribute('aColor', new THREE.Float32BufferAttribute(colors, 3));
             
             const material = new THREE.ShaderMaterial({
                 uniforms: {
                     uTextureYan: { value: textureYan },
                     uTextureHua: { value: textureHua },
                     uOpacity: { value: 1.0 },
                     uGlobalTint: { value: globalTint },
                     uScale: { value: 1.0 },
                     uGlobalScale: { value: config.globalScale }, 
                     uGlowIntensity: { value: config.glowIntensity },
                     uColor: { value: new THREE.Color(0xffffff) } 
                 },
                 vertexShader: document.getElementById('text-vertex').textContent,
                 fragmentShader: document.getElementById('text-fragment').textContent,
                 transparent: true,
                 depthWrite: false,
                 blending: THREE.AdditiveBlending
             });
    
             return new THREE.Points(geometry, material);
         }

        // --- Firework Logic ---
        const fixedColors = [
            new THREE.Color(0xc30b03),
            new THREE.Color(0xff7f00),
            new THREE.Color(0xf2be45)
        ];
        let fireworkCount = 0;
        let colorOrder = [];
        
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        class Firework {
             constructor(scene) {
                 this.scene = scene;
                 
                 this.explosionGroup = new THREE.Group();
                
                // Rings 0-4 (initially use default textures)
                this.explosionGroup.add(createRingLayer(5, 12, 10, 1.0, textureYan, textureHua, 0)); // Ring 0
                this.explosionGroup.add(createRingLayer(8, 36, 7, 1.0, textureYan, textureHua, 1)); // Ring 1
                this.explosionGroup.add(createRingLayer(12, 18, 15, 1, textureYan, textureHua, 2)); // Ring 2
                this.explosionGroup.add(createRingLayer(16, 45, 10, 1, textureYan, textureHua, 3)); // Ring 3
                this.explosionGroup.add(createRingLayer(21, 16, 22, 0.9, textureYan, textureHua, 4)); // Ring 4
                 
                 // Sparkles
                 this.explosionGroup.add(createSparkles(25, 20)); 
                 
                 this.scene.add(this.explosionGroup);
                 this.explosionGroup.visible = false;

                 this.launchText = createLaunchText();
                 this.scene.add(this.launchText);
                 this.launchText.visible = false; 

                 this.isActive = false;
                this.startTime = 0;
                this.isExploded = false;
                this.explosionStartTime = 0;
                this.launchDuration = 0.5;
                this.explosionDuration = 3.5;
                this.targetY = 0; // Target height for explosion
             }

             reset(startTime, offset = 0) {
                 this.isActive = true;
                 this.startTime = startTime + offset;
                 this.isExploded = false;
                 
                 // Shuffle color order for every 3 fireworks (e.g., [0,1,2], [1,3,2], [2,0,1], etc.)
                 if (fireworkCount % 3 === 0) {
                     colorOrder = [0, 1, 2];
                     shuffleArray(colorOrder);
                 }
                 
                 this.launchText.visible = true;
                 this.explosionGroup.visible = false;

                 const currentX = (Math.random() - 0.5) * 40;
                 this.launchText.position.x = currentX;
                 this.explosionGroup.position.x = currentX;

                 // Calculate random target height (50% to 80% of screen height)
                 // Screen height at z=0 is approx 60 units (-30 to +30)
                 // 50% = 0, 80% = +18
                 this.targetY = Math.random() * 18.0;
                this.explosionGroup.position.y = this.targetY;
                
                this.explosionDuration = 3.5;
                
                // Determine textures based on cycle (every 3 fireworks)
                // Cycle 0: text1/text2
                // Cycle 1: text3/text4
                // Cycle 2: text5/text6
                let currentTextureYan, currentTextureHua;
                
                if (colorOrder[fireworkCount % 3] === 0) {
                    currentTextureYan = textureYan;
                    currentTextureHua = textureHua;
                } else if (colorOrder[fireworkCount % 3] === 1) {
                    currentTextureYan = textureYanExplosion2; // text3
                    currentTextureHua = textureHuaExplosion2; // text4
                } else {
                    currentTextureYan = textureYanExplosion; // text5
                    currentTextureHua = textureHuaExplosion; // text6
                }
                
                // Random Scale (+/- 30%)
                 const randomFactor = 0.85 + Math.random() * 0.3;
                 const finalScale = config.userScale * randomFactor;
                 
                 // Fixed Colors (cycle every 3 fireworks)
                const colorIndex = colorOrder[fireworkCount % 3];
                const randomColor = fixedColors[colorIndex];
                fireworkCount++;
                const hsl = {};
                randomColor.getHSL(hsl);
                hsl.h = (hsl.h + config.colorShift) % 1.0;
                const shiftedColor = new THREE.Color().setHSL(hsl.h, hsl.s, hsl.l);
                
                const colorInner = new THREE.Color(0xffffff);
                const colorOuter = shiftedColor;
                 
                 const getMixedColor = (t) => colorInner.clone().lerp(colorOuter, t);
                 
                 const ringColors = [
                     colorInner, // Ring 0
                     colorInner, // Ring 1
                     getMixedColor(0.4), // Ring 2
                     getMixedColor(0.7), // Ring 3
                     colorOuter, // Ring 4
                     colorInner // Sparkles (Default tint)
                 ];
                 
                 this.explosionGroup.children.forEach((child, index) => {
                     if (index < 5) { // Rings
                         child.children.forEach((points, pointIndex) => {
                             if (points.material && points.material.uniforms) {
                                 points.material.uniforms.uColor.value.copy(ringColors[index]);
                                 points.material.uniforms.uGlobalScale.value = finalScale;
                                 points.material.uniforms.uTexture.value = pointIndex === 0 ? currentTextureYan : currentTextureHua;
                             }
                         });
                     } else if (index === 5) { // Sparkles
                         if (child.material && child.material.uniforms) {
                             child.material.uniforms.uGlobalScale.value = finalScale;
                             // Update both colors (both white)
                             child.material.uniforms.uColorInner.value.copy(colorInner);
                             child.material.uniforms.uColorOuter.value.copy(colorInner);
                         }
                     }
                 });
                 
                 this.launchText.material.uniforms.uGlobalScale.value = finalScale;

                 // Reset Transforms
                 this.launchText.scale.set(1.0, 1.0, 1.0);
                 if (this.launchText.material.uniforms.uScale) {
                     this.launchText.material.uniforms.uScale.value = 1.0;
                 }
                 this.explosionGroup.scale.set(1.0, 1.0, 1.0);
             }

             update(totalElapsedTime) {
                 if (!this.isActive) return;

                 const elapsedTime = totalElapsedTime - this.startTime;
                 if (elapsedTime < 0) return; 

                 if (!this.isExploded) {
                     if (elapsedTime < this.launchDuration) {
                         const t = elapsedTime / this.launchDuration;
                         const easeT = 1.0 - Math.pow(1.0 - t, 3.0);
                         
                         // Launch from -40 to targetY
                         const startY = -40;
                         this.launchText.position.y = startY + easeT * (this.targetY - startY);
                         
                         let scale = 1.0;
                        if (t < 0.8) {
                            const normalizedT = t / 0.8;
                            scale = 1.0 - normalizedT * 0.6;
                        } else {
                            scale = 0.4;
                        }
                         
                         this.launchText.scale.set(scale, scale, scale);
                         this.launchText.material.uniforms.uScale.value = scale;
                     } else {
                         this.isExploded = true;
                         this.launchText.visible = false;
                         this.explosionGroup.visible = true;
                         this.explosionStartTime = totalElapsedTime;
                     }
                 } else {
                     const explosionTime = totalElapsedTime - this.explosionStartTime;
                     
                     this.explosionGroup.traverse((object) => {
                         if (object.isPoints && object.material.uniforms && object.material.uniforms.uTime) {
                             object.material.uniforms.uTime.value = explosionTime;
                             object.material.uniforms.uDuration.value = this.explosionDuration;
                         }
                     });
                     
                     this.explosionGroup.rotation.z = explosionTime * 0.05;
                 }
             }
         }

         // --- Animation Loop ---
         const fireworks = [];
         for(let i=0; i<20; i++) {
             fireworks.push(new Firework(scene));
         }

         const clock = new THREE.Clock();
         let totalElapsedTime = 0;
         let nextLaunchTime = 0;
         let lastLaunchX = null;

         function animate() {
             requestAnimationFrame(animate);
             
             const delta = clock.getDelta();
             totalElapsedTime += delta * config.speed;

             // Global Fade In / Out Logic
             // Fade in for first 0.5s
             // Fade out for last 0.5s of config.duration
             let globalAlpha = 1.0;
             if (totalElapsedTime < 0.5) {
                 globalAlpha = totalElapsedTime / 0.5;
             } else if (totalElapsedTime > config.duration - 0.5) {
                 globalAlpha = Math.max(0, (config.duration - totalElapsedTime) / 0.5);
             }
             globalTint.setScalar(globalAlpha);

             if (totalElapsedTime >= nextLaunchTime) {
                 const firework = fireworks.find(f => !f.isActive);
                 if (firework) {
                     // Launch at random X position (20%-80% of screen width)
                     // Screen width is approx 80 units (-40 to +40)
                     // 20% = -24, 80% = +24
                     let currentX;
                     const minDistance = 8.0; // 10% of screen width
                     let attempts = 0;
                     const maxAttempts = 10;
                     
                     do {
                         currentX = -24.0 + Math.random() * 48.0;
                         attempts++;
                     } while (lastLaunchX !== null && Math.abs(currentX - lastLaunchX) < minDistance && attempts < maxAttempts);
                     
                     lastLaunchX = currentX;
                     
                     firework.reset(totalElapsedTime, 0, currentX);
                     
                     const minDelay = 1.0 / config.concurrency;
                     const maxDelay = config.launchInterval / config.concurrency;
                     const delay = minDelay + Math.random() * (maxDelay - minDelay);
                     
                     nextLaunchTime = totalElapsedTime + delay;
                 }
             }

             fireworks.forEach(f => {
                 if (f.isActive) {
                     f.update(totalElapsedTime);
                     const elapsedTime = totalElapsedTime - f.startTime;
                     if (elapsedTime > config.launchInterval) {
                         f.isActive = false;
                         f.launchText.visible = false;
                         f.explosionGroup.visible = false;
                     }
                 }
             });

             composer.render();
         }

         // --- UI Event Binding ---
         uiElements.scale.input.addEventListener('input', (e) => {
             const val = parseFloat(e.target.value);
             config.userScale = val;
             config.globalScale = val; 
             uiElements.scale.valueSpan.textContent = val.toFixed(1);
         });

         uiElements.speed.input.addEventListener('input', (e) => {
             const val = parseFloat(e.target.value);
             config.speed = val;
             uiElements.speed.valueSpan.textContent = val.toFixed(1);
         });

         uiElements.concurrency.input.addEventListener('input', (e) => {
             const val = parseInt(e.target.value);
             config.concurrency = val;
             uiElements.concurrency.valueSpan.textContent = val;
         });

         uiElements.glow.input.addEventListener('input', (e) => {
             const val = parseFloat(e.target.value);
             bloomPass.strength = val;
             bloomPass.radius = val * 0.33; 
             uiElements.glow.valueSpan.textContent = val.toFixed(1);
         });

         uiElements.colorShift.input.addEventListener('input', (e) => {
             const val = parseFloat(e.target.value);
             config.colorShift = val;
             uiElements.colorShift.valueSpan.textContent = val.toFixed(2);
         });

         uiElements.duration.input.addEventListener('input', (e) => {
             const val = parseFloat(e.target.value);
             config.duration = val;
             uiElements.duration.valueSpan.textContent = val.toFixed(1);
         });

         window.addEventListener('resize', () => {
             camera.aspect = window.innerWidth / window.innerHeight;
             camera.updateProjectionMatrix();
             renderer.setSize(window.innerWidth, window.innerHeight);
             composer.setSize(window.innerWidth, window.innerHeight); 
         });

        
    
         animate();
    </script>
</body>
</html>
